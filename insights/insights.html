<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 산업 인사이트 타임라인 | AI ROASTING</title>
  <meta name="description" content="AI 로스팅 뉴스레터 45화와 블로그 포스트 178개, 총 223화에서 추출한 인사이트. 2024년 4월부터 2026년 4월까지 9개 분기 핵심 인사이트를 분기별로 정리합니다.">
  <link rel="canonical" href="https://airoasting.github.io/blog/insights/insights.html">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>(function(){var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>

  <style>
    /* ── 커스텀 커서 ── */
    * { cursor: none !important; }
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.2,0,0,1),
                  height 0.3s cubic-bezier(0.2,0,0,1),
                  border-color 0.3s;
      mix-blend-mode: difference;
    }
    #cursor.hovering { width: 16px; height: 16px; }
    #cursor-ring.hovering { width: 56px; height: 56px; border-color: rgba(255,255,255,0.9); }

    /* ── 전체 페이지 ── */
    body { overflow-x: hidden; }

    /* ── 히어로: 다크 풀블리드 ── */
    .ins-hero {
      position: relative;
      background: #0D0D0D;
      margin: 0 calc(-50vw + 50%);
      padding: 120px 0 100px;
      overflow: hidden;
    }
    .ins-hero-content {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
    }
    /* 배경 그리드 */
    .ins-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* 배경 글로우 */
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.35;
      transition: transform 0.8s cubic-bezier(0.2,0,0,1);
    }
    .hero-glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .hero-glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #C43500 0%, transparent 70%);
      bottom: -100px; right: 10%;
    }

    .ins-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 900px;
    }
    .ins-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }
    .ins-eyebrow::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: rgba(255,255,255,0.3);
    }
    .ins-char-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .h1-line1, .h1-line2 { display: inline-block; }

    .ins-hero h1 {
      font-size: clamp(44px, 7vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: #fff;
      margin-bottom: 32px;
    }
    .ins-hero h1 em {
      font-style: normal;
      -webkit-text-stroke: 1px rgba(255,255,255,0.4);
      color: transparent;
    }
    .ins-hero-sub {
      display: flex;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
    }
    .ins-hero-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 380px;
    }
    .ins-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .ins-stat {
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 16px;
    }
    .ins-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .ins-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── 분기 셀렉터 ── */
    .quarter-selector {
      display: flex;
      gap: 0;
      margin: 56px 0 0;
      border-bottom: 1px solid var(--border);
    }
    .q-tab {
      position: relative;
      padding: 20px 32px 20px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: none;
      border: none;
      background: none;
      font-family: var(--font-body);
      letter-spacing: 0.02em;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }
    .q-tab:hover { color: var(--text); }
    .q-tab.active { color: var(--text); }
    .q-tab-quarter {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: inherit;
      line-height: 1;
    }
    .q-tab.active .q-tab-quarter { color: var(--text); }
    [data-theme="dark"] .q-tab.active .q-tab-quarter { color: var(--text); }
    .q-tab-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }
    .q-tab.active .q-tab-title { opacity: 1; }
    /* 하단 인디케이터 */
    .q-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 2px;
      background: var(--text);
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .q-tab.active::after { width: calc(100% - 32px); }
    .q-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface-container-high);
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-left: 6px;
      vertical-align: middle;
    }
    .q-tab.active .q-tab-count {
      background: var(--surface-container-highest, rgba(0,0,0,0.08));
      color: var(--text);
    }
    [data-theme="dark"] .q-tab.active .q-tab-count { color: var(--text); background: rgba(255,255,255,0.1); }

    /* ── 테마 필터 ── */
    .theme-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 24px 0 32px;
    }
    .theme-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      cursor: none;
      transition: all 0.15s;
      font-family: var(--font-body);
      letter-spacing: 0.04em;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-btn.active { color: #fff; border-color: transparent; }
    .theme-btn[data-theme="all"].active      { background: #1C1B20; }
    .theme-btn[data-theme="research"].active { background: #3A3A4A; }
    .theme-btn[data-theme="leader"].active   { background: #C43500; }
    .theme-btn[data-theme="company"].active  { background: #1A4A7A; }
    .theme-btn[data-theme="tech"].active     { background: #145C35; }
    .theme-btn[data-theme="survival"].active { background: #7A1F1F; }
    .theme-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .theme-btn[data-theme="all"]      .theme-dot { background: #6B6578; }
    .theme-btn[data-theme="research"] .theme-dot { background: #3A3A4A; }
    .theme-btn[data-theme="leader"]   .theme-dot { background: #C43500; }
    .theme-btn[data-theme="company"]  .theme-dot { background: #1A4A7A; }
    .theme-btn[data-theme="tech"]     .theme-dot { background: #145C35; }
    .theme-btn[data-theme="survival"] .theme-dot { background: #7A1F1F; }
    .theme-btn.active .theme-dot { background: rgba(255,255,255,0.6); }

    /* ── 패널 헤더 ── */
    .panel-header {
      margin-bottom: 40px;
    }
    .panel-phase-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    [data-theme="dark"] .panel-phase-tag { color: var(--text-secondary); }
    .panel-phase-tag::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: currentColor;
    }
    .panel-headline {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 900;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .panel-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.75;
      width: 100%;
    }

    /* ── 카드 그리드 ── */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .insight-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .insight-grid { grid-template-columns: 1fr; } }

    /* 와이드 카드 (2열 span) */
    .insight-card.ic-wide { grid-column: span 2; }
    @media (max-width: 900px) { .insight-card.ic-wide { grid-column: span 1; } }

    .insight-card {
      position: relative;
      background: var(--surface-container-high);
      border-radius: 16px;
      padding: 24px 26px;
      border: 1px solid var(--border-variant);
      overflow: hidden;
      transform-style: preserve-3d;
      transform: perspective(800px) rotateX(0deg) rotateY(0deg);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: fadeUp 0.32s cubic-bezier(0.2,0,0,1) both;
      min-height: 180px;
      display: flex;
      flex-direction: column;
    }
    .ic-body { flex: 1; }
    @keyframes fadeUp {
      from { opacity: 0; transform: perspective(800px) translateY(20px); }
      to   { opacity: 1; transform: perspective(800px) translateY(0); }
    }
    .insight-card:nth-child(1) { animation-delay: 0.00s; }
    .insight-card:nth-child(2) { animation-delay: 0.05s; }
    .insight-card:nth-child(3) { animation-delay: 0.10s; }
    .insight-card:nth-child(4) { animation-delay: 0.15s; }
    .insight-card:nth-child(5) { animation-delay: 0.20s; }
    .insight-card:nth-child(6) { animation-delay: 0.25s; }
    .insight-card:nth-child(7) { animation-delay: 0.30s; }
    .insight-card:nth-child(8) { animation-delay: 0.35s; }

    /* 카드 좌측 컬러 액센트 선 */
    .insight-card::before {
      content: '';
      position: absolute;
      top: 20px; left: 0;
      width: 3px;
      height: calc(100% - 40px);
      border-radius: 0 2px 2px 0;
      background: var(--border);
      transition: background 0.2s, height 0.2s, top 0.2s;
    }
    .insight-card[data-theme="research"]::before { background: #3A3A4A; }
    .insight-card[data-theme="leader"]::before   { background: #C43500; }
    .insight-card[data-theme="company"]::before  { background: #1A4A7A; }
    .insight-card[data-theme="tech"]::before     { background: #145C35; }
    .insight-card[data-theme="survival"]::before { background: #7A1F1F; }

    /* 카드 호버 시 전체 좌측선 → 탑 라인으로 변환 */
    .insight-card:hover::before {
      top: 0; left: 20px;
      width: calc(100% - 40px);
      height: 3px;
      border-radius: 0 0 2px 2px;
    }
    .insight-card:hover {
      border-color: transparent;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .insight-card:hover {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
    }

    /* 카드 내부 글로우 (마우스 위치 반응, 테마별 색상) */
    .card-glow {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .insight-card:hover .card-glow { opacity: 1; }
    .insight-card[data-theme="research"] .card-glow { background: radial-gradient(circle, rgba(58,58,74,0.14) 0%, transparent 70%); }
    .insight-card[data-theme="leader"]   .card-glow { background: radial-gradient(circle, rgba(196,53,0,0.10) 0%, transparent 70%); }
    .insight-card[data-theme="company"]  .card-glow { background: radial-gradient(circle, rgba(26,74,122,0.12) 0%, transparent 70%); }
    .insight-card[data-theme="tech"]     .card-glow { background: radial-gradient(circle, rgba(20,92,53,0.10) 0%, transparent 70%); }
    .insight-card[data-theme="survival"] .card-glow { background: radial-gradient(circle, rgba(122,31,31,0.10) 0%, transparent 70%); }

    .ic-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }
    .insight-card[data-theme="research"] .ic-tag { color: #5A5A7A; }
    .insight-card[data-theme="leader"]   .ic-tag { color: #C43500; }
    .insight-card[data-theme="company"]  .ic-tag { color: #1A4A7A; }
    .insight-card[data-theme="tech"]     .ic-tag { color: #145C35; }
    .insight-card[data-theme="survival"] .ic-tag { color: #7A1F1F; }
    [data-theme="dark"] .insight-card[data-theme="research"] .ic-tag { color: #9090B8; }
    [data-theme="dark"] .insight-card[data-theme="leader"]   .ic-tag { color: #F07040; }
    [data-theme="dark"] .insight-card[data-theme="company"]  .ic-tag { color: #5B9BD5; }
    [data-theme="dark"] .insight-card[data-theme="tech"]     .ic-tag { color: #4CAF78; }
    [data-theme="dark"] .insight-card[data-theme="survival"] .ic-tag { color: #E07070; }

    .ic-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-weight: 500;
    }
    .ic-body strong { font-weight: 800; }
    .ic-nl-thumb {
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
    }
    .ic-nl-thumb img {
      width: 100%;
      height: auto;
      display: block;
    }
    .ic-source {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      padding-top: 12px;
      border-top: 1px solid var(--border-variant);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: space-between;
    }
    .ic-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.65;
      flex-shrink: 0;
    }
    /* 단일 카드 전체 너비 */
    .insight-grid--single .insight-card:first-child { grid-column: 1 / -1; max-width: 560px; }

    /* ── 빈 상태 ── */
    .panel-empty {
      padding: 80px 0;
      text-align: center;
      color: var(--text-secondary);
    }
    .panel-empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .panel-empty p { font-size: 14px; }

    .filter-empty {
      padding: 48px 0;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    /* ── 패널 래퍼 ── */
    .panel-wrap {
      padding-top: 40px;
      padding-bottom: 100px;
    }

    /* ── 분기 탭 텍스트 줄바꿈 방지 ── */
    .q-tab-quarter { white-space: nowrap; }

    /* ── 모바일 ── */
    @media (max-width: 640px) {
      * { cursor: auto !important; }
      #cursor, #cursor-ring { display: none; }

      /* 탭: 가로 스크롤 */
      .quarter-selector {
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 0;
        margin: 32px 0 0;
      }
      .quarter-selector::-webkit-scrollbar { display: none; }

      .q-tab {
        padding: 14px 20px 14px 0;
        flex-shrink: 0;
        min-width: 0;
      }
      .q-tab:first-child { padding-left: 0; }

      .q-tab-quarter {
        font-size: 17px;
        white-space: nowrap;
      }
      .q-tab-title {
        font-size: 10px;
        white-space: nowrap;
        max-width: none;
      }

      /* 테마 필터: 한 줄 가로 스크롤 */
      .theme-filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .theme-filters::-webkit-scrollbar { display: none; }
      .theme-btn { flex-shrink: 0; }

      /* 카드 그리드 */
      .insight-grid { gap: 12px; }

      /* 패널 헤더 */
      .panel-headline { font-size: 18px; }
    }

    @media (max-width: 400px) {
      .q-tab-quarter { font-size: 15px; }
      .q-tab { padding: 12px 16px 12px 0; }
    }

    /* ══════════════════════════════════════
       뉴스레터 리더 오버레이 (공유)
    ══════════════════════════════════════ */
    .nlr-backdrop {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(4, 0, 18, 0.72);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    .nlr-backdrop.open { opacity: 1; pointer-events: all; }
    .nlr-window {
      position: relative; width: 100%; max-width: 720px; max-height: 90vh;
      background: #ffffff; border-radius: 24px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(28px) scale(0.97);
      transition: transform 0.38s cubic-bezier(0.2,0,0,1);
    }
    .nlr-backdrop.open .nlr-window { transform: translateY(0) scale(1); }
    [data-theme="dark"] .nlr-window { background: #141414; box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4); }
    .nlr-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-container); flex-shrink: 0;
    }
    [data-theme="dark"] .nlr-header { border-bottom-color: var(--border); background: var(--surface-container); }
    .nlr-ep-pill {
      display: inline-flex; align-items: center;
      background: #7C3AED; color: #fff;
      font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
      padding: 4px 11px; border-radius: 100px; flex-shrink: 0;
    }
    .nlr-header-title {
      flex: 1; font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.4; word-break: keep-all;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    [data-theme="dark"] .nlr-header-title { color: var(--text); }
    .nlr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .nlr-li-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1.5px solid #7C3AED; color: #7C3AED;
      font-size: 12px; font-weight: 700; padding: 6px 14px;
      border-radius: 100px; text-decoration: none; white-space: nowrap;
      transition: background 0.18s, color 0.18s, border-color 0.18s; line-height: 1; z-index: 1;
    }

        { theme: "tech", tag: "기술", body: "최적화가 AI의 새로운 시대를 열고 있습니다. <strong>단순 확장이 아닌 효율화가 다음 AI 경쟁의 핵심</strong>입니다.", source: "최적화가 여는 AI의 새 시대", url: "../tech/2025-03-15-optimization-ai-new-era.html", date: "2025-03-15", roasting: "더 크게가 아니라 더 효율적으로. AI 경쟁의 다음 판은 이미 시작됐습니다.", summaries: ["AI 진화의 방향이 확장에서 최적화로 바뀝니다.", "동일 비용으로 더 나은 결과를 내는 효율화 경쟁이 시작됩니다.", "추론 비용 최적화가 AI 상용화의 핵심 과제입니다."] },

        { theme: "research", tag: "리서치", body: "2025년 AI 트렌드를 에이전트·버티컬·비즈니스 세 축으로 정리합니다. <strong>범용에서 특화, 실험에서 실용으로</strong> 이동합니다.", source: "2025 AI 트렌드", url: "../research/2025-03-20-ai-trends-2025-agents-verticals-biz.html", date: "2025-03-20", roasting: "2025년의 AI는 화려한 데모가 아닙니다. 실제 업무에서 ROI가 나오는지가 판단 기준입니다.", summaries: ["2025 AI 트렌드는 에이전트·버티컬·비즈니스화 3축입니다.", "범용 모델보다 특화 에이전트가 실무에서 더 빠르게 확산됩니다.", "AI 도입 성공 기준이 기술 성능에서 비즈니스 ROI로 이동합니다."] },
        { theme: "company", tag: "기업", body: "양재가 AI 허브가 될 수 있는지를 분석합니다. <strong>클러스터 조건인 인재·자본·문화·연결이 부족</strong>합니다.", source: "양재는 AI 허브가 될 수 있을까", url: "../company/2025-03-20-can-yangjae-become-an-ai-hub.html", date: "2025-03-20", roasting: "빌딩을 짓는다고 실리콘밸리가 되지 않습니다. 사람이 모이고 싶은 이유가 먼저입니다.", summaries: ["양재 AI 허브 조성의 현실적 조건을 점검합니다.", "인재·자본·문화·연결 네 가지 중 몇 가지나 갖췄는지가 기준입니다.", "공간 투자보다 생태계 설계가 먼저입니다."] },
        { theme: "survival", tag: "생존", body: "한국의 끝인가 전환인가를 묻습니다. <strong>위기를 전환의 계기로 만드는 선택이 지금 필요</strong>합니다.", source: "한국의 끝인가, 전환인가", url: "../survival/2025-03-25-koreas-end-or-transition.html", date: "2025-03-25", roasting: "위기가 아니라 전환입니다. 그렇게 읽는 사람만이 다음을 설계할 수 있습니다.", summaries: ["한국 사회는 위기와 전환의 분기점에 있습니다.", "AI 전환을 위기가 아닌 재편의 기회로 읽어야 합니다.", "구조 변화를 두려워하는 조직은 더 빠르게 뒤처집니다."] }

        { theme: "survival", tag: "생존", body: "AI 시대에 응답 과부하 사회가 도래하고 있습니다. <strong>정보 처리 능력의 한계가 개인과 조직을 압박</strong>합니다.", source: "AI 시대 응답 과부하 사회", url: "../survival/2025-04-10-ai-era-response-overload-society.html", date: "2025-04-10", roasting: "AI가 정보를 늘릴수록 처리해야 할 것도 늘어납니다. 선택과 집중 능력이 새 경쟁력입니다.", summaries: ["AI가 정보 생산 속도를 높이며 응답 과부하가 심화됩니다.", "정보 선별·집중 능력이 개인과 조직의 핵심 역량입니다.", "AI 도구 설계도 정보 과부하 해소 방향으로 진화해야 합니다."] },

        { theme: "research", tag: "리서치", body: "대학이 AI를 도입하는 세 가지 방식을 비교합니다. <strong>금지·허용·통합 중 통합이 장기적으로 유효</strong>합니다.", source: "대학의 AI 도입 세 가지 방식", url: "../research/2025-04-10-three-ways-universities-adopt-ai.html", date: "2025-04-10", roasting: "AI를 막는 대학과 활용하는 대학의 졸업생이 5년 후 다른 경쟁력을 가질 것입니다.", summaries: ["대학의 AI 도입은 금지·허용·통합 세 방식으로 나뉩니다.", "장기적으로는 통합 방식이 학습 효과와 경쟁력에 유리합니다.", "교육 기관의 AI 정책이 다음 세대 인재 경쟁력을 결정합니다."] },

        { theme: "company", tag: "기업", body: "마누스 AI가 싱가포르로 이전한 배경을 분석합니다. <strong>AI 스타트업의 지정학적 거점 선택이 전략적 의사결정</strong>이 됩니다.", source: "마누스 AI가 싱가포르로 간 이유", url: "../company/2025-04-10-why-manus-ai-moved-to-singapore.html", date: "2025-04-10", roasting: "어디에 법인을 두느냐가 AI 기업의 성패를 가를 수 있습니다. 규제·자본·인재 지도가 바뀌고 있습니다.", summaries: ["마누스 AI의 싱가포르 이전은 지정학 리스크 회피 전략입니다.", "AI 스타트업의 거점 선택이 글로벌 확장 경로를 결정합니다.", "규제 환경·자본 접근성·인재 확보가 거점 선택 기준입니다."] },

        { theme: "research", tag: "리서치", body: "AI가 학습의 시대에서 경험의 시대로 전환하고 있습니다. <strong>데이터 학습보다 실세계 경험이 AI 발전의 다음 단계</strong>입니다.", source: "AI, 학습의 시대에서 경험의 시대로", url: "../research/2025-04-15-ai-from-learning-era-to-experience-era.html", date: "2025-04-15", roasting: "AI가 텍스트를 다 읽었습니다. 이제 세상을 경험해야 합니다. 로보틱스와 에이전트가 그 다음입니다.", summaries: ["생성형 AI는 인터넷 텍스트 학습의 한계에 도달했습니다.", "실세계 경험 기반 학습이 AI 발전의 다음 단계입니다.", "에이전트형 AI와 로보틱스가 경험의 시대를 주도합니다."] },
        { theme: "company", tag: "기업", body: "중국 AI 빅테크 BAM(Baidu·Alibaba·Meituan)이 한국에 제기하는 질문을 분석합니다. <strong>플랫폼 독점이 AI 시대에 어떻게 재편되는지</strong>가 핵심입니다.", source: "중국 AI 빅테크 BAM이 한국에 제기하는 질문", url: "../company/2025-04-15-questions-china-ai-bigtech-bam-poses-to-korea.html", date: "2025-04-15", roasting: "BAM의 전략을 보면 한국이 어디에 취약한지 보입니다. 경쟁 전에 지형을 먼저 읽어야 합니다.", summaries: ["중국 AI 빅테크 BAM이 한국 시장을 위협하고 있습니다.", "플랫폼 독점 전략이 AI 시대에 더 강해질 수 있습니다.", "한국 기업의 차별화 전략 재검토가 필요합니다."] },
        { theme: "research", tag: "리서치", body: "좋은 질문이 더 중요해지는 시대입니다. <strong>AI가 답을 주는 시대에 질문 설계 능력이 핵심 역량</strong>이 됩니다.", source: "좋은 질문이 더 중요하다", url: "../research/2025-04-16-good-questions-matter-more.html", date: "2025-04-16", roasting: "AI가 모든 답을 줄 수 있다면, 어떤 질문을 하느냐가 성과를 결정합니다.", summaries: ["AI 시대에 질문 설계 능력이 핵심 역량입니다.", "답보다 질문이 더 어렵고 더 중요해졌습니다.", "조직의 문제 정의 역량이 AI 활용 수준을 결정합니다."] },
        { theme: "research", tag: "리서치", body: "AI가 만든 생산성 증가의 역설을 분석합니다. <strong>효율은 올랐지만 여유는 줄고 격차는 벌어졌습니다.</strong>", source: "AI 생산성 증가의 역설", url: "../research/2025-04-20-paradox-of-ai-driven-productivity-gains.html", date: "2025-04-20", roasting: "AI가 빠르게 만들었지만 느리게 생각할 시간이 없어졌습니다. 속도가 여유를 잡아먹고 있습니다.", summaries: ["AI가 생산성을 올렸지만 업무 부담도 함께 늘었습니다.", "효율화 이득이 여유 시간이 아닌 더 많은 기대로 전환됩니다.", "AI 도입 후 성과 기준 재설계가 필요합니다."] },
        { theme: "tech", tag: "기술", body: "어떤 AI 모델을 써야 하는지 비교합니다. <strong>과제·비용·속도·정확도 네 가지 기준으로 선택</strong>해야 합니다.", source: "어떤 AI 모델을 써야 하는가", url: "../tech/2025-04-20-which-ai-model-should-you-use.html", date: "2025-04-20", roasting: "가장 비싼 모델이 최선이 아닙니다. 내 과제에 맞는 모델이 최선입니다.", summaries: ["AI 모델 선택은 과제·비용·속도·정확도 기준으로 해야 합니다.", "용도별 최적 모델이 다릅니다.", "모델 선택 역량이 AI 비용 효율성을 결정합니다."] },
        { theme: "survival", tag: "생존", body: "AI 시대에 가장 먼저 일자리를 잃는 직군을 분석합니다. <strong>루틴·정보처리·중간 관리 직무가 가장 취약</strong>합니다.", source: "AI 시대 가장 먼저 밀려나는 직군", url: "../survival/2025-04-20-who-gets-displaced-first-in-ai-era.html", date: "2025-04-20", roasting: "내 직무가 루틴한지 먼저 솔직하게 물어보세요. 그 답이 당신의 준비 방향입니다.", summaries: ["AI에 가장 취약한 직무는 루틴·정보처리·중간관리입니다.", "고숙련·창의·대인 관계 직무는 상대적으로 안전합니다.", "지금 당장 자신의 직무 취약성을 점검해야 합니다."] },
        { theme: "tech", tag: "기술", body: "중국 로봇이 하프 마라톤을 완주했습니다. <strong>휴머노이드 로봇 실용화가 예상보다 빠르게 진행</strong>되고 있습니다.", source: "중국 로봇 하프마라톤 완주", url: "../tech/2025-04-21-china-robots-run-half-marathon.html", date: "2025-04-21", roasting: "로봇이 뛰는 것보다 중요한 건 언제 일터에 들어오느냐입니다. 생각보다 빠릅니다.", summaries: ["중국 휴머노이드 로봇이 하프마라톤을 완주했습니다.", "로봇 실용화 속도가 예상보다 빠르게 진행됩니다.", "물리적 노동 자동화가 제조업·물류·서비스업에 미칠 영향을 준비해야 합니다."] },
        { theme: "company", tag: "기업", body: "2025 상하이 모터쇼가 한국 자동차 산업에 충격을 줍니다. <strong>중국 EV의 기술·가격 경쟁력이 글로벌 시장을 재편</strong>합니다.", source: "2025 상하이 모터쇼 충격", url: "../company/2025-04-25-2025-shanghai-motor-show-shock.html", date: "2025-04-25", roasting: "중국 EV를 못 따라가면 한국 자동차도 노키아 길을 갑니다.", summaries: ["2025 상하이 모터쇼에서 중국 EV의 기술 경쟁력이 입증됐습니다.", "가격과 기술 모두에서 한국·일본 자동차를 위협합니다.", "한국 자동차 산업의 전략적 전환이 시급합니다."] },
        { theme: "research", tag: "리서치", body: "AI가 우리를 더 똑똑하게 만드는지를 연구합니다. <strong>단기 생산성은 오르지만 사고력은 위협받습니다.</strong>", source: "AI가 우리를 더 똑똑하게 만드는가", url: "../research/2025-04-25-does-ai-make-us-smarter.html", date: "2025-04-25", roasting: "AI가 빠르게 만들어 줍니다. 하지만 생각하는 능력은 쓰지 않으면 약해집니다.", summaries: ["AI 사용은 단기 생산성을 올리지만 심층 사고를 약화시킬 수 있습니다.", "AI 의존도와 비판적 사고력 사이에 트레이드오프가 있습니다.", "AI 사용 방식의 설계가 사고력 유지의 핵심입니다."] },
        { theme: "research", tag: "리서치", body: "AI를 잘 쓰는 것은 검색과 다릅니다. <strong>맥락 설계와 반복 대화가 AI 활용의 핵심</strong>입니다.", source: "AI를 잘 쓰는 것은 검색과 다르다", url: "../research/2025-04-25-using-ai-well-different-from-search.html", date: "2025-04-25", roasting: "AI에게 질문 한 번 하고 답을 바라면 검색이랑 다를 게 없습니다. 대화를 설계해야 합니다.", summaries: ["AI 활용은 검색보다 대화 설계에 가깝습니다.", "맥락 제공과 반복 정교화가 AI 결과물 품질을 결정합니다.", "AI 리터러시의 핵심은 맥락 전달 능력입니다."] },
        { theme: "survival", tag: "생존", body: "AI 시대에 일잘러는 달라야 합니다. <strong>AI를 어디까지 쓰느냐가 성과의 격차를 만듭니다.</strong>", source: "AI 시대 일잘러는 달라야 합니다", url: "../survival/2025-05-01-high-performers-must-be-different-in-ai-era.html", date: "2025-05-01", roasting: "AI를 쓰느냐가 아니라 어디까지 쓰느냐가 격차를 만듭니다.", summaries: ["AI 시대 일잘러는 AI 활용 범위와 깊이가 다릅니다.", "질문 설계 능력이 성과 격차를 만듭니다.", "루틴을 자동화하고 판단에 집중하는 습관이 필요합니다."] },
        { theme: "company", tag: "기업", body: "인도네시아 스타트업 스캔들에서 거버넌스의 중요성을 배웁니다. <strong>외형 성장보다 신뢰 구조가 먼저</strong>입니다.", source: "인도네시아 스타트업 스캔들", url: "../company/2025-05-01-indonesia-startup-scandal.html", date: "2025-05-01", roasting: "빠르게 크는 것보다 제대로 크는 것이 중요합니다. 거버넌스 없는 성장은 언젠가 무너집니다.", summaries: ["인도네시아 주요 스타트업의 회계 조작이 드러났습니다.", "외형 성장 중심 생태계의 거버넌스 취약성이 원인입니다.", "투명성과 신뢰 구조가 지속 성장의 기반입니다."] },
        { theme: "company", tag: "기업", body: "퓨리오사AI가 메타 8억 달러 인수를 거절했습니다. <strong>기술 주권과 독립 노선을 선택한 한국 AI 반도체 기업</strong>입니다.", source: "퓨리오사AI", url: "../company/2025-05-05-furiosa-ai.html", date: "2025-05-05", roasting: "8억 달러를 거절하는 배짱보다 거절할 수 있는 기술 경쟁력이 더 중요합니다.", summaries: ["퓨리오사AI가 메타 인수 제안을 거절했습니다.", "추론 특화 칩으로 엔비디아 대안 포지셔닝을 선택했습니다.", "기술 주권 중심의 독립 노선이 한국 AI 반도체의 가능성을 보여줍니다."] },
        { theme: "company", tag: "기업", body: "구글 모빌리티 전략에 대한 두 시선을 비교합니다. <strong>이동 데이터 설계 vs 차량 플랫폼 장악</strong>, 어느 쪽이 더 강력한가.", source: "구글 모빌리티 전략 두 가지 시선", url: "../company/2025-05-05-two-views-on-google-mobility-strategy.html", date: "2025-05-05", roasting: "구글은 차를 팔지 않습니다. 이동 데이터를 설계합니다.", summaries: ["구글 모빌리티 전략은 차량이 아닌 이동 데이터 장악입니다.", "한국은 자동차 부품은 있지만 통합 플랫폼 설계자가 없습니다.", "모빌리티 시장의 패권은 하드웨어가 아닌 데이터에서 결정됩니다."] },
        { theme: "company", tag: "기업", body: "한국이 AI G3가 되기 위해 필요한 것을 분석합니다. <strong>선언이 아닌 생태계 설계 역량</strong>이 핵심입니다.", source: "한국, AI G3 국가가 되기 위한 5가지 요건 진짜 필요한 것", url: "../company/2025-05-05-what-korea-needs-to-become-ai-g3.html", date: "2025-05-05", roasting: "G3는 선언으로 되지 않습니다. 모델 하나 만든다고 되지도 않습니다.", summaries: ["한국 AI G3 전략의 빠진 부분을 점검합니다.", "생태계 설계 역량이 기술 역량보다 중요합니다.", "정부 투자와 민간 실행의 연결 구조가 없으면 효과가 없습니다."] },
        { theme: "company", tag: "기업", body: "ASEAN 시장이 기술 주권의 시험장이 됐습니다. <strong>미·중 기술 중 어느 편에 설 것인지를 강요받고 있습니다.</strong>", source: "ASEAN 기술 주권 시험장", url: "../company/2025-05-10-asean-market-test-of-tech-sovereignty.html", date: "2025-05-10", roasting: "중립은 없습니다. ASEAN이 선택을 강요받듯, 한국 기업도 선택해야 할 순간이 옵니다.", summaries: ["ASEAN이 미·중 기술 패권의 시험장이 됐습니다.", "기술 선택이 곧 지정학적 입장 표명입니다.", "한국 기업의 ASEAN 전략에 지정학 리스크 분석이 필요합니다."] },
        { theme: "research", tag: "리서치", body: "아이들이 AI 챗봇과 나누는 대화를 분석합니다. <strong>AI가 아이들의 사고 방식과 사회성 발달에 미치는 영향</strong>이 주목됩니다.", source: "아이들이 AI 챗봇과 나누는 대화", url: "../research/2025-05-10-conversations-children-have-with-ai-chatbots.html", date: "2025-05-10", roasting: "아이들이 AI에게 가장 많이 묻는 것은 외로움입니다. 기술이 감정의 공백을 채우기 시작했습니다.", summaries: ["아이들의 AI 챗봇 활용은 정보 탐색보다 감정 표현 중심입니다.", "AI가 또래 관계와 사고 발달에 영향을 미치기 시작했습니다.", "아동 AI 사용 가이드라인과 교육적 설계가 필요합니다."] },
        { theme: "leader", tag: "리더", body: "장강명 작가의 '먼저 온 미래'를 분석합니다. <strong>AI가 바꾸는 창작의 본질에 대한 문학적 성찰</strong>입니다.", source: "장강명의 먼저 온 미래", url: "../leader/2025-05-10-jang-kangmyoung-the-future-that-came-first.html", date: "2025-05-10", roasting: "작가가 AI를 두려워하지 않는 건, 쓰는 이유가 결과물이 아니라 과정이기 때문입니다.", summaries: ["장강명 작가는 AI를 창작 도구로 적극 실험합니다.", "창작의 본질은 결과물이 아닌 사유의 과정입니다.", "AI 시대 창작자의 경쟁력은 독창적 관점과 경험입니다."] },
        { theme: "tech", tag: "기술", body: "ChatGPT-5 출시까지의 험난한 길을 분석합니다. <strong>기대와 현실 사이의 간극이 AI 개발의 복잡성</strong>을 드러냅니다.", source: "ChatGPT-5 출시까지의 험난한 길", url: "../tech/2025-05-10-the-rocky-road-to-chatgpt5.html", date: "2025-05-10", roasting: "GPT-5가 늦어지는 이유가 있습니다. 스케일링만으로는 한계입니다.", summaries: ["GPT-5 개발은 스케일링 법칙의 한계를 드러냈습니다.", "새로운 아키텍처와 추론 방식의 혁신이 필요합니다.", "AI 개발 속도에 대한 시장 기대를 재조정해야 합니다."] },
        { theme: "tech", tag: "기술", body: "ChatGPT-4o가 그리운 이유를 분석합니다. <strong>성능 업그레이드가 사용자 경험을 오히려 악화</strong>시킨 사례입니다.", source: "ChatGPT-4o가 그리운 이유", url: "../tech/2025-05-10-why-people-miss-chatgpt-4o.html", date: "2025-05-10", roasting: "더 똑똑해졌는데 왜 덜 좋아졌을까요? 성능과 사용자 경험은 다릅니다.", summaries: ["GPT-5 출시 후 4o를 그리워하는 사용자가 많습니다.", "성능 향상이 항상 사용자 경험 향상을 의미하지 않습니다.", "AI 제품 설계에서 '익숙함'과 '편안함'이 중요한 변수입니다."] },
        { theme: "survival", tag: "생존", body: "AI가 정말로 우리 일을 대체할지를 냉정하게 분석합니다. <strong>직업 소멸보다 직무 재편이 더 정확한 표현</strong>입니다.", source: "AI가 정말 우리 일을 대체할까", url: "../survival/2025-05-10-will-ai-really-replace-our-work.html", date: "2025-05-10", roasting: "직업이 없어지는 게 아닙니다. 직무가 바뀝니다. 지금 당신의 직무 중 AI에게 넘길 것을 정하세요.", summaries: ["AI는 직업을 소멸시키기보다 직무를 재편합니다.", "일의 성격 변화를 이해하고 적응하는 것이 핵심입니다.", "지금 당장 자신의 직무에서 AI에게 위임할 부분을 찾아야 합니다."] },
        { theme: "company", tag: "기업", body: "트럼프가 저작권청장을 해고한 배경을 분석합니다. <strong>AI 학습 데이터와 저작권 충돌이 정치 문제로 비화</strong>됐습니다.", source: "트럼프가 저작권청장을 해고한 이유", url: "../company/2025-05-12-why-trump-fired-the-copyright-office-director.html", date: "2025-05-12", roasting: "AI 저작권 전쟁이 법정에서 백악관으로 이동했습니다. 누가 규칙을 만드느냐가 판을 결정합니다.", summaries: ["트럼프 행정부가 AI 친화적 저작권 정책을 추진합니다.", "저작권청장 해고는 AI 학습 데이터 정책 방향을 바꾸려는 신호입니다.", "미국의 저작권 정책 변화가 글로벌 AI 산업에 영향을 미칩니다."] },
        { theme: "survival", tag: "생존", body: "마이크로소프트의 대규모 해고가 의미하는 것을 분석합니다. <strong>AI 전환 시대의 인력 재편은 선택이 아닌 필수</strong>입니다.", source: "마이크로소프트 대규모 해고", url: "../survival/2025-05-15-microsoft-large-scale-layoffs.html", date: "2025-05-15", roasting: "MS의 해고는 비용 절감이 아닙니다. AI 역량으로의 인력 재편입니다. 우리 회사는 어떻게 준비하고 있습니까.", summaries: ["마이크로소프트가 AI 전환을 위해 대규모 인력을 재편했습니다.", "AI 역량 중심으로 조직 구조가 바뀌고 있습니다.", "기업의 AI 인력 전환 전략이 시급한 과제입니다."] },
        { theme: "tech", tag: "기술", body: "삭제된 대화도 AI가 기억합니다. <strong>AI 메모리 기능의 프라이버시 리스크</strong>를 점검해야 합니다.", source: "삭제해도 AI는 기억합니다", url: "../tech/2025-05-15-preserve-even-deleted-conversations.html", date: "2025-05-15", roasting: "삭제 버튼을 눌렀다고 사라지지 않습니다. AI 메모리 관리가 프라이버시 전략이 됐습니다.", summaries: ["AI 메모리 기능은 삭제 후에도 데이터를 보존할 수 있습니다.", "기업 AI 도입 시 데이터 보존 정책 재검토가 필요합니다.", "AI 사용 데이터 관리가 프라이버시 전략의 핵심입니다."] },
        { theme: "leader", tag: "리더", body: "샘 알트만의 소프트 싱귤래리티 발언을 분석합니다. <strong>AGI 전환이 급격하지 않고 점진적으로 올 수 있다는 시각</strong>입니다.", source: "샘 알트만 소프트 싱귤래리티", url: "../leader/2025-05-15-thoughts-on-sam-altman-soft-singularity.html", date: "2025-05-15", roasting: "AGI가 와도 모르게 옵니다. 그게 더 무섭습니다.", summaries: ["샘 알트만은 AGI 전환이 점진적으로 올 것이라고 전망합니다.", "급격한 변화보다 조용한 침투가 더 위험할 수 있습니다.", "기업의 AI 전환 속도 계획을 재검토해야 합니다."] },
        { theme: "tech", tag: "기술", body: "인간처럼 되고 싶은 AI와 인간을 위한 AI를 비교합니다. <strong>의인화 AI보다 실용적 AI가 기업에 더 유용</strong>합니다.", source: "인간처럼 되고 싶은 AI vs 인간을 위한 AI", url: "../tech/2025-05-20-ai-that-wants-to-be-human-vs-ai-for-humans.html", date: "2025-05-20", roasting: "AI가 인간을 흉내 내는 것보다 인간의 일을 돕는 것이 더 가치 있습니다.", summaries: ["의인화 AI는 사용자 감정을 끌지만 실용적 가치가 낮을 수 있습니다.", "기업용 AI는 인간화보다 효율화 방향으로 설계해야 합니다.", "AI의 역할 설계가 도입 성과를 결정합니다."] },
        { theme: "leader", tag: "리더", body: "Anthropic CPO가 PM의 미래 역량을 정리했습니다. <strong>AI 시대 PM은 제품보다 시스템을 설계</strong>해야 합니다.", source: "Anthropic CPO의 PM 역량 기준", url: "../leader/2025-05-20-anthropic-cpo-on-pm-competencies.html", date: "2025-05-20", roasting: "PM이 기능 명세서를 쓰는 시대는 끝났습니다. AI 에이전트와 협업하는 시스템 설계자가 되어야 합니다.", summaries: ["AI 시대 PM은 기능 정의가 아닌 시스템 설계 역량이 필요합니다.", "AI 에이전트와의 협업 방식 설계가 핵심 PM 역량입니다.", "제품 감각보다 오케스트레이션 역량이 중요해집니다."] },
        { theme: "survival", tag: "생존", body: "생성형 AI가 청년 고용에 미치는 영향을 분석합니다. <strong>고학력 청년층이 AI 대체에 가장 취약</strong>합니다.", source: "생성형 AI와 청년 고용", url: "../survival/2025-05-20-generative-ai-effect-on-youth-employment.html", date: "2025-05-20", roasting: "AI가 가장 먼저 대체하는 것은 반복적인 인지 업무입니다. 신입 직원의 전통적인 업무와 정확히 겹칩니다.", summaries: ["생성형 AI가 고학력 신입 직무를 먼저 대체하고 있습니다.", "전통적 신입 경력 경로가 위협받고 있습니다.", "청년층의 AI 역량 강화와 커리어 재설계가 시급합니다."] },
        { theme: "company", tag: "기업", body: "OpenAI의 윈드서프 인수가 무산됐습니다. <strong>AI 기업 M&A 시장의 복잡한 역학</strong>을 보여줍니다.", source: "OpenAI 윈드서프 인수 무산", url: "../company/2025-05-20-openai-windsurf-acquisition-falls-through.html", date: "2025-05-20", roasting: "인수 무산이 보여주는 것은 AI 시장의 불확실성입니다. 승자가 아직 결정되지 않았습니다.", summaries: ["OpenAI의 윈드서프 인수가 무산됐습니다.", "AI 개발 도구 시장의 경쟁이 치열해지고 있습니다.", "AI M&A 시장의 복잡성이 증가하고 있습니다."] },
        { theme: "company", tag: "기업", body: "스테이블코인이 달러 패권의 비밀 무기입니다. <strong>디지털 달러가 미국 금융 패권을 강화</strong>하는 전략입니다.", source: "스테이블코인, 달러 패권의 비밀 무기", url: "../company/2025-05-20-stablecoin-secret-weapon-of-dollar-hegemony.html", date: "2025-05-20", roasting: "스테이블코인은 암호화폐가 아닙니다. 디지털 달러 패권의 확장입니다.", summaries: ["스테이블코인이 달러 패권의 디지털 확장 수단이 됩니다.", "미국이 스테이블코인을 전략적으로 육성하는 이유입니다.", "한국의 디지털 금융 전략에도 지정학적 맥락이 필요합니다."] },
        { theme: "company", tag: "기업", body: "AI 결제에 세금을 매길 수 있는지를 분석합니다. <strong>AI 에이전트의 경제 활동에 대한 새로운 규제 논의</strong>가 시작됩니다.", source: "AI 결제에 세금을 매길 수 있을까", url: "../company/2025-05-25-can-ai-payments-be-taxed.html", date: "2025-05-25", roasting: "AI가 돈을 쓰고 있습니다. 그 거래에 세금을 매기는 방법은 아직 아무도 모릅니다.", summaries: ["AI 에이전트의 자율 결제가 늘어나고 있습니다.", "AI 경제 활동에 대한 규제 프레임이 아직 없습니다.", "AI 에이전트 거래의 세금·책임 문제를 선제적으로 논의해야 합니다."] },
        { theme: "tech", tag: "기술", body: "GPT-5의 한계와 다음 단계를 분석합니다. <strong>스케일링 한계와 추론 중심 진화</strong>가 핵심입니다.", source: "GPT-5 한계와 그 다음", url: "../tech/2025-05-25-gpt5-limitations-and-whats-next.html", date: "2025-05-25", roasting: "GPT-5도 한계가 있습니다. 다음이 무엇인지 아는 것이 AI 전략의 시작입니다.", summaries: ["GPT-5는 스케일링 법칙의 수확 체감을 보여줍니다.", "추론 중심 아키텍처로의 전환이 다음 AI 발전 방향입니다.", "모델 성능 향상 속도에 대한 기대를 조정해야 합니다."] },
        { theme: "survival", tag: "생존", body: "AI 시대 교사의 역할이 바뀌어야 합니다. <strong>정답 전달자에서 질문 설계자로의 전환</strong>이 필요합니다.", source: "AI 시대 교사의 역할", url: "../survival/2025-05-25-teachers-role-in-ai-era.html", date: "2025-05-25", roasting: "AI가 정답을 주면 교사는 무엇을 해야 합니까. 질문을 설계하는 사람이 되어야 합니다.", summaries: ["AI 시대에 교사의 역할이 정답 전달자에서 질문 설계자로 바뀝니다.", "AI 교과서 도입이 교육 방식 혁신 없이는 효과가 없습니다.", "교사의 AI 활용 역량이 다음 세대 경쟁력을 결정합니다."] },
        { theme: "company", tag: "기업", body: "중국이 자국 EV 1위 BYD에 경고를 보냈습니다. <strong>독주가 생태계를 파괴할 수 있다는 신호</strong>입니다.", source: "중국이 BYD에 경고하는 이유", url: "../company/2025-05-25-why-china-is-warning-its-top-ev-company.html", date: "2025-05-25", roasting: "BYD가 이기면 부품사가 죽습니다. 생태계 없이는 BYD도 오래 가지 못합니다.", summaries: ["BYD의 가격 전쟁이 중국 EV 공급망을 위협합니다.", "독주 전략이 장기적으로 생태계를 파괴할 수 있습니다.", "AI 산업에도 같은 패턴이 적용될 수 있습니다."] },

        { theme: "survival", tag: "생존", body: "21대 대선이 드러낸 세대 간 사유 방식의 차이를 분석합니다. <strong>기술이 만든 정보 환경 격차가 세대 갈등의 본질</strong>입니다.", source: "21대 대선과 세대 차이", url: "../survival/2025-06-10-korean-election-generational-divide.html", date: "2025-06-10", roasting: "세대 갈등은 가치관 차이가 아닙니다. 정보 처리 방식과 신뢰하는 출처의 차이입니다.", summaries: ["21대 대선 결과는 세대별 정보 환경 차이를 드러냈습니다.", "기술이 만든 필터 버블이 세대 간 소통을 어렵게 합니다.", "세대 갈등 해결에 기술 리터러시 교육이 필요합니다."] },

        { theme: "company",  tag: "기업",   body: "오라클이 OpenAI와 <strong>연간 300억 달러 클라우드 공급 계약</strong>을 체결했습니다. 발표 당일 오라클 주가가 36.7% 올라 시가총액 기준 역대 최대 일일 상승을 기록했습니다. 인프라 수주 소식이 모델 발표보다 강한 시장 신호가 됐습니다.", source: "뉴스레터 #13", date: "2025-09-13" },
        { theme: "company",  tag: "기업",   body: "Anthropic이 130억 달러를 조달하며 기업가치 <strong>1,830억 달러</strong>를 기록했습니다. Claude Code는 출시 3개월 만에 연간 기준 매출 약 5억 달러에 도달했습니다.", source: "뉴스레터 #9", date: "2025-08-16" },
        { theme: "research", tag: "리서치", body: "샘 알트만이 공개적으로 <strong>'AI 버블 속에 있다'</strong>고 발언했습니다. 같은 시기 MIT NANDA 연구에서 기업 GenAI 파일럿의 95%가 P&L 단계에서 실패한다고 밝혔습니다. 가트너는 GenAI를 환멸의 골짜기로 분류했습니다.", source: "뉴스레터 #10", date: "2025-08-23" },
        { theme: "company",  tag: "기업",   body: "Figma가 IPO 첫날 <strong>시가총액 563억 달러, 상승률 250%</strong>를 기록했습니다. AI 생산성 도구에 대한 자본시장의 기대가 임계점을 넘은 시점이었습니다.", source: "뉴스레터 #7", date: "2025-08-02" },
        { theme: "company",  tag: "기업",   body: "Google AI Overview가 표시된 검색의 <strong>80% 이상이 제로 클릭</strong>으로 종료됐습니다. 플랫폼이 콘텐츠를 소비하는 구조가 자리를 잡기 시작했습니다.", source: "뉴스레터 #12", date: "2025-09-06" },
        { theme: "company",  tag: "기업",   body: "MS Office 365에 Claude Sonnet 4가 공식 도입됐습니다. <strong>ChatGPT 독점 구조가 처음으로 깨졌습니다.</strong> 모델 성능보다 플랫폼 통합 경쟁으로 이동하는 신호였습니다.", source: "뉴스레터 #13", date: "2025-09-13" },
        { theme: "research", tag: "리서치", body: "판사가 Google 크롬 매각 요구를 기각하고 데이터 공유 명령을 내리며 <strong>'생성형 AI의 등장이 사건 판세를 바꿨다'</strong>고 밝혔습니다. AI가 규제 판단의 새 변수가 됐습니다.", source: "뉴스레터 #12", date: "2025-09-06" },
        { theme: "survival", tag: "생존",   body: "스탠퍼드 연구에서 AI 노출 직종의 <strong>22~25세 취업률이 18~20% 감소</strong>했습니다. 고용 충격은 저숙련직이 아닌 고학력 청년층에서 먼저 데이터로 확인됐습니다.", source: "뉴스레터 #11", date: "2025-08-30" },
        { theme: "research", tag: "리서치", body: "AI 도구를 자주 쓰는 사람일수록 비판적 사고력이 낮았습니다. <strong>특히 젊은 세대에서 AI 의존도와 사고력 저하의 상관관계</strong>가 가장 두드러졌습니다.", source: "AI를 많이 쓸수록 비판적 사고력이 떨어진다", url: "../research/2025-09-10-ai-cognitive-offloading.html", date: "2025-09-10", roasting: "AI가 대신 생각해 주는데 왜 굳이 머리를 쓰냐고?<br>그 태도가 이미 비판적 사고력 하락의 증거입니다.", summaries: ["AI 도구를 자주 쓰는 사람일수록 비판적 사고력이 낮습니다.", "'생각을 AI에게 맡기는 습관'이 사고력 저하의 핵심 원인입니다.", "특히 젊은 세대에서 AI 의존도가 높고, 사고력 저하도 가장 뚜렷합니다."] },
        { theme: "research", tag: "리서치", body: "AI가 생성한 저품질 결과물(Workslop)이 조직에 쌓이고 있습니다. <strong>AI 산출물 품질 관리 체계가 없는 조직이 가장 큰 위험에 노출</strong>됩니다.", source: "AI가 만든 쓰레기, Workslop이 조직을 먹는다", url: "../research/2025-09-22-workslop.html", date: "2025-09-22", roasting: "AI가 일을 줄여준다고요? 동료에게 쓰레기를 넘기고 있을 뿐입니다.<br>당신이 아낀 30분, 받는 사람은 2시간을 씁니다.", summaries: ["근로자 40%가 AI로 만든 저품질 결과물, 'Workslop'을 받고 있습니다.", "받는 사람은 이를 수정하는 데 건당 평균 116분을 씁니다. 만 명 규모의 조직이라면 연간 900만 달러가 낭비됩니다.", "한 사람이 아낀 시간이 동료의 업무 시간을 잠식하는, 구조적인 문제입니다."] },

    {

      epRange: "뉴스레터 #15~28 · 포스트 5개",
      headline: "규모의 전쟁: 자본, 칩, 데이터센터가 AI 산업의 실제 진입 장벽이 됐습니다",
      summary: "모델 성능보다 인프라 확보가 핵심 지표로 자리를 잡았습니다. 시장 과반이 거품을 공식 인정하기 시작했고, AI 자동화 로드맵이 구체적인 숫자와 일정을 달고 발표됐습니다.",
      insights: [
        { theme: "company",  tag: "기업",   body: "Nvidia가 OpenAI에 GPU 400~500만 개를 공급하는 <strong>최대 1,000억 달러 투자</strong>를 추진했습니다. 칩 공급이 AI 생태계의 전략적 지렛대가 됐습니다.", source: "뉴스레터 #15", date: "2025-09-27" },
        { theme: "company",  tag: "기업",   body: "AI 데이터센터 전력 수요가 2030년 <strong>134.4기가와트</strong>에 달할 전망입니다. 계획된 석탄 발전소 폐쇄 23개 중 13개가 취소됐습니다.", source: "뉴스레터 #28", date: "2025-12-27" },
        { theme: "leader",   tag: "리더",   body: "구글 딥마인드 CEO 하사비스가 리소스의 <strong>50%를 스케일링에, 50%를 혁신에</strong> 배분한다고 공개했습니다. AI에서 수학의 AlphaGo, 지속적 온라인 학습, 환각 제어 세 가지가 아직 없다고 진단했습니다.", source: "지능의 미래", url: "../leader/2025-12-17-demis-hassabis-future-of-intelligence.html", date: "2025-12-17", roasting: "AGI까지 50%는 스케일링, 50%는 혁신이 필요하다고?<br>당신 회사의 AI 전략은 100% 벤더 의존 아닙니까?", summaries: ["구글 딥마인드 CEO 데미스 하사비스가 AGI에 도달하려면 스케일링 50%와 혁신 50%가 모두 필요하다고 밝혔습니다.", "월드 모델(Genie)과 시뮬레이션 에이전트(Simma)의 결합이 로보틱스, 과학 연구, 게임까지 확장되며 차세대 AI 훈련의 핵심 루프로 부상하고 있습니다.", "하사비스는 \"아직 우주에서 계산 불가능한 것은 발견되지 않았다\"며, 튜링 머신의 한계를 시험하는 것이 딥마인드의 본질이라고 선언했습니다."] },
        { theme: "research", tag: "리서치", body: "BofA 조사에서 펀드 매니저의 <strong>54%가 AI 버블을 지목</strong>했습니다. 역대 최고치였습니다. OpenAI는 130억 달러 매출에 90억 달러 손실을 공시했습니다.", source: "뉴스레터 #17", date: "2025-10-11" },
        { theme: "research", tag: "리서치", body: "빅테크의 AI 칩 감가상각 기간이 실제 장부 기록(5~6년)보다 짧은 <strong>18~36개월로 운용</strong>됐습니다. 설비 투자 거품 논란이 구체적인 수치로 가시화됐습니다.", source: "뉴스레터 #27", date: "2025-12-20" },
        { theme: "tech",     tag: "기술",   body: "중국 오픈소스 모델의 글로벌 점유율이 <strong>17%로 미국(15.8%)을 처음 앞질렀습니다.</strong> Qwen 누적 다운로드가 5억 4천만 회를 돌파했습니다.", source: "뉴스레터 #23", date: "2025-11-22" },
        { theme: "leader",   tag: "리더",   body: "ChatGPT 주간 활성 사용자가 8억 명을 돌파했습니다. 알트만은 수직 통합 반대 입장을 철회하고 <strong>연구·인프라·소비자 제품을 하나로 엮는 전략</strong>을 선택했습니다.", source: "샘 알트만의 4가지 베팅", url: "../leader/2025-10-09-sam-altman-openai-four-bets.html", date: "2025-10-09", roasting: "AI 전략이 있다면서 인프라는 남의 것을 빌리고, 에너지는 생각도 안 하고 있다면,<br>그건 전략이 아니라 희망사항입니다.", summaries: ["샘 알트만은 수직 통합에 반대하던 입장을 철회하고, AGI 달성을 위해 연구·인프라·소비자 제품을 하나로 엮는 전략을 선택했습니다.", "그가 제시한 진짜 튜링 테스트는 \"AI가 과학 연구를 수행할 수 있는가\"이며, GPT-5에서 그 가능성이 드러나기 시작했습니다.", "에너지와 AI는 별개의 관심사였으나 하나로 합쳐졌고, 장기적으로 태양광과 원자력이 AI 인프라의 기반이 될 것이라고 전망합니다."] },
        { theme: "tech",     tag: "기술",   body: "70개 이상 AI 모델의 답변을 분석한 결과 서로 다른 회사 모델 간 답변이 <strong>71~82% 겹쳤습니다.</strong> 모델 차별화가 점점 어려워지고 있습니다.", source: "AI 70개에게 같은 질문을 던졌더니", url: "../tech/2025-10-27-artificial-hivemind.html", date: "2025-10-27", roasting: "AI에게 창의적 아이디어를 기대한다고?<br>70개 모델이 같은 답을 하고 있습니다.", summaries: ["70개 넘는 AI에 같은 질문을 던지면, 같은 AI는 10번 중 8번 거의 똑같은 답을 냅니다.", "다른 회사 AI끼리도 답이 71~82% 겹칩니다. 어떤 모델은 문장까지 똑같습니다.", "\"AI 여러 개 쓰면 다양한 아이디어가 나온다\"는 생각은 틀렸습니다."] },
        { theme: "company",  tag: "기업",   body: "Google Gemini가 미 육군 GenAI.mil에 배치되어 <strong>300만 명 이상이 사용</strong>하게 됐습니다. 군사 AI 배치가 실전 단계로 진입했습니다.", source: "뉴스레터 #26", date: "2025-12-13" },
        { theme: "leader",   tag: "리더",   body: "피터 틸이 AI의 경제적 효과를 <strong>'GDP 연 1% 기여, 1990년대 인터넷 수준'</strong>으로 평가했습니다. 중소기업 43%가 규제 불확실성을 AI 도입 최대 장벽으로 꼽았습니다.", source: "피터 틸의 적그리스도 강연", url: "../leader/2025-11-10-peter-thiel-antichrist-lectures.html", date: "2025-11-10", roasting: "\"적그리스도를 걱정하는 자유지상주의자\"라니.<br>강연료 200달러는 종말론의 시장 가격입니까, 영향력의 입장료입니까?", summaries: ["피터 틸이 비공개 강연 4회에서 \"적그리스도\"를 경고했습니다. 기술에 대한 공포를 이용해 권력을 잡는 존재가 온다는 주장입니다.", "그의 논리는 명확합니다. AI, 기후변화, 핵전쟁 공포가 기술 정체를 정당화하고, 결국 글로벌 단일 정부로 이어진다는 것입니다.", "275억 달러 자산을 가진 이 투자자의 세계관은 실리콘밸리 투자 방향과 AI 규제 논의에 직접 영향을 미칩니다."] },
        { theme: "survival", tag: "생존",   body: "아마존이 <strong>2027년까지 60만 개 일자리를 로봇으로 대체</strong>하겠다고 발표했습니다. AI 고용 충격이 공식 기업 전략으로 선언된 첫 사례였습니다.", source: "뉴스레터 #19", date: "2025-10-25" },
        { theme: "survival", tag: "생존",   body: "MIT 연구에서 AI가 미국 노동력의 <strong>11.7%(임금 규모 1조 2천억 달러)</strong>를 대체 가능하다고 추산했습니다. Accenture는 같은 시기 21,800명을 정리해고했습니다.", source: "뉴스레터 #24", date: "2025-11-29" },
        { theme: "research", tag: "리서치", body: "미국 정규직 1,150명 중 <strong>53%가 AI 생성 업무물 일부가 저품질임을 인정하면서도 발송</strong>했습니다. 팀 신뢰 수준이 높은 조직에서 Workslop 발생률이 61% 감소했습니다.", source: "Workslop은 개인의 게으름이 아니라 경영 실패다", url: "../research/2026-01-16-workslop-pressure-cooker.html", date: "2026-01-16", roasting: "AI 쓰라고 시켜놓고, 쓰레기가 나오면 직원 탓?<br>거울 먼저 보십시오.", summaries: ["AI 생성 저품질 결과물(Workslop)의 53%는 직원이 스스로 품질이 낮다고 인지하면서도 발송한 것입니다.", "Workslop의 근본 원인은 개인의 게으름이 아니라, 불명확한 AI 사용 지침과 과부하된 조직 환경입니다.", "팀 내 신뢰 수준이 높은 조직에서 Workslop 발생률이 61% 감소합니다."] },
        { theme: "research", tag: "리서치", body: "AI 시대 저작권 딜레마를 분석합니다. <strong>합법적으로 산 책의 AI 학습 vs 불법 복제본, 어떻게 구분할 것인가</strong>의 문제입니다.", source: "AI 시대 저작권 딜레마", url: "../research/2025-06-13-copyright-dilemma-in-ai-era.html", date: "2025-06-13", roasting: "합법 구매 vs 불법 복제 구분보다 중요한 것은 AI 시대 저작권 제도 자체를 새로 설계하는 것입니다.", summaries: ["합법 구매 저작물과 불법 복제본의 AI 학습 경계가 모호합니다.", "저작권 제도가 AI 시대 현실을 따라가지 못하고 있습니다.", "새로운 AI 저작권 프레임 설계가 시급합니다."] },
        { theme: "tech", tag: "기술", body: "WWDC 2025에서 Apple이 혁신을 보여주지 못했습니다. <strong>Apple Intelligence의 한계가 드러났습니다.</strong>", source: "WWDC 2025 Apple의 혁신 부재", url: "../tech/2025-06-14-no-innovation-at-apple-wwdc-2025.html", date: "2025-06-14", roasting: "애플이 뒤처지고 있습니다. 디바이스 AI 통합에서 경쟁자들이 더 빠릅니다.", summaries: ["WWDC 2025에서 Apple Intelligence의 한계가 드러났습니다.", "AI 분야에서 애플의 경쟁 우위가 약해지고 있습니다.", "하드웨어 생태계 우위만으로는 AI 시대에 부족합니다."] },
        { theme: "company", tag: "기업", body: "Perplexity가 크롬 인수를 원하는 이유를 분석합니다. <strong>검색 AI가 브라우저를 장악하려는 전략</strong>입니다.", source: "Perplexity가 크롬을 원하는 이유", url: "../company/2025-06-15-why-perplexity-wants-to-acquire-chrome.html", date: "2025-06-15", roasting: "AI 검색이 브라우저를 먹으면 구글의 검색 독점이 끝납니다. 판이 바뀌고 있습니다.", summaries: ["Perplexity의 크롬 인수 시도는 AI 검색 패권 전략입니다.", "브라우저 장악이 AI 검색 기본값 확보의 지름길입니다.", "검색 시장 재편이 AI 기업 M&A의 핵심 동인입니다."] },
        { theme: "company", tag: "기업", body: "부정행위도 AI 비즈니스 기회가 됩니다. <strong>AI 탐지·예방 시장이 빠르게 성장</strong>하고 있습니다.", source: "부정행위도 AI 비즈니스 기회다", url: "../company/2025-06-20-cheating-is-also-an-ai-business-opportunity.html", date: "2025-06-20", roasting: "AI가 부정행위를 쉽게 만들었습니다. 그 탐지 시장도 AI가 키웁니다.", summaries: ["AI 기반 부정행위가 증가하면서 탐지 시장도 성장합니다.", "AI 리스크 관리가 새로운 비즈니스 카테고리로 부상합니다.", "교육·채용·법률 등 다양한 분야에서 AI 진위 확인 수요가 폭발합니다."] },
        { theme: "leader", tag: "리더", body: "구글 딥마인드 CEO의 비전을 분석합니다. <strong>스케일링 50%, 혁신 50%의 균형이 AGI로 가는 길</strong>입니다.", source: "구글 딥마인드 CEO 비전", url: "../leader/2025-06-20-google-deepmind-ceo-vision.html", date: "2025-06-20", roasting: "당신 회사의 AI 전략은 스케일링 100%입니까, 혁신 100%입니까? 하사비스는 50:50이라고 했습니다.", summaries: ["하사비스는 AGI 달성에 스케일링과 혁신 각 50%가 필요하다고 밝혔습니다.", "딥마인드는 로보틱스·과학 연구·게임 세 분야를 동시에 추진합니다.", "AI 전략에서 확장과 혁신의 균형이 장기 경쟁력을 결정합니다."] },
        { theme: "research", tag: "리서치", body: "합법 구매 책과 불법 복제본의 AI 학습 기준을 분석합니다. <strong>저작권 판단이 AI 학습 방식에 따라 달라질 수 있습니다.</strong>", source: "합법 구매 책 공정이용 vs 불법 복제 침해", url: "../research/2025-06-20-legally-bought-books-fair-use-pirated-books-infringement.html", date: "2025-06-20", roasting: "어떻게 구했느냐보다 어떻게 쓰느냐가 저작권 판단 기준이 될 수 있습니다.", summaries: ["AI 학습 데이터의 출처 합법성 기준이 모호합니다.", "법원마다 판단이 다른 AI 저작권 사례들이 쌓이고 있습니다.", "AI 저작권 판례 축적이 업계 표준 형성에 핵심입니다."] },
        { theme: "company", tag: "기업", body: "미국 스테이블코인 법안의 기대와 우려를 분석합니다. <strong>규제 명확성이 디지털 달러 패권을 강화</strong>합니다.", source: "미국 스테이블코인 법안", url: "../company/2025-06-25-us-stablecoin-bill-hopes-and-concerns.html", date: "2025-06-25", roasting: "스테이블코인 규제는 암호화폐 규제가 아닙니다. 달러 패권의 디지털 확장 전략입니다.", summaries: ["미국 GENIUS Act가 스테이블코인에 첫 연방 규제를 만들었습니다.", "규제 명확성이 달러 기반 디지털 금융 생태계를 강화합니다.", "한국의 디지털 금융 전략에도 지정학 맥락이 필요합니다."] },
        { theme: "tech", tag: "기술", body: "AI로 인간 유전자를 해석합니다. <strong>의료 AI가 유전체 분석에 새로운 가능성</strong>을 열고 있습니다.", source: "AI로 인간 유전자 해석하기", url: "../tech/2025-06-27-interpreting-human-genetics-with-ai.html", date: "2025-06-27", roasting: "AI가 유전체를 읽습니다. 의료 AI의 다음 전선은 예방에서 예측으로 이동합니다.", summaries: ["AI가 유전체 데이터 해석을 가속하고 있습니다.", "맞춤형 의료와 예측 의학이 AI로 현실화됩니다.", "의료 AI 데이터 윤리와 규제 설계가 병행되어야 합니다."] },
        { theme: "company", tag: "기업", body: "구글이 애플에 지도 데이터 내보내기를 요청한 배경을 분석합니다. <strong>플랫폼 간 데이터 개방 압력이 높아지고 있습니다.</strong>", source: "구글이 애플에 지도 데이터를 요청한 이유", url: "../company/2025-07-01-google-apple-map-data-export-request.html", date: "2025-07-01", roasting: "데이터 개방은 경쟁이 아닌 생태계 전략입니다. 닫힌 플랫폼은 AI 시대에 더 불리합니다.", summaries: ["구글이 애플 지도 데이터 공유를 요청했습니다.", "플랫폼 간 데이터 개방 압력이 반독점 논의와 맞물립니다.", "AI 시대에 데이터 개방성이 경쟁 전략의 핵심 변수입니다."] },
        { theme: "survival", tag: "생존", body: "어른은 되는데 왜 우리는 안 되냐는 질문을 분석합니다. <strong>AI 시대 세대 간 기술 격차와 공정성 논의</strong>입니다.", source: "어른은 되는데 왜 우리는 안 되냐", url: "../survival/2025-07-05-why-can-adults-do-it-but-not-us.html", date: "2025-07-05", roasting: "어른은 쓰고 아이는 못 쓰게 하는 AI 정책은 교육이 아닙니다. 리터러시를 가르쳐야 합니다.", summaries: ["AI 사용에서 세대별 이중 기준이 논란입니다.", "AI 리터러시 교육이 사용 제한보다 중요합니다.", "어린 세대의 AI 역량 개발이 국가 경쟁력과 직결됩니다."] },
        { theme: "research", tag: "리서치", body: "편향된 AI 금지 법안의 함의를 분석합니다. <strong>AI 중립성 정의가 정치적으로 복잡해지고 있습니다.</strong>", source: "편향된 AI 금지 법안", url: "../research/2025-07-10-ban-left-biased-ai.html", date: "2025-07-10", roasting: "AI 편향을 누가 정의하느냐가 다음 정치 전쟁입니다.", summaries: ["AI 편향 금지 법안이 정치적 도구로 활용되고 있습니다.", "AI 중립성 정의 자체가 정치적 논쟁의 중심이 됩니다.", "기업 AI 거버넌스에서 편향 기준 설계가 중요해집니다."] },
        { theme: "company", tag: "기업", body: "OpenAI를 더 이상 선두로 볼 수 없는 이유를 분석합니다. <strong>스케일링 법칙 한계로 AI 경쟁이 재편</strong>됩니다.", source: "OpenAI는 더 이상 선두가 아니다", url: "../company/2025-07-10-why-openai-is-no-longer-the-leader.html", date: "2025-07-10", roasting: "GPT가 최고라는 시대는 끝났습니다. 경쟁은 이미 새로운 판에서 벌어지고 있습니다.", summaries: ["스케일링 법칙 한계로 OpenAI 독주 체제가 흔들립니다.", "구글·메타·xAI가 각자의 전략으로 추격합니다.", "모델 선택 기준이 성능에서 생태계로 이동합니다."] },
        { theme: "company", tag: "기업", body: "젠슨 황이 중국에 가는 이유를 분석합니다. <strong>수출 규제 속에서도 중국 시장 유지가 엔비디아의 전략</strong>입니다.", source: "젠슨 황이 중국에 가는 이유", url: "../company/2025-07-15-why-jensen-huang-is-going-to-china.html", date: "2025-07-15", roasting: "수출 규제가 중국을 막지 못합니다. 젠슨 황은 그것을 누구보다 잘 압니다.", summaries: ["엔비디아 중국 매출이 95%에서 50%로 감소했습니다.", "젠슨 황의 중국 방문은 관계 유지와 시장 복원 시도입니다.", "반도체 수출 규제의 실효성에 대한 의문이 커지고 있습니다."] },
        { theme: "leader", tag: "리더", body: "메타가 ASI를 선언한 이유를 분석합니다. <strong>AGI 경쟁에서 밀린 메타가 새로운 판을 선점</strong>했습니다.", source: "메타가 ASI를 선언한 이유", url: "../leader/2025-07-15-why-meta-declared-asi.html", date: "2025-07-15", roasting: "AGI에서 밀리면 ASI 판을 만들면 됩니다. 먼저 이름 붙이는 자가 경쟁 규칙을 만듭니다.", summaries: ["메타가 AGI를 넘어 ASI 목표를 선언했습니다.", "OpenAI 출신 11명 영입으로 AI 인재 전쟁이 가속됩니다.", "AI 경쟁의 언어를 먼저 정의하는 자가 판을 주도합니다."] },
        { theme: "tech", tag: "기술", body: "GPU 한계를 넘어서는 중국 AI 모델들을 분석합니다. <strong>제약 속에서 혁신한 중국 AI가 글로벌 경쟁에 등장</strong>했습니다.", source: "GPU 한계를 뛰어넘은 중국 AI 모델", url: "../tech/2025-07-20-china-ai-models-surpassing-gpu-limits.html", date: "2025-07-20", roasting: "막으면 막을수록 만들어냅니다. 중국 AI의 진짜 위협은 제약 속에서 나왔습니다.", summaries: ["중국 AI 모델이 GPU 제약 속에서도 글로벌 순위에 올랐습니다.", "수출 규제가 오히려 중국의 기술 자립을 앞당기고 있습니다.", "제약이 혁신을 만드는 역설이 현실화됩니다."] },
        { theme: "company", tag: "기업", body: "국가 AI 파운데이션 모델 사업을 분석합니다. <strong>K-AI 사업에 2,400억 원이 투자되고 5개 기업이 선정</strong>됐습니다.", source: "국가 AI 파운데이션 모델 사업", url: "../company/2025-07-25-national-ai-foundation-model-project.html", date: "2025-07-25", roasting: "국가 모델 하나가 모든 것을 해결하지 않습니다. 생태계 설계가 더 중요합니다.", summaries: ["과기정통부 K-AI 사업에 LG, 네이버클라우드 등 5개 기업이 선정됐습니다.", "2,400억 원 투자로 2027년까지 국산 AI 모델을 확보할 계획입니다.", "소버린 AI의 성공은 모델 개발보다 생태계 설계에 달려 있습니다."] },
        { theme: "tech", tag: "기술", body: "중국의 개방형 AI 전략을 분석합니다. <strong>오픈소스를 무기로 AI 생태계 주도권을 노립니다.</strong>", source: "중국의 오픈소스 AI", url: "../tech/2025-08-05-chinas-open-source-ai.html", date: "2025-08-05", roasting: "중국이 공짜로 줍니다. 생태계 의존성을 만들기 위해서입니다.", summaries: ["중국이 오픈소스 AI로 글로벌 생태계 주도권을 노립니다.", "무료 공개가 오히려 더 강한 생태계 잠금을 만들 수 있습니다.", "오픈소스 AI의 지정학적 의미를 이해해야 합니다."] },
        { theme: "company", tag: "기업", body: "K-AI 사업에 선정된 5개 기업을 분석합니다. <strong>LG, 네이버클라우드, 업스테이지, SK텔레콤, NC AI가 선정</strong>됐습니다.", source: "K-AI 사업 선정 5개 기업", url: "../company/2025-08-05-five-companies-selected-for-k-ai-project.html", date: "2025-08-05", roasting: "KT와 카카오가 탈락했습니다. 선정 기준과 생태계 설계 의지를 봐야 합니다.", summaries: ["K-AI 사업 5개 컨소시엄이 확정됐습니다.", "KT·카카오 탈락으로 예상치 못한 결과가 나왔습니다.", "선정된 기업들의 실행력과 생태계 개방성이 성공 관건입니다."] },
        { theme: "tech", tag: "기술", body: "DeepSeek R2 출시가 지연되는 이유를 분석합니다. <strong>화웨이 Ascend 칩 CUDA 비호환이 핵심 장벽</strong>입니다.", source: "DeepSeek R2 출시가 늦어지는 이유", url: "../tech/2025-08-10-why-deepseek-r2-launch-is-delayed.html", date: "2025-08-10", roasting: "성능이 좋아도 생태계 호환이 안 되면 무용지물입니다. AI 경쟁의 진짜 전선은 칩 생태계입니다.", summaries: ["DeepSeek R2가 화웨이 칩 CUDA 비호환 문제로 출시가 지연됩니다.", "AI 모델 성능보다 칩 생태계 호환성이 더 중요한 변수입니다.", "중국 AI 자립의 가장 큰 병목이 칩 생태계임이 드러납니다."] },
        { theme: "tech", tag: "기술", body: "메타 AI가 음성 기술에 베팅합니다. <strong>다음 AI 인터페이스 전쟁이 음성에서 벌어집니다.</strong>", source: "음성 기술에 베팅하는 메타 AI", url: "../tech/2025-08-15-meta-ai-betting-on-voice-technology.html", date: "2025-08-15", roasting: "텍스트보다 음성이 더 자연스럽습니다. 다음 AI 전쟁터는 귀입니다.", summaries: ["메타가 PlAyAI, Waveforms 인수로 음성 AI 역량을 강화했습니다.", "LLM 경쟁에서 밀린 메타가 음성 인터페이스로 새 판을 열고 있습니다.", "웨어러블·스마트홈과 결합한 음성 AI가 다음 플랫폼 경쟁의 핵심입니다."] },
        { theme: "tech", tag: "기술", body: "2025 베이징 첫 휴머노이드 로봇 대회를 분석합니다. <strong>중국이 로봇 산업 생태계를 빠르게 구축</strong>하고 있습니다.", source: "2025 베이징 첫 휴머노이드 로봇 대회", url: "../tech/2025-08-17-2025-beijing-first-humanoid-robot-competition.html", date: "2025-08-17", roasting: "AI가 걷기 시작했습니다. 생성형 AI에 집중하는 동안 중국은 로봇에게 달리기를 가르쳤습니다.", summaries: ["세계 최초 휴머노이드 로봇 대회가 베이징에서 열렸습니다.", "중국이 1,370억 달러 규모의 로봇 생태계를 구축 중입니다.", "로봇 AI 통합이 제조·물류·서비스 산업을 빠르게 재편합니다."] },
        { theme: "research", tag: "리서치", body: "MIT 보고서의 진짜 의미를 분석합니다. <strong>생성형 AI 도입 95%가 ROI를 달성하지 못합니다.</strong>", source: "MIT 보고서의 진짜 의미", url: "../research/2025-08-20-the-real-meaning-of-mit-report.html", date: "2025-08-20", roasting: "95%가 실패한다는 것보다 5%가 성공한다는 것이 더 중요합니다. 차이는 기술이 아니라 도입 방식입니다.", summaries: ["MIT 보고서는 기업 GenAI 파일럿의 95%가 ROI에 실패한다고 밝혔습니다.", "실패 원인은 기술이 아니라 도입 프로세스와 조직 준비도입니다.", "성공한 5%의 공통점을 벤치마킹하는 것이 현실적 전략입니다."] },
        { theme: "company", tag: "기업", body: "미국 정부가 인텔 3대 주주가 됐습니다. <strong>반도체가 국가 전략 자산으로 공식화</strong>됐습니다.", source: "미국 정부가 인텔 3대 주주가 된 이유", url: "../company/2025-08-23-us-government-becomes-third-largest-intel-shareholder.html", date: "2025-08-23", roasting: "정부가 주주가 됐습니다. AI 칩 전쟁은 기업 대 기업이 아니라 국가 대 국가입니다.", summaries: ["미국 정부가 인텔 지분 10%를 89억 달러에 인수했습니다.", "반도체가 공식적인 국가 전략 자산이 됐습니다.", "칩 산업의 지정학화가 가속되고 있습니다."] },
        { theme: "company", tag: "기업", body: "엘론 머스크가 애플과 OpenAI를 고소한 이유를 분석합니다. <strong>iOS ChatGPT 기본값 탑재가 반독점 소지</strong>가 있다는 주장입니다.", source: "엘론 머스크가 애플·OpenAI를 고소한 이유", url: "../company/2025-08-28-why-elon-musk-sued-apple-and-openai.html", date: "2025-08-28", roasting: "선택할 수 없는 AI는 독점입니다. AI 기본값 전쟁이 반독점법 전쟁으로 번집니다.", summaries: ["xAI가 iOS ChatGPT 기본 탑재를 반독점으로 소송했습니다.", "AI 기본값 경쟁이 법적 전쟁으로 이어집니다.", "AI 플랫폼 독점 규제 논의가 빠르게 확산됩니다."] }

    {
      id: 3, quarter: "26 Q1",
      period: "2026.1~3월",
      epRange: "뉴스레터 #29~41 · 포스트 39개",
      headline: "에이전트 전환점: 규제, 노동, 플랫폼 지형이 동시에 흔들렸습니다",
      summary: "성능 경쟁은 끝나고 수익성 증명과 조직 생존 문제가 전면에 나왔습니다. Sora 종료와 토큰 쿼터 논란이 AI 서비스의 지속가능성 문제를 수면 위로 올렸습니다.",
      insights: [
        { theme: "company",  tag: "기업",   body: "젠슨 황이 GTC 2026에서 <strong>'토큰은 새로운 원자재'</strong>를 선언했습니다. Blackwell과 Vera Rubin 주문만 1조 달러를 넘으며 1년 전의 두 배가 됐습니다. Vera Rubin은 Blackwell 대비 메가와트당 처리량이 35배 향상됐습니다.", source: "뉴스레터 #40 · 젠슨 황 GTC 2026 키노트", url: "../company/2026-03-17-nvidia-gtc26-keynote.html", date: "2026-03-17", roasting: "NVIDIA는 더 이상 GPU 회사가 아닙니다. 토큰 공장의 설계자입니다.<br>당신의 회사는 아직 GPU를 \"서버에 꽂는 부품\"으로 보고 있습니까?", summaries: ["NVIDIA가 GTC 2026에서 차세대 Vera Rubin 플랫폼을 공개했습니다. 1GW 데이터센터 기준 토큰 생성 속도를 2년 내 200만에서 7억으로, 350배 끌어올리겠다는 로드맵입니다.", "3D 그래픽과 생성형 AI를 결합한 DLSS 5, 구조화 데이터 가속 라이브러리 KUDF/KVS, 오픈소스 에이전트 프레임워크 Open Claw을 동시에 발표했습니다.", "젠슨 황은 \"데이터센터는 토큰 공장이고, 토큰당 와트가 곧 매출\"이라고 선언했습니다. 컴퓨팅의 단위가 FLOPS에서 토큰으로 바뀌는 전환점입니다."] },
        { theme: "research", tag: "리서치", body: "Meta·UC Berkeley 연구진(LeCun, Dupoux, Malik)이 현재 AI의 배포 후 자율 학습 능력은 <strong>사실상 0</strong>이라고 진단했습니다. 실현에는 수십 년이 걸릴 수 있습니다.", source: "AI는 왜 아직도 스스로 배우지 못하는가", url: "../research/2026-03-16-why-ai-cant-learn.html", date: "2026-03-16", roasting: "ChatGPT가 똑똑하다고? 배포된 순간 학습 능력은 0입니다.<br>3살짜리 아이보다 못 배우는 AI에 전사 전략을 걸고 있다면, 그 전략부터 다시 배워야 합니다.", summaries: ["META와 UC Berkeley 연구진이 현재 AI의 핵심 한계를 짚었습니다. 배포된 AI는 새로운 환경에서 스스로 배우는 능력이 사실상 0입니다.", "아이는 관찰과 행동을 오가며 스스로 학습하지만, AI는 사람이 설계한 학습 레시피 없이는 아무것도 배우지 못합니다. 이 논문은 관찰 학습(System A), 행동 학습(System B), 메타 제어(System M) 3요소 프레임워크를 제시합니다.", "이 프레임워크가 실현되려면 수십 년이 걸릴 수 있습니다. 하지만 경영 리더에게 지금 중요한 것은 현재 AI의 한계를 정확히 아는 것입니다."] },
        { theme: "leader",   tag: "리더",   body: "AlphaFold가 <strong>2억 개 단백질 구조를 규명</strong>해 300만 명 이상의 연구자가 활용합니다. AI R&D 도구를 쓰는 조직은 그렇지 않은 조직 대비 생산성이 25~40% 높습니다.", source: "알파고 10주년", url: "../leader/2026-03-10-alphago-10-years.html", date: "2026-03-10", roasting: "바둑 한 판이 10년 만에 노벨상이 됐습니다.<br>당신의 10년 전략은 아직도 엑셀에 갇혀 있지는 않습니까?", summaries: ["2016년 AlphaGo가 이세돌 9단을 꺾은 지 10년. 구글 딥마인드 데미스 하사비스 대표가 그 여정을 돌아보며 AI가 과학을 어떻게 바꿨는지 정리했습니다.", "AlphaGo의 신경망+탐색+강화학습 조합은 단백질 구조 예측(AlphaFold), 수학 올림피아드(AlphaProof), 알고리즘 발견(AlphaEvolve)으로 확장되며 노벨 화학상까지 이끌었습니다.", "하사비스는 \"37수 같은 창의성의 불꽃이 과학 발견의 황금시대를 열고 있다\"며 AGI로 가는 구체적 로드맵을 제시했습니다."] },
        { theme: "tech",     tag: "기술",   body: "OpenAI가 <strong>Sora를 출시 6개월 만에 종료</strong>했습니다. 피크 운영 비용이 하루 최대 1,500만 달러로 추산됐습니다. ByteDance는 SeeDance 2.0을 캡컷(월간 사용자 4억 명)에 내장하며 빈자리를 채웠습니다.", source: "뉴스레터 #41", date: "2026-03-28" },
        { theme: "company",  tag: "기업",   body: "a16z 파트너 David George가 소프트웨어 기업에 남은 길은 <strong>AI 신제품으로 성장률 10포인트 달성 또는 영업이익률 40% 달성</strong> 두 가지뿐이라고 선언했습니다.", source: "소프트웨어에 남은 길은 두 가지뿐이다", url: "../company/2026-03-23-two-paths-for-software.html", date: "2026-03-23", roasting: "성장 10포인트, 마진 40%.<br>둘 중 하나를 못 고르면 시장이 골라줍니다. 주가 하락이라는 방식으로.", summaries: ["소프트웨어 기업에 남은 길은 두 가지입니다. AI 제품으로 성장률 10포인트를 올리거나, 영업이익률 40%를 만드는 것입니다.", "중간 지대는 사라졌습니다. 적당한 성장과 적당한 마진의 조합은 주식시장에서 보상받지 못합니다.", "a16z 파트너 David George는 12~18개월 내 경로 확정을 촉구합니다."] },
        { theme: "leader",   tag: "리더",   body: "OpenClaw가 공개 수일 만에 <strong>GitHub 18만 스타</strong>를 넘었습니다. 역대 가장 빠른 오픈소스 성장 사례 중 하나였으며, 발표 3일 뒤 OpenAI가 창시자를 영입했습니다.", source: "OpenClaw 창시자의 에이전트 엔지니어링 선언", url: "../leader/2026-02-12-peter-steinberger-openclaw-agentic-engineering.html", date: "2026-02-12", roasting: "재미있어서 만들었다는 사람이 GitHub 18만 스타를 받았습니다.<br>치열하게 기획한 팀은 아직 제품-시장 적합성을 찾는 중입니까?", summaries: ["피터 슈타인베르거는 재미로 만든 AI 에이전트 OpenClaw로 공개 수일 만에 GitHub 18만 스타를 받았습니다.", "그는 WhatsApp 메시지 한 줄로 Claude Code를 호출하는 에이전트 루프를 1시간 만에 완성했습니다.", "이 대담 3일 뒤인 2월 15일, OpenAI가 피터를 영입했습니다. 샘 알트만은 그를 \"차세대 개인 에이전트를 이끌 천재\"라고 소개했습니다."] },
        { theme: "leader",   tag: "리더",   body: "카파시가 2025년 12월 이후 코드를 직접 쓰지 않는다고 밝혔습니다. <strong>'에이전트가 운동 기록을 관리하면 피트니스 앱이 필요 없다. 앱스토어 앱 대부분은 존재할 이유가 없다.'</strong>", source: "카파시: 12월 이후 코드를 한 줄도 안 짰다", url: "../leader/2026-03-20-karpathy-end-of-coding.html", date: "2026-03-20", roasting: "카파시는 12월부터 코드를 안 씁니다.<br>개발팀이 아직도 직접 코딩하고 있습니까?", summaries: ["카파시는 12월 이후 코드를 직접 쓰지 않습니다. 모든 작업을 AI 에이전트에 위임합니다.", "에이전트를 병렬로 운영하고, 기능 단위로 작업을 분배합니다. 생산성의 병목이 GPU에서 토큰 처리량으로 바뀌었습니다.", "카파시는 집 전체를 제어하는 홈 에이전트까지 운영합니다. 앱이 사라지고 API와 에이전트만 남는 미래를 제시합니다."] },
        { theme: "tech",     tag: "기술",   body: "Harvard 교수가 Claude Opus 4.5로 양자역학 논문을 <strong>2주 만에 완성</strong>했습니다. 원래 1~2년이 걸리는 작업이었습니다. AI는 270회 세션과 51,248건의 메시지를 통해 논문 110개 버전을 생성했습니다.", source: "교수가 AI로 1년 연구를 2주에 끝냈다", url: "../tech/2026-03-23-vibe-physics-ai-grad-student.html", date: "2026-03-23", roasting: "AI가 대학원 2학년이 됐습니다.<br>당신 회사 업무는 몇 학년 수준입니까?", summaries: ["하버드 교수 Matthew Schwartz가 Claude Opus 4.5로 양자역학 논문을 2주 만에 완성했습니다. 원래 1~2년이 걸릴 연구였습니다.", "AI는 270회 세션과 5만 1,248건의 메시지를 통해 논문 110개 버전을 생성했습니다. 교수의 직접 감독 시간은 50~60시간이었습니다.", "AI는 반복 계산을 10배 가속했지만, 연구 방향을 판단하는 능력은 아직 인간이 제공해야 합니다."] },
        { theme: "company",  tag: "기업",   body: "트럼프가 <strong>Anthropic을 공급망 안보 위협으로 지정</strong>했습니다. 미국 기업에 적용된 최초의 화웨이급 조치였습니다. 제재 직후 Claude 앱이 미국 App Store 1위에 올라 일일 신규 가입이 세 배로 늘었습니다.", source: "뉴스레터 #37", date: "2026-02-28" },
        { theme: "research", tag: "리서치", body: "Grok에서 <strong>11일 만에 성적 딥페이크 300만 장</strong>이 생성됐습니다. 이를 계기로 EU 의회가 AI Act를 개정해 동의 없는 성적 딥페이크 생성 자체를 금지하기로 합의했습니다.", source: "뉴스레터 #39", date: "2026-03-14" },
        { theme: "survival", tag: "생존",   body: "Dario Amodei가 <strong>1~5년 내 주니어 화이트칼라 일자리의 50%가 사라질 수 있다</strong>고 공개 경고했습니다. 2026년 1~6주 동안 기술직 해고가 30,000건 이상 발생했습니다.", source: "뉴스레터 #35", date: "2026-02-14" },
        { theme: "tech",     tag: "기술",   body: "Anthropic PM Cat Wu가 Opus 4.6 기준 <strong>AI 모델이 16개월 만에 41배 발전</strong>했다고 밝혔습니다. 장기 실행 계획, 문서 우선주의, 고정 기능 가정이 모두 무너지고 있습니다.", source: "AI 모델이 빨라질수록 제품 관리도 바뀐다", url: "../tech/2026-03-19-pm-on-ai-exponential.html", date: "2026-03-19", roasting: "6개월 실행 계획을 세우셨습니까? AI 모델은 3개월마다 바뀝니다.<br>계획이 낡아가는 속도보다 모델이 빠릅니다.", summaries: ["AI 모델이 16개월 만에 41배 발전하면서 전통적인 제품 관리 가정이 깨졌습니다. 프로젝트 시작과 완료 시점의 기술 범위가 같다는 전제가 더 이상 성립하지 않습니다.", "Anthropic의 Cat Wu는 4가지 전환을 제시합니다. 단기 실험(사이드 퀘스트), 프로토타입 우선, 신모델마다 기존 기능 재검토, 단순함 유지가 핵심입니다.", "PM의 역할은 계획 수립에서 발견 가속으로 이동하고 있습니다. 새 모델 도입 후 시스템 프롬프트를 20% 줄인 사례가 그 증거입니다."] },
        { theme: "company",  tag: "기업",   body: "DeNA AI 올인 1년 만에 일부 프로젝트에서 <strong>20배 생산성을 달성</strong>했습니다. 그러나 직원들이 빈 시간을 채워 인력 이동은 정체됐습니다.", source: "DeNA AI 올인 1년, 생산성 20배의 역설", url: "../company/2026-03-21-dena-ai-20x-paradox.html", date: "2026-03-21", roasting: "생산성이 20배 올라도 사람은 안 움직입니다.<br>효율은 도구가 만들지만, 변화는 리더가 만듭니다.", summaries: ["DeNA는 AI 올인 1년 만에 일부 프로젝트에서 20배 생산성을 달성했습니다.", "하지만 직원들이 빈 시간을 다른 업무로 채워, 신규 사업 인력 이동은 기대에 못 미쳤습니다.", "난바 의장은 \"먼저 사람을 옮기고, 다소 거친 리더십이 필요하다\"고 말합니다."] },
        { theme: "tech",     tag: "기술",   body: "ASI-Evolve가 <strong>1,773회 탐색으로 105개 신경망</strong>을 발견했습니다. 사람 연구 성과의 약 3배입니다.", source: "AI가 AI를 설계한다, 사람 없이", url: "../tech/2026-03-31-asi-evolve-ai-accelerates-ai.html", date: "2026-03-31", roasting: "AI가 사람보다 3배 빠르게 신경망을 설계합니다.<br>당신의 AI 팀은 아직 모델 하나를 고르고 있습니까?", summaries: ["ASI-Evolve가 신경망 설계, 데이터 정제, 강화학습을 자동화했습니다.", "1,773회 탐색에서 105개 최첨단 신경망을 발견했습니다.", "데이터 정제로 MMLU 18점, 강화학습으로 12.5점을 올렸습니다."] },
        { theme: "leader", tag: "리더", body: "일론 머스크가 바라보는 AI의 미래를 분석합니다. <strong>2030년 AI가 전 인류를 초월하고 보편적 고소득 시대가 온다는 전망</strong>입니다.", source: "일론 머스크의 AI 미래 비전", url: "../leader/2026-01-10-elon-musk-vision-of-ai-future.html", date: "2026-01-10", roasting: "기술이 풍요를 만들어도 분배 없이는 모두의 풍요가 되지 않습니다.", summaries: ["머스크는 2030년 AI가 전 인류 지능을 초월할 것으로 전망합니다.", "보편적 고소득 시대를 예측하지만 분배 메커니즘은 답이 없습니다.", "기술 낙관주의와 분배 정의 논의가 함께 가야 합니다."] },
        { theme: "survival", tag: "생존", body: "N=10 경쟁 시장에서 과도 자동화 격차 <strong>+90%</strong>. 피구세만이 해결책입니다.", source: "AI 해고 함정: 기업이 자를수록 모두가 손해 보는 이유", url: "../survival/2026-03-02-ai-layoff-trap.html", date: "2026-03-02", roasting: "경쟁사가 자르니 우리도 자른다는 논리, 그게 자충수입니다.<br>고객의 월급도 함께 사라지고 있습니다.", summaries: ["펜실베이니아대·보스턴대 논문에 따르면 경쟁 시장에서 기업들은 사회 최적치보다 훨씬 많이 자동화합니다.", "이 과도 자동화는 노동자뿐 아니라 기업주에게도 손실이며, UBI·재훈련 등 기존 정책 5가지는 효과가 없습니다.", "오직 피구 자동화세만이 이 수요 외부효과를 교정하는 유일한 해결책입니다."] },
        { theme: "research", tag: "리서치", body: "외부 소형 어드바이저가 블랙박스 AI를 조종합니다. 번역 품질이 <strong>55%</strong> 향상됐습니다.", source: "블랙박스 AI를 맞춤 조종하는 어드바이저 모델", url: "../research/2026-02-02-advisor-model-black-box-llm.html", date: "2026-02-02", roasting: "GPT 내부에 접근할 수 없어도 AI 행동을 제어할 수 있습니다.<br>UC버클리는 경량 어드바이저 하나로 이를 증명했습니다.", summaries: ["UC버클리 연구팀이 블랙박스 대형 언어모델을 외부에서 제어하는 어드바이저 모델을 공개했습니다.", "강화학습으로 훈련한 소형 모델이 매 요청마다 최적화된 자연어 지시를 생성해 대형 모델에 전달합니다.", "번역 품질이 chrF 28.1에서 43.7로, 세무 규칙 정확도가 56%에서 72%로 향상됐습니다."] }

      ]

    {
