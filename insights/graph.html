<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지식 그래프 — AI ROASTING</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* ── Page Shell ── */
    body { margin: 0; overflow-x: hidden; }

    /* ── Controls Bar ── */
    .graph-controls {
      padding: 8px 0 10px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .graph-controls .ctrl-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-family: 'Pretendard', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1.5px solid currentColor;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      background: transparent;
      font-family: 'Pretendard', sans-serif;
      opacity: 0.55;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-pill.active { opacity: 1; }
    .filter-pill:hover { opacity: 0.9; }
    .filter-pill .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .ctrl-sep {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.15);
      margin: 0 2px;
      flex-shrink: 0;
    }
    .ctrl-stats {
      margin-left: auto;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: 'Pretendard', sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ctrl-stats strong { color: rgba(255,255,255,0.75); font-weight: 600; }

    /* ── Canvas ── */
    .graph-canvas-wrap {
      width: 100%;
      height: calc(100dvh - 148px);
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    #graphSvg {
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #graphSvg:active { cursor: grabbing; }

    /* 노드 탭 히트 영역 확장 */
    .g-node .hit-area {
      fill: transparent;
      stroke: none;
    }

    /* D3 elements */
    .g-link {
      stroke-opacity: 0.3;
      transition: stroke-opacity 0.2s;
    }
    .g-link.faded { stroke-opacity: 0.04; }
    .g-link.highlighted { stroke-opacity: 0.9; }

    .g-node { cursor: pointer; }
    .g-node circle {
      transition: fill-opacity 0.2s, filter 0.2s;
    }
    /* 고립 노드(연결 ≤1): 작고 반투명 */
    .g-node.isolated circle {
      fill-opacity: 0.25;
      stroke-opacity: 0.35;
    }
    /* 허브 노드(연결 상위 10%): 테두리 글로우 */
    .g-node.hub circle {
      stroke-width: 2.5;
      filter: drop-shadow(0 0 6px currentColor);
    }
    .g-node.faded circle { fill-opacity: 0.06; stroke-opacity: 0.15; }
    .g-node.faded text { opacity: 0.08; }
    .g-node.highlighted circle {
      stroke-width: 3;
      filter: drop-shadow(0 0 12px currentColor);
    }

    /* ── Zoom reset button (뉴모피즘) ── */
    .zoom-reset-btn {
      position: absolute;
      top: 20px;
      right: max(24px, calc(50% - 516px));
      background: #0E1628;
      border: none;
      border-radius: 10px;
      color: rgba(255,255,255,0.65);
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow:
        -3px -3px 7px rgba(255,255,255,0.06),
         3px  3px 8px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      transition: box-shadow 0.18s, color 0.18s;
    }
    .zoom-reset-btn:hover {
      color: #fff;
      box-shadow:
        -2px -2px 5px rgba(255,255,255,0.08),
         2px  2px 6px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .zoom-reset-btn:active {
      box-shadow:
        inset -2px -2px 5px rgba(255,255,255,0.05),
        inset  2px  2px 6px rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.5);
    }

    .node-label {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      font-weight: 600;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
      user-select: none;
    }

    /* ── Tooltip Card ── */
    .graph-tooltip {
      position: fixed;
      top: 0; left: 0;
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      max-width: 300px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.28), 0 2px 8px rgba(0,0,0,0.12);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      font-family: 'Pretendard', sans-serif;
    }
    .graph-tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }
    /* 모바일: 하단 고정 패널 */
    @media (max-width: 768px) {
      .graph-tooltip {
        left: 0 !important;
        top: auto !important;
        bottom: 0;
        width: 100%;
        max-width: 100%;
        border-radius: 20px 20px 0 0;
        padding: 20px 20px 32px;
        transform: translateY(100%);
        pointer-events: auto;
      }
      .graph-tooltip.show {
        transform: translateY(0);
      }
      /* 드래그 핸들 */
      .graph-tooltip::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        background: #E0E0E0;
        border-radius: 2px;
        margin: 0 auto 16px;
      }
    }
    .tt-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 100px;
      margin-bottom: 9px;
      color: #fff;
      letter-spacing: 0.03em;
    }
    .tt-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .tt-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .tt-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .tt-tag {
      font-size: 11px;
      background: #F2F0EB;
      color: #555;
      padding: 2px 7px;
      border-radius: 6px;
    }
    .tt-connections {
      font-size: 12px;
      color: #666;
      border-top: 1px solid #F0F0F0;
      padding-top: 8px;
    }
    .tt-connections span { font-weight: 700; color: #333; }

    /* ── Legend ── */
    .graph-legend {
      position: absolute;
      bottom: 54px;
      right: max(24px, calc(50% - 516px));
      cursor: grab;
      user-select: none;
      background: rgba(10,15,30,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      font-family: 'Pretendard', sans-serif;
    }
    .legend-title {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 7px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
    }
    .legend-hint {
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 12px;
      padding-top: 12px;
    }
    .legend-hint-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 5px;
    }
    .hint-circle {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }
    .hint-circle.lg { width: 14px; height: 14px; }

    /* ── Instructions overlay ── */
    .graph-instructions {
      position: absolute;
      top: 20px;
      left: max(24px, calc(50% - 516px));
      background: rgba(10,15,30,0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .graph-instructions { display: none; }
    }

    /* ── Loading State ── */
    .graph-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      gap: 16px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Page title row */
    .graph-page-header {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px 24px 0;
      background: transparent;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .graph-page-title {
      font-family: 'Pretendard', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      margin: 0;
    }
    .graph-page-sub {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    /* Controls bar: 내부 콘텐츠만 컨테이너 정렬 */
    .graph-controls-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 4px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .graph-controls-inner::-webkit-scrollbar { display: none; }

    @media (max-width: 768px) {
      .graph-page-header { padding: 12px 16px 0; }
      .graph-page-title { font-size: 16px; }
      .graph-page-sub { font-size: 11px; }
      .graph-legend { display: none; }
      .zoom-reset-btn { top: 12px; right: 12px; padding: 7px 11px; font-size: 11px; }
      .graph-canvas-wrap { height: calc(100dvh - 120px); }
      .graph-controls-inner { padding: 0 16px; }
    }
  </style>

  tech:       { stroke: '#4ADE80', fill: 'rgba(74,222,128,0.18)',   text: '#86EFAC', badge: '#16A34A' },
  survival:   { stroke: '#F87171', fill: 'rgba(248,113,113,0.18)', text: '#FCA5A5', badge: '#DC2626' },
  newsletter: { stroke: '#C084FC', fill: 'rgba(192,132,252,0.18)', text: '#D8B4FE', badge: '#9333EA' },
};

const CAT_LABEL = {
  research: '리서치', leader: '리더', company: '기업',
  tech: '기술', survival: '생존', newsletter: '뉴스레터'
};

/* ── Tooltip ── */
const tooltip = document.getElementById('graphTooltip');

function renderTooltipContent(node, degree) {
  const c = CAT[node.category] || CAT.research;
  const tags = (node.tags || []).slice(0, 5);
  const openBtn = node.url
    ? `<a href="${node.url}" target="${node.type === 'newsletter' ? '_blank' : '_self'}"
         style="display:inline-block;margin-top:10px;padding:7px 16px;background:${c.badge};color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">
         아티클 열기 →</a>`
    : '';
  tooltip.innerHTML = `
    <div class="tt-badge" style="background:${c.badge};">${CAT_LABEL[node.category] || node.category}</div>
    <div class="tt-title">${node.title}</div>
    <div class="tt-meta">${node.date || ''} ${node.source ? '· ' + node.source : ''}</div>
    ${tags.length ? `<div class="tt-tags">${tags.map(t => `<span class="tt-tag">${t}</span>`).join('')}</div>` : ''}
    <div class="tt-connections">연결 아티클 <span>${degree}</span>개</div>
    ${isMobile ? openBtn : ''}
  `;
}

function showTooltip(event, node, degree) {
  renderTooltipContent(node, degree);
  tooltip.classList.add('show');
  if (!isMobile) moveTooltip(event);
}

function moveTooltip(event) {
  if (isMobile) return;
  const pad = 16;
  const tw = tooltip.offsetWidth || 300;
  const th = tooltip.offsetHeight || 120;
  let x = event.clientX + pad;
  let y = event.clientY + pad;
  if (x + tw > window.innerWidth - pad) x = event.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = event.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('show');
}

/* 모바일: 툴팁 외부 탭 시 닫기 */
if (isMobile) {
  tooltip.style.pointerEvents = 'auto';
  document.addEventListener('touchstart', e => {
    if (!tooltip.contains(e.target)) hideTooltip();
  }, { passive: true });
}

/* ── Main ── */
fetch('../posts-index.json')
  .then(r => r.json())
  .then(data => buildGraph(data.posts || []))
  .catch(err => {
    document.getElementById('graphLoading').innerHTML =
      '<div style="color:#F87171;font-size:14px;">데이터 로드 실패: ' + err.message + '</div>';
  });

function buildGraph(posts) {
  /* 1. Nodes */
  const nodes = [];

  posts.forEach(p => {
    nodes.push({
      id: p.slug || p.file,
      title: p.title,
      category: p.category || 'research',
      tags: p.tags || [],
      date: p.date,
      source: p.source || '',
      url: '../' + p.file,
      type: 'post',
      summary: p.summary || ''
    });
  });

  const newsletters = window.NEWSLETTER_DATA || [];
  newsletters.forEach(n => {
    nodes.push({
      id: 'nl-' + n.ep,
      title: 'NL #' + n.ep + ' ' + n.title,
      category: 'newsletter',
      tags: NL_TAGS[String(n.ep)] || [],
      date: n.date,
      source: 'AI ROASTING 뉴스레터',
      url: n.url,
      type: 'newsletter',
      ep: n.ep
    });
  });

  const nodeById = new Map(nodes.map(n => [n.id, n]));

  /* 2. Edges — shared tags (너무 흔한 태그는 제외) */
  const tagMap = {};
  nodes.forEach(n => {
    (n.tags || []).forEach(tag => {
      if (!tagMap[tag]) tagMap[tag] = [];
      tagMap[tag].push(n.id);
    });
  });

  /* 너무 범용적인 태그는 연결선 생성에서 제외 (의미 있는 연결만 남김) */
  const GENERIC_TAGS = new Set(['AI전략','규제','AI에이전트','스타트업','일자리','AI','데이터','조직설계','Anthropic','OpenAI','Claude','ChatGPT','Google','Meta']);
  const edgeWeights = {};
  Object.entries(tagMap).forEach(([tag, ids]) => {
    if (GENERIC_TAGS.has(tag)) return; // 너무 범용적인 태그 스킵
    if (ids.length > 60) return;       // 60개 이상 노드에 등장하는 태그도 제외
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const key = [ids[i], ids[j]].sort().join('\x00');
        edgeWeights[key] = (edgeWeights[key] || 0) + 1;
      }
    }
  });

  /* 뉴스레터 체인 제거 — 태그 기반 연결만 사용하여 자연 분산 */

  /* 최소 1개 이상 공유 태그인 엣지만 사용 */
  const links = Object.entries(edgeWeights)
    .filter(([, w]) => w >= 1)
    .map(([key, weight]) => {
      const [source, target] = key.split('\x00');
      return { source, target, weight };
    });

  /* 3. Degree map */
  const degreeMap = {};
  links.forEach(l => {
    degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
    degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
  });
  nodes.forEach(n => { n.degree = degreeMap[n.id] || 0; });

  /* Node radius: sqrt scale (모바일은 더 크게) */
  const maxDeg = d3.max(nodes, n => n.degree) || 1;
  const rMin = isMobile ? 11 : 8;
  const rMax = isMobile ? 32 : 28;
  const rScale = d3.scaleSqrt().domain([0, maxDeg]).range([rMin, rMax]);
  nodes.forEach(n => { n.r = rScale(n.degree); });

  /* 허브 임계값: 상위 10% */
  const hubThreshold = d3.quantile(nodes.map(n => n.degree).sort(d3.ascending), 0.9);

  /* 4. Stats */
  document.getElementById('graphStats').innerHTML =
    '노드 <strong>' + nodes.length + '</strong>개 &nbsp;·&nbsp; 연결선 <strong>' + links.length + '</strong>개';

  /* 5. D3 setup */
  const svg = d3.select('#graphSvg');
  const wrap = document.querySelector('.graph-canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  const g = svg.append('g');

  /* Zoom */
  const zoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  /* Seed positions: blog posts near center, newsletter ring on periphery */
  nodes.forEach((n, i) => {
    if (n.type === 'newsletter') {
      const angle = (i / nodes.filter(x => x.type === 'newsletter').length) * 2 * Math.PI;
      n.x = W/2 + Math.cos(angle) * 220;
      n.y = H/2 + Math.sin(angle) * 220;
    } else {
      const angle = Math.random() * 2 * Math.PI;
      const rad = Math.random() * 150;
      n.x = W/2 + Math.cos(angle) * rad;
      n.y = H/2 + Math.sin(angle) * rad;
    }
  });

  /* 뉴스레터를 링 반경으로 초기 배치 */
  const NL_RADIUS = Math.min(W, H) * 0.32;
  const nlAll = nodes.filter(n => n.type === 'newsletter');
  nlAll.forEach((n, i) => {
    const angle = (i / nlAll.length) * 2 * Math.PI;
    n.x = W/2 + Math.cos(angle) * NL_RADIUS;
    n.y = H/2 + Math.sin(angle) * NL_RADIUS;
  });

  /* Force simulation */
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => Math.max(80, 150 - (d.weight || 1) * 10))
      .strength(d => {
        const sNL = (typeof d.source === 'object' ? d.source.type : '') === 'newsletter';
        const tNL = (typeof d.target === 'object' ? d.target.type : '') === 'newsletter';
        /* 뉴스레터↔블로그 연결은 약하게 (링 유지) */
        return (sNL || tNL) ? 0.04 : Math.min(0.35, 0.06 + (d.weight || 1) * 0.04);
      }))
    .force('charge', d3.forceManyBody().strength(d => -Math.max(250, d.r * 24)))
    /* 뉴스레터 전용: 특정 반경 링에 배치 */
    .force('radial', d3.forceRadial(NL_RADIUS, W/2, H/2)
      .strength(d => d.type === 'newsletter' ? 0.6 : 0))
    /* 블로그 포스트는 중앙으로 */
    .force('center', d3.forceCenter(W / 2, H / 2).strength(0.08))
    .force('x', d3.forceX(W / 2).strength(d => d.type === 'newsletter' ? 0 : 0.03))
    .force('y', d3.forceY(H / 2).strength(d => d.type === 'newsletter' ? 0 : 0.03))
    .force('collide', d3.forceCollide().radius(d => d.r + 16).strength(0.9))
    .alphaDecay(0.018);

  /* 6. Render links */
  const linkG = g.append('g').attr('class', 'links-group');
  const linkSel = linkG.selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'g-link')
    .attr('stroke', d => {
      const src = nodeById.get(typeof d.source === 'string' ? d.source : d.source.id);
      return src ? CAT[src.category].stroke : '#fff';
    })
    .attr('stroke-width', d => Math.min(3, 1 + (d.weight || 1) * 0.4));

  /* 7. Render nodes */
  const nodeG = g.append('g').attr('class', 'nodes-group');
  const nodeSel = nodeG.selectAll('g.g-node')
    .data(nodes)
    .join('g')
    .attr('class', 'g-node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  /* 고립/허브 클래스 */
  nodeSel.classed('isolated', d => d.degree <= 1);
  nodeSel.classed('hub', d => d.degree >= hubThreshold && d.degree > 2);

  /* 히트 영역 확장 (탭/클릭 정확도 향상) */
  nodeSel.append('circle')
    .attr('class', 'hit-area')
    .attr('r', d => d.r + (isMobile ? 12 : 6));

  /* Circle */
  nodeSel.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => CAT[d.category].fill)
    .attr('stroke', d => CAT[d.category].stroke)
    .attr('stroke-width', d => d.degree >= hubThreshold ? 2.5 : 1.5);

  /* Label — 기본 숨김, 클릭 시 표시 */
  nodeSel.each(function(d) {
    const el = d3.select(this);
    const words = d.title.split(/\s+/);
    const maxChars = 10;
    let line1 = '', line2 = '';
    for (const w of words) {
      if (!line1) { line1 = w; }
      else if ((line1 + ' ' + w).length <= maxChars) { line1 += ' ' + w; }
      else if (!line2) { line2 = w; }
      else if ((line2 + ' ' + w).length <= maxChars) { line2 += ' ' + w; }
      else break;
    }
    const fs = 9;
    if (line2) {
      el.append('text').attr('class', 'node-label').attr('y', -5).attr('font-size', fs).text(line1);
      el.append('text').attr('class', 'node-label').attr('y', +6).attr('font-size', fs).text(line2.length > maxChars ? line2.slice(0, maxChars-1)+'…' : line2);
    } else {
      el.append('text').attr('class', 'node-label').attr('font-size', fs).text(line1.length > maxChars ? line1.slice(0,maxChars-1)+'…' : line1);
    }
    /* 기본적으로 숨김 */
    el.selectAll('text').style('display', 'none');
  });

  /* 8. Interaction state */
  let selectedNode = null;   // 클릭으로 선택된 노드

  function getNeighborSet(d) {
    const s = new Set([d.id]);
    links.forEach(l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      if (sid === d.id) s.add(tid);
      if (tid === d.id) s.add(sid);
    });
    return s;
  }

  function applyFocus(d) {
    const neighborSet = getNeighborSet(d);
    nodeSel.classed('faded', n => !neighborSet.has(n.id));
    nodeSel.classed('highlighted', n => n.id === d.id);
    linkSel
      .classed('faded', l => {
        const sid = typeof l.source === 'string' ? l.source : l.source.id;
        const tid = typeof l.target === 'string' ? l.target : l.target.id;
        return sid !== d.id && tid !== d.id;
      })
      .classed('highlighted', l => {
        const sid = typeof l.source === 'string' ? l.source : l.source.id;
        const tid = typeof l.target === 'string' ? l.target : l.target.id;
        return sid === d.id || tid === d.id;
      });
    /* 연결 노드에만 레이블 표시 */
    nodeSel.selectAll('text').style('display', function() {
      const nd = d3.select(this.parentNode).datum();
      return neighborSet.has(nd.id) ? null : 'none';
    });
  }

  function clearFocus() {
    selectedNode = null;
    nodeSel.classed('faded', false).classed('highlighted', false);
    linkSel.classed('faded', false).classed('highlighted', false);
    /* 모든 레이블 숨김 */
    nodeSel.selectAll('text').style('display', 'none');
  }

  /* Hover: tooltip only (no focus when a node is already selected) */
  nodeSel
    .on('mouseenter', function(event, d) {
      if (!selectedNode) applyFocus(d);
      showTooltip(event, d, d.degree);
    })
    .on('mousemove', moveTooltip)
    .on('mouseleave', function() {
      if (!selectedNode) clearFocus();
      hideTooltip();
    });

  /* Single click: lock focus on this node (연결 노드만 표시) */
  nodeSel.on('click', function(event, d) {
    event.stopPropagation();
    if (selectedNode && selectedNode.id === d.id) {
      clearFocus();   // 같은 노드 다시 클릭 → 해제
    } else {
      selectedNode = d;
      applyFocus(d);
    }
  });

  /* Double click: navigate to article */
  nodeSel.on('dblclick', function(event, d) {
    event.stopPropagation();
    if (d.url) window.open(d.url, d.type === 'newsletter' ? '_blank' : '_self');
  });

  /* Click on empty canvas → clear focus */
  svg.on('click', function() {
    clearFocus();
    hideTooltip();
  });

  /* 9. Tick */
  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  /* Fit to view after simulation settles */
  function fitToView() {
    const padding = 60;
    const xs = nodes.map(n => n.x).filter(v => isFinite(v));
    const ys = nodes.map(n => n.y).filter(v => isFinite(v));
    if (!xs.length) return;
    const x0 = Math.min(...xs), x1 = Math.max(...xs);
    const y0 = Math.min(...ys), y1 = Math.max(...ys);
    const bW = x1 - x0 || 1, bH = y1 - y0 || 1;
    const scale = Math.min(0.95, (W - padding*2) / bW, (H - padding*2) / bH);
    const tx = W/2 - scale * (x0 + bW/2);
    const ty = H/2 - scale * (y0 + bH/2);
    svg.transition().duration(800)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    document.getElementById('graphLoading').style.display = 'none';
  }

  sim.on('end', fitToView);
  setTimeout(fitToView, 4000);

  /* Zoom reset button */
  document.getElementById('zoomResetBtn').addEventListener('click', fitToView);

  /* Legend 드래그 */
  (function() {
    const leg = document.querySelector('.graph-legend');
    if (!leg) return;
    let dragging = false, ox = 0, oy = 0;

    leg.addEventListener('mousedown', e => {
      dragging = true;
      leg.style.cursor = 'grabbing';
      /* bottom/right → top/left 로 전환 (부모 기준 보정) */
      const rect = leg.getBoundingClientRect();
      const wrapRect = leg.offsetParent.getBoundingClientRect();
      leg.style.top    = (rect.top  - wrapRect.top)  + 'px';
      leg.style.left   = (rect.left - wrapRect.left) + 'px';
      leg.style.bottom = 'auto';
      leg.style.right  = 'auto';
      ox = e.clientX - rect.left;
      oy = e.clientY - rect.top;
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const wrapRect = leg.offsetParent.getBoundingClientRect();
      leg.style.left = (e.clientX - ox - wrapRect.left) + 'px';
      leg.style.top  = (e.clientY - oy - wrapRect.top)  + 'px';
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      leg.style.cursor = 'grab';
    });
  })();

  /* 10. Category filter */
  let activeCategories = new Set(['research','leader','company','tech','survival','newsletter']);

  document.getElementById('graphControls').addEventListener('click', e => {
    const btn = e.target.closest('.filter-pill');
    if (!btn) return;
    const cat = btn.dataset.cat;

    if (cat === 'all') {
      if (activeCategories.size === 6) {
        activeCategories.clear();
        document.querySelectorAll('.filter-pill:not([data-cat="all"])').forEach(b => b.classList.remove('active'));
      } else {
        activeCategories = new Set(['research','leader','company','tech','survival','newsletter']);
        document.querySelectorAll('.filter-pill:not([data-cat="all"])').forEach(b => b.classList.add('active'));
      }
      btn.classList.toggle('active', activeCategories.size > 0);
    } else {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        btn.classList.remove('active');
      } else {
        activeCategories.add(cat);
        btn.classList.add('active');
      }
      document.querySelector('[data-cat="all"]').classList.toggle('active', activeCategories.size === 6);
    }

    nodeSel.style('display', d => activeCategories.has(d.category) ? null : 'none');
    linkSel.style('display', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      const sn = nodeById.get(sid);
      const tn = nodeById.get(tid);
      return (sn && activeCategories.has(sn.category)) && (tn && activeCategories.has(tn.category)) ? null : 'none';
    });
  });

  /* Start at identity */
  svg.call(zoom.transform, d3.zoomIdentity);
}

})();
</script>
</body>
</html>
