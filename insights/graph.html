<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI ROASTING · Blog</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* ── Page Shell ── */
    body { margin: 0; overflow-x: hidden; }

    /* ── Controls Bar ── */
    .graph-controls {
      padding: 8px 0 10px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .graph-controls .ctrl-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-family: 'Pretendard', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1.5px solid currentColor;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      background: transparent;
      font-family: 'Pretendard', sans-serif;
      opacity: 0.55;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-pill.active { opacity: 1; }
    .filter-pill:hover { opacity: 0.9; }
    .filter-pill .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .ctrl-sep {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.15);
      margin: 0 2px;
      flex-shrink: 0;
    }
    .ctrl-stats {
      margin-left: auto;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: 'Pretendard', sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ctrl-stats strong { color: rgba(255,255,255,0.75); font-weight: 600; }

    /* ── Page Layout: 헤더+컨트롤 아래 남은 영역을 캔버스가 정확히 채움 ── */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    #site-header { flex-shrink: 0; }
    .graph-shell {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .graph-controls { flex-shrink: 0; }

    /* ── Canvas ── */
    .graph-canvas-wrap {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    #graphSvg {
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #graphSvg:active { cursor: grabbing; }

    /* 노드 탭 히트 영역 확장 */
    .g-node .hit-area {
      fill: transparent;
      stroke: none;
    }

    /* D3 elements */
    .g-link {
      stroke-opacity: 0.08;
      transition: stroke-opacity 0.25s, stroke-width 0.2s;
    }
    .g-link.faded { stroke-opacity: 0.015; }
    .g-link.highlighted {
      stroke-opacity: 0.95;
      stroke-width: 2.4 !important;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.55));
    }

    .g-node { cursor: pointer; }
    .g-node circle {
      transition: fill-opacity 0.2s, filter 0.2s;
    }
    /* 고립 노드(연결 ≤1): 작고 반투명 */
    .g-node.isolated circle {
      fill-opacity: 0.25;
      stroke-opacity: 0.35;
    }
    /* 허브 노드(연결 상위 10%): 테두리 글로우 */
    .g-node.hub circle {
      stroke-width: 2.5;
      filter: drop-shadow(0 0 6px currentColor);
    }
    .g-node.faded circle { fill-opacity: 0.06; stroke-opacity: 0.15; }
    .g-node.faded text { opacity: 0.08; }
    .g-node.highlighted circle {
      stroke-width: 3;
      filter: drop-shadow(0 0 12px currentColor);
    }

    /* ── Zoom reset button (뉴모피즘) ── */
    .zoom-reset-btn {
      position: absolute;
      top: 20px;
      right: max(24px, calc(50% - 516px));
      background: #0E1628;
      border: none;
      border-radius: 10px;
      color: rgba(255,255,255,0.65);
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow:
        -3px -3px 7px rgba(255,255,255,0.06),
         3px  3px 8px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      transition: box-shadow 0.18s, color 0.18s;
    }
    .zoom-reset-btn:hover {
      color: #fff;
      box-shadow:
        -2px -2px 5px rgba(255,255,255,0.08),
         2px  2px 6px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .zoom-reset-btn:active {
      box-shadow:
        inset -2px -2px 5px rgba(255,255,255,0.05),
        inset  2px  2px 6px rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.5);
    }

    .node-label {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      font-weight: 600;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
      user-select: none;
    }

    /* ── Tooltip Card ── */
    .graph-tooltip {
      position: fixed;
      top: 0; left: 0;
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      max-width: 300px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.28), 0 2px 8px rgba(0,0,0,0.12);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      font-family: 'Pretendard', sans-serif;
    }
    .graph-tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }
    /* 모바일: 하단 고정 패널 */
    @media (max-width: 768px) {
      .graph-tooltip {
        left: 0 !important;
        top: auto !important;
        bottom: 0;
        width: 100%;
        max-width: 100%;
        border-radius: 20px 20px 0 0;
        padding: 20px 20px 32px;
        transform: translateY(100%);
        pointer-events: auto;
      }
      .graph-tooltip.show {
        transform: translateY(0);
      }
      /* 드래그 핸들 */
      .graph-tooltip::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        background: #E0E0E0;
        border-radius: 2px;
        margin: 0 auto 16px;
      }
    }
    .tt-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 100px;
      margin-bottom: 9px;
      color: #fff;
      letter-spacing: 0.03em;
    }
    .tt-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .tt-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .tt-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .tt-tag {
      font-size: 11px;
      background: #F2F0EB;
      color: #555;
      padding: 2px 7px;
      border-radius: 6px;
    }
    .tt-connections {
      font-size: 12px;
      color: #666;
      border-top: 1px solid #F0F0F0;
      padding-top: 8px;
    }
    .tt-connections span { font-weight: 700; color: #333; }

    /* ── Legend ── */
    .graph-legend {
      position: absolute;
      bottom: 54px;
      right: max(24px, calc(50% - 516px));
      cursor: grab;
      user-select: none;
      background: rgba(10,15,30,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      font-family: 'Pretendard', sans-serif;
    }
    .legend-title {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 7px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
    }
    .legend-hint {
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 12px;
      padding-top: 12px;
    }
    .legend-hint-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 5px;
    }
    .hint-circle {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }
    .hint-circle.lg { width: 14px; height: 14px; }

    /* ── Instructions overlay ── */
    .graph-instructions {
      position: absolute;
      top: 20px;
      left: max(24px, calc(50% - 516px));
      background: rgba(10,15,30,0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .graph-instructions { display: none; }
    }

    /* ── Loading State ── */
    .graph-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      gap: 16px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Page title row */
    .graph-page-header {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px 24px 0;
      background: transparent;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .graph-page-title {
      font-family: 'Pretendard', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      margin: 0;
    }
    .graph-page-sub {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    /* Controls bar: 내부 콘텐츠만 컨테이너 정렬 */
    .graph-controls-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 4px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .graph-controls-inner::-webkit-scrollbar { display: none; }

    @media (max-width: 768px) {
      .graph-page-header { padding: 12px 16px 0; }
      .graph-page-title { font-size: 16px; }
      .graph-page-sub { font-size: 11px; }
      .graph-legend { display: none; }
      .zoom-reset-btn { top: 12px; right: 12px; padding: 7px 11px; font-size: 11px; }
      .graph-controls-inner { padding: 0 16px; }
    }
  </style>
</head>

/* ── Tooltip ── */
const tooltip = document.getElementById('graphTooltip');

function renderTooltipContent(node, degree) {
  const c = CAT[node.category] || CAT.research;
  const tags = (node.tags || []).slice(0, 5);
  const openBtn = node.url
    ? `<a href="${node.url}" target="${node.type === 'newsletter' ? '_blank' : '_self'}"
         style="display:inline-block;margin-top:10px;padding:7px 16px;background:${c.badge};color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">
         아티클 열기 →</a>`
    : '';
  tooltip.innerHTML = `
    <div class="tt-badge" style="background:${c.badge};">${CAT_LABEL[node.category] || node.category}</div>
    <div class="tt-title">${node.title}</div>
    <div class="tt-meta">${node.date || ''} ${node.source ? '· ' + node.source : ''}</div>
    ${tags.length ? `<div class="tt-tags">${tags.map(t => `<span class="tt-tag">${t}</span>`).join('')}</div>` : ''}
    <div class="tt-connections">연결 아티클 <span>${degree}</span>개 · 가장 관련 깊은 ${Math.min(degree, 6)}개 강조</div>
    ${isMobile ? openBtn : ''}
  `;
}

function showTooltip(event, node, degree) {
  renderTooltipContent(node, degree);
  tooltip.classList.add('show');
  if (!isMobile) moveTooltip(event);
}

function moveTooltip(event) {
  if (isMobile) return;
  const pad = 16;
  const tw = tooltip.offsetWidth || 300;
  const th = tooltip.offsetHeight || 120;
  let x = event.clientX + pad;
  let y = event.clientY + pad;
  if (x + tw > window.innerWidth - pad) x = event.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = event.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('show');
}

/* 모바일: 툴팁 외부 탭 시 닫기 (노드 탭은 click 핸들러에서 처리) */

  tooltip.style.pointerEvents = 'auto';

}

/* ── Main ── */
fetch('../posts-index.json')
  .then(r => r.json())
  .then(data => buildGraph(data.posts || []))
  .catch(err => {
    document.getElementById('graphLoading').innerHTML =
      '<div style="color:#F87171;font-size:14px;">데이터 로드 실패: ' + err.message + '</div>';
  });

function buildGraph(posts) {
  /* 1. Nodes */
  const nodes = [];

  posts.forEach(p => {
    nodes.push({
      id: p.slug || p.file,
      title: p.title,
      category: p.category || 'research',
      tags: p.tags || [],
      date: p.date,
      source: p.source || '',
      url: '../' + p.file,
      type: 'post',
      summary: p.summary || ''
    });
  });

  const newsletters = window.NEWSLETTER_DATA || [];
  newsletters.forEach(n => {
    nodes.push({
      id: 'nl-' + n.ep,
      title: 'NL #' + n.ep + ' ' + n.title,
      category: 'newsletter',
      tags: NL_TAGS[String(n.ep)] || [],
      date: n.date,
      source: 'AI ROASTING 뉴스레터',
      url: n.url,
      type: 'newsletter',
      ep: n.ep
    });
  });

  const nodeById = new Map(nodes.map(n => [n.id, n]));

  /* 2. Edges: 공유 태그 기반 (너무 흔한 태그는 제외) */
  const tagMap = {};
  nodes.forEach(n => {
    (n.tags || []).forEach(tag => {
      if (!tagMap[tag]) tagMap[tag] = [];
      tagMap[tag].push(n.id);
    });
  });

  /* 너무 범용적인 태그는 연결선 생성에서 제외 (의미 있는 연결만 남김) */
  const GENERIC_TAGS = new Set(['AI전략','규제','AI에이전트','스타트업','일자리','AI','데이터','조직설계','Anthropic','OpenAI','Claude','ChatGPT','Google','Meta']);
  const edgeWeights = {};
  Object.entries(tagMap).forEach(([tag, ids]) => {
    if (GENERIC_TAGS.has(tag)) return; // 너무 범용적인 태그 스킵
    if (ids.length > 60) return;       // 60개 이상 노드에 등장하는 태그도 제외
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const key = [ids[i], ids[j]].sort().join('\x00');
        edgeWeights[key] = (edgeWeights[key] || 0) + 1;
      }
    }
  });

  /* 뉴스레터 체인은 만들지 않고, 태그 기반 연결만 사용해 자연 분산 */

  /* 최소 1개 이상 공유 태그인 엣지만 사용 */
  const links = Object.entries(edgeWeights)
    .filter(([, w]) => w >= 1)
    .map(([key, weight]) => {
      const [source, target] = key.split('\x00');
      return { source, target, weight };
    });

  /* 3. Degree map */
  const degreeMap = {};
  links.forEach(l => {
    degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
    degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
  });
  nodes.forEach(n => { n.degree = degreeMap[n.id] || 0; });

  /* Node radius: sqrt scale — 갤럭시에서는 더 작고 정돈된 별 느낌 */
  const maxDeg = d3.max(nodes, n => n.degree) || 1;
  const rMin = isMobile ? 7 : 5;
  const rMax = isMobile ? 20 : 16;
  const rScale = d3.scaleSqrt().domain([0, maxDeg]).range([rMin, rMax]);
  nodes.forEach(n => { n.r = rScale(n.degree); });

  /* 허브 임계값: 상위 10% */
  const hubThreshold = d3.quantile(nodes.map(n => n.degree).sort(d3.ascending), 0.9);

  /* 4. Stats */
  document.getElementById('graphStats').innerHTML =
    '노드 <strong>' + nodes.length + '</strong>개 &nbsp;·&nbsp; 연결선 <strong>' + links.length + '</strong>개';

  /* 5. D3 setup */
  const svg = d3.select('#graphSvg');
  const wrap = document.querySelector('.graph-canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  const g = svg.append('g');

  /* Zoom — 휠/핀치만 사용. 마우스 드래그는 카메라 회전에 양보 */
  const zoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .filter(e => {
      if (e.type === 'wheel') return true;
      /* 멀티터치(핀치 줌)만 허용, 단일 터치는 카메라 회전 */
      if (e.type === 'touchstart' || e.type === 'touchmove') {
        return e.touches && e.touches.length >= 2;
      }
      return false;
    })
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  /* ── 3D 갤럭시 셋업 ── 중앙 태양을 중심으로 별들이 360° 퍼져 도는 은하계 */
  const cx = W / 2, cy = H / 2;
  const GALAXY_RADIUS = Math.min(W, H) * 0.46;
  const TILT_X_BASE = 0.55;       // 디스크 기울기 (rad, ≈31°)
  const TILT_Z_BASE = 0.10;       // 롤
  const PERSPECTIVE_D = 2000;     // 원근 거리

  /* 안정적 hash → 0~1 의사난수 (4개) */
  function hashRand(id) {
    let h = 2166136261 | 0;
    const s = id || '';
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i); h = Math.imul(h, 16777619);
    }
    const a = ((h >>> 0) % 10000) / 10000;
    h = Math.imul(h ^ (h >>> 13), 1597334677);
    const b = ((h >>> 0) % 10000) / 10000;
    h = Math.imul(h ^ (h >>> 17), 2654435761);
    const c = ((h >>> 0) % 10000) / 10000;
    h = Math.imul(h ^ (h >>> 7), 374761393);
    const d2 = ((h >>> 0) % 10000) / 10000;
    return [a, b, c, d2];
  }

  /* 노드별 궤도 파라미터 — 3D 타원체(oblate spheroid) 부피에 분산 배치
     수평 반경 a = GALAXY_RADIUS, 수직 반경 b = a * VERT_RATIO (= 약간 납작한 은하 bulge) */
  const VERT_RATIO = 0.55;
  nodes.forEach(n => {
    const [s1, s2, s3, s4] = hashRand(n.id);

    /* 허브는 안쪽으로 살짝 집중 */
    const hubBias = (n.degree && hubThreshold)
      ? Math.min(1, n.degree / Math.max(1, hubThreshold))
      : 0;

    /* 3D 반경 (정규화). 코어(0.2) 비우고, 바깥까지 채움. cbrt = 부피 균등 */
    const r3D = 0.2 + Math.cbrt(s1) * 0.8 * (1 - hubBias * 0.2);

    /* 단위 구 위 균등 방향: u ∈ [-1,1] (cos polar), 방위각 az */
    const u = 2 * s2 - 1;
    const sinPolar = Math.sqrt(Math.max(0, 1 - u * u));
    const az = s3 * Math.PI * 2;

    /* 타원체 좌표계 안의 3D 위치 */
    const px = sinPolar * Math.cos(az) * GALAXY_RADIUS * r3D;
    const py = u * GALAXY_RADIUS * VERT_RATIO * r3D;
    const pz = sinPolar * Math.sin(az) * GALAXY_RADIUS * r3D;

    /* Y축 회전(궤도)을 위한 표현으로 변환:
       (orbitR, theta) = XZ 평면 극좌표, height = Y */
    n.orbitR = Math.hypot(px, pz);
    n.theta = Math.atan2(pz, px);
    n.height = py;

    /* 미세 theta 흔들림 (시각적 풍부함) */
    n.theta += (s4 - 0.5) * 0.04;

    /* 케플러 근사: 안쪽 빠름, 바깥 느림 (수평 거리 기준) */
    const rNorm = Math.max(0.2, n.orbitR / GALAXY_RADIUS);
    n.angVel = 0.00010 / Math.max(0.4, Math.sqrt(rNorm));

    /* 초기 평면 위치 (tick 첫 프레임 전 fallback) */
    n.x = cx + Math.cos(n.theta) * n.orbitR;
    n.y = cy + n.height;
    n.depthScale = 1;
    n.zDepth = 0;
  });

  /* 배경 별들 (정적 캔버스 좌표) */
  const starsG = svg.insert('g', ':first-child').attr('class', 'stars-bg');
  const STAR_COUNT = isMobile ? 140 : 240;
  const starData = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    starData.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      o: Math.random() * 0.45 + 0.15,
    });
  }
  const starSel = starsG.selectAll('circle').data(starData).join('circle')
    .attr('cx', d => d.x).attr('cy', d => d.y).attr('r', d => d.r)
    .attr('fill', '#FFFFFF').attr('opacity', d => d.o);
  /* 깜박임 (subtle twinkle) */
  starSel.each(function(d) {
    const c = d3.select(this);
    const dur = 2200 + Math.random() * 4200;
    const delay = Math.random() * 3000;
    function twinkle() {
      c.transition().delay(delay).duration(dur).attr('opacity', d.o * 0.25)
        .transition().duration(dur).attr('opacity', d.o)
        .on('end', twinkle);
    }
    twinkle();
  });

  /* ── 중앙 태양 (글로우 + 코어 + 펄스) ── */
  const sunG = g.append('g').attr('class', 'sun-group').attr('pointer-events', 'none');
  const sunHalo = sunG.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 110)
    .attr('fill', 'rgba(255,200,120,0.04)');
  sunG.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 64)
    .attr('fill', 'rgba(255,200,120,0.09)');
  sunG.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 30)
    .attr('fill', 'rgba(255,220,150,0.30)');
  sunG.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 12)
    .attr('fill', '#FFEFC8')
    .style('filter', 'drop-shadow(0 0 18px rgba(255,200,120,0.95))');
  (function pulseSun() {
    sunHalo.transition().duration(3600).attr('r', 130).attr('opacity', 0.55)
      .transition().duration(3600).attr('r', 110).attr('opacity', 1)
      .on('end', pulseSun);
  })();

  /* sim 호환 더미 (이후 코드의 sim 참조를 무력화) */
  const sim = { alphaTarget: () => sim, restart: () => sim, on: () => sim };

  /* 6. Render links */
  const linkG = g.append('g').attr('class', 'links-group');
  const linkSel = linkG.selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'g-link')
    .attr('stroke', d => {
      const src = nodeById.get(typeof d.source === 'string' ? d.source : d.source.id);
      return src ? CAT[src.category].stroke : '#fff';
    })
    .attr('stroke-width', d => Math.min(3, 1 + (d.weight || 1) * 0.4));

  /* 7. Render nodes */
  const nodeG = g.append('g').attr('class', 'nodes-group');
  const nodeSel = nodeG.selectAll('g.g-node')
    .data(nodes)
    .join('g')
    .attr('class', 'g-node')
    .call(d3.drag()
      .on('start', (e, d) => { d.dragLocked = true; })
      .on('drag',  (e, d) => { d.x = e.x; d.y = e.y; })
      .on('end',   (e, d) => {
        /* 드래그 종료 위치 → 새 궤도 파라미터 (단순 역사상) */
        const dx = e.x - cx, dy = e.y - cy;
        d.orbitR = Math.max(40, Math.min(GALAXY_RADIUS * 1.3, Math.hypot(dx, dy)));
        d.theta = Math.atan2(dy, dx);
        d.height = 0;
        d.dragLocked = false;
      })
    );

  /* 고립/허브 클래스 */
  nodeSel.classed('isolated', d => d.degree <= 1);
  nodeSel.classed('hub', d => d.degree >= hubThreshold && d.degree > 2);

  /* 히트 영역 확장 (탭/클릭 정확도 향상) */
  nodeSel.append('circle')
    .attr('class', 'hit-area')
    .attr('r', d => d.r + (isMobile ? 12 : 6));

  /* Circle — 별처럼 채워진 형태 + 외곽 빛 */
  nodeSel.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => CAT[d.category].stroke)
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => CAT[d.category].stroke)
    .attr('stroke-width', d => d.degree >= hubThreshold ? 1.5 : 0.8)
    .attr('stroke-opacity', 0.9)
    .style('filter', d => d.degree >= hubThreshold
      ? `drop-shadow(0 0 6px ${CAT[d.category].stroke})`
      : `drop-shadow(0 0 3px ${CAT[d.category].stroke})`);

  /* Label: 기본 숨김, 클릭 시 표시 */
  nodeSel.each(function(d) {
    const el = d3.select(this);
    const words = d.title.split(/\s+/);
    const maxChars = 10;
    let line1 = '', line2 = '';
    for (const w of words) {
      if (!line1) { line1 = w; }
      else if ((line1 + ' ' + w).length <= maxChars) { line1 += ' ' + w; }
      else if (!line2) { line2 = w; }
      else if ((line2 + ' ' + w).length <= maxChars) { line2 += ' ' + w; }
      else break;
    }
    const fs = 9;
    if (line2) {
      el.append('text').attr('class', 'node-label').attr('y', -5).attr('font-size', fs).text(line1);
      el.append('text').attr('class', 'node-label').attr('y', +6).attr('font-size', fs).text(line2.length > maxChars ? line2.slice(0, maxChars-1)+'…' : line2);
    } else {
      el.append('text').attr('class', 'node-label').attr('font-size', fs).text(line1.length > maxChars ? line1.slice(0,maxChars-1)+'…' : line1);
    }
    /* 기본적으로 숨김 */
    el.selectAll('text').style('display', 'none');
  });

  /* 8. Interaction state */
  let selectedNode = null;   // 클릭으로 선택된 노드

  /* 호버한 노드에서 가장 관련 깊은 상위 N개 엣지만 강조 */
  const TOP_RELATED = 6;

  function getTopRelated(d) {
    const my = [];
    links.forEach(l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      if (sid === d.id || tid === d.id) my.push(l);
    });
    /* 가중치(공유 태그 수) 내림차순, 동률은 weight·degree 가중 */
    my.sort((a, b) => {
      const wa = (a.weight || 0), wb = (b.weight || 0);
      if (wb !== wa) return wb - wa;
      const aOther = ((typeof a.source === 'string' ? a.source : a.source.id) === d.id)
        ? (typeof a.target === 'string' ? a.target : a.target.id)
        : (typeof a.source === 'string' ? a.source : a.source.id);
      const bOther = ((typeof b.source === 'string' ? b.source : b.source.id) === d.id)
        ? (typeof b.target === 'string' ? b.target : b.target.id)
        : (typeof b.source === 'string' ? b.source : b.source.id);
      const aN = nodeById.get(aOther), bN = nodeById.get(bOther);
      return ((bN && bN.degree) || 0) - ((aN && aN.degree) || 0);
    });
    const top = my.slice(0, TOP_RELATED);
    const topSet = new Set(top);
    const neighborSet = new Set([d.id]);
    top.forEach(l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      neighborSet.add(sid);
      neighborSet.add(tid);
    });
    return { topSet, neighborSet };
  }

  function applyFocus(d) {
    const { topSet, neighborSet } = getTopRelated(d);
    nodeSel.classed('faded', n => !neighborSet.has(n.id));
    nodeSel.classed('highlighted', n => n.id === d.id);
    linkSel
      .classed('faded', l => !topSet.has(l))
      .classed('highlighted', l => topSet.has(l));
    /* 관련 노드에만 레이블 표시 */
    nodeSel.selectAll('text').style('display', function() {
      const nd = d3.select(this.parentNode).datum();
      return neighborSet.has(nd.id) ? null : 'none';
    });
  }

  function clearFocus() {
    selectedNode = null;
    nodeSel.classed('faded', false).classed('highlighted', false);
    linkSel.classed('faded', false).classed('highlighted', false);
    /* 모든 레이블 숨김 */
    nodeSel.selectAll('text').style('display', 'none');
  }

  /* Hover: 노드 위에 마우스 올리면 회전 일시정지 + 포커스/툴팁 */
  if (!isMobile) {
    nodeSel
      .on('mouseenter', function(event, d) {
        orbitPaused = true;
        if (!selectedNode) applyFocus(d);
        showTooltip(event, d, d.degree);
      })
      .on('mousemove', moveTooltip)
      .on('mouseleave', function() {
        /* 카메라 드래그 중이면 그대로 정지 유지 */
        if (!camDragging) orbitPaused = false;
        if (!selectedNode) clearFocus();
        hideTooltip();
      });
  }

  /* Single click: lock focus on this node (연결 노드만 표시) */
  nodeSel.on('click', function(event, d) {
    event.stopPropagation();
    if (selectedNode && selectedNode.id === d.id) {
      clearFocus();   // 같은 노드 다시 클릭 → 해제
      if (isMobile) hideTooltip();
    } else {
      selectedNode = d;
      applyFocus(d);
      if (isMobile) showTooltip(event, d, d.degree);
    }
  });

  /* Double click: navigate to article */
  nodeSel.on('dblclick', function(event, d) {
    event.stopPropagation();
    if (d.url) window.open(d.url, d.type === 'newsletter' ? '_blank' : '_self');
  });

  /* ── 캔버스 드래그로 3D 카메라 회전 ── */
  let camDragging = false;
  let camStartX = 0, camStartY = 0;
  let camMoved = false;

  const svgEl = document.getElementById('graphSvg');

  function camStart(px, py, target) {
    /* 노드를 누른 경우 카메라 회전 X (노드 드래그가 우선) */
    if (target && target.closest && target.closest('.g-node')) return false;
    camDragging = true;
    camMoved = false;
    camStartX = px;
    camStartY = py;
    orbitPaused = true;
    svgEl.style.cursor = 'grabbing';
    return true;
  }
  function camMove(px, py) {
    if (!camDragging) return;
    const dx = px - camStartX;
    const dy = py - camStartY;
    if (Math.hypot(dx, dy) > 3) camMoved = true;
    camStartX = px;
    camStartY = py;
    userYaw   += dx * 0.005;
    userPitch  = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, userPitch + dy * 0.005));
  }
  function camEnd() {
    if (!camDragging) return;
    camDragging = false;
    orbitPaused = false;
    svgEl.style.cursor = 'grab';
  }

  /* Mouse */
  svgEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    camStart(e.clientX, e.clientY, e.target);
  });
  window.addEventListener('mousemove', e => camMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', camEnd);
  window.addEventListener('mouseleave', camEnd);

  /* Touch (단일 터치만, 멀티터치는 d3.zoom의 핀치) */
  svgEl.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    camStart(t.clientX, t.clientY, e.target);
  }, { passive: true });
  svgEl.addEventListener('touchmove', e => {
    if (!camDragging || e.touches.length !== 1) return;
    const t = e.touches[0];
    camMove(t.clientX, t.clientY);
  }, { passive: true });
  svgEl.addEventListener('touchend', camEnd);
  svgEl.addEventListener('touchcancel', camEnd);

  /* Click on empty canvas → clear focus (드래그 직후엔 무시) */
  svg.on('click', function() {
    if (camMoved) { camMoved = false; return; }
    clearFocus();
    hideTooltip();
  });

  /* ── 카메라 상태 (사용자 드래그로 yaw/pitch 조정) ── */
  let userYaw = 0;          // Y축 회전 — 가로 드래그
  let userPitch = 0;        // X축 회전 — 세로 드래그
  let orbitPaused = false;  // 마우스 누르고 있는 동안 궤도 회전 정지
  const PITCH_LIMIT = 1.1;  // 약 ±63°

  /* 9. 갤럭시 회전 애니메이션 (RAF, 지속적 슬로우 모션) */
  function projectNode(n, tiltX, tiltZ, yaw) {
    const lx0 = Math.cos(n.theta) * n.orbitR;
    const ly0 = n.height;
    const lz0 = Math.sin(n.theta) * n.orbitR;

    /* Y축 회전 (yaw, 가로 드래그) — XZ 평면 회전 */
    const cy_ = Math.cos(yaw), sy_ = Math.sin(yaw);
    const lx = lx0 * cy_ + lz0 * sy_;
    const ly = ly0;
    const lz = -lx0 * sy_ + lz0 * cy_;

    /* X축 회전 (pitch, 세로 드래그 + 기본 틸트) */
    const ca = Math.cos(tiltX), sa = Math.sin(tiltX);
    const x1 = lx;
    const y1 = ly * ca - lz * sa;
    const z1 = ly * sa + lz * ca;

    /* Z축 롤 */
    const cb = Math.cos(tiltZ), sb = Math.sin(tiltZ);
    const x2 = x1 * cb - y1 * sb;
    const y2 = x1 * sb + y1 * cb;
    const z2 = z1;

    /* 원근 투영 */
    const scale = PERSPECTIVE_D / (PERSPECTIVE_D - z2);
    n.x = cx + x2 * scale;
    n.y = cy + y2 * scale;
    n.depthScale = scale;
    n.zDepth = z2;
  }

  /* 초기 1회 투영 */
  nodes.forEach(n => projectNode(n, TILT_X_BASE, TILT_Z_BASE, 0));

  let lastT = performance.now();
  let depthSortAcc = 0;
  function tick(now) {
    const dt = Math.min(60, now - lastT);
    lastT = now;

    /* 카메라 = 기본 틸트 + 사용자 드래그 + 미세 진동 */
    const tiltX = TILT_X_BASE + userPitch + Math.sin(now * 0.00005) * 0.04;
    const tiltZ = TILT_Z_BASE + Math.sin(now * 0.00003) * 0.04;
    const yaw = userYaw + Math.sin(now * 0.00004) * 0.03;

    nodes.forEach(n => {
      if (!n.dragLocked && !orbitPaused) n.theta += n.angVel * dt;
      projectNode(n, tiltX, tiltZ, yaw);
    });

    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

    nodeSel
      .attr('transform', d => `translate(${d.x},${d.y}) scale(${d.depthScale.toFixed(3)})`)
      .style('opacity', d => Math.max(0.45, Math.min(1, 0.55 + (d.depthScale - 1) * 0.9)));

    /* 깊이 정렬: 0.5초마다 (성능 보호) — 멀리 있는 노드가 뒤로 */
    depthSortAcc += dt;
    if (depthSortAcc > 500) {
      depthSortAcc = 0;
      nodeSel.sort((a, b) => a.zDepth - b.zDepth);
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* Fit to view — 갤럭시 중심을 화면 정중앙에 배치 */
  function fitToView(animate = true) {
    const wrap = document.querySelector('.graph-canvas-wrap');
    const Wnow = wrap.clientWidth;
    const Hnow = wrap.clientHeight;

    /* 갤럭시는 (cx, cy)에서 ±GALAXY_RADIUS * 1.2 영역 (틸트 후 y는 더 좁음) */
    const targetW = GALAXY_RADIUS * 2.4;
    const targetH = GALAXY_RADIUS * 2.4 * 0.85;
    const pad = 40;
    const scale = Math.min(
      1.0,
      (Wnow - pad * 2) / targetW,
      (Hnow - pad * 2) / targetH
    );
    const tx = Wnow / 2 - scale * cx;
    const ty = Hnow / 2 - scale * cy;
    const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
    if (animate) {
      svg.transition().duration(600).call(zoom.transform, t);
    } else {
      svg.call(zoom.transform, t);
    }
    const loadingEl = document.getElementById('graphLoading');
    if (loadingEl) loadingEl.style.display = 'none';
  }

  /* 초기 fit + 짧은 지연 후 한 번 더 (레이아웃 안정 대비) */
  fitToView(false);
  setTimeout(() => fitToView(false), 60);

  /* 창 리사이즈 시 다시 가운데 정렬 */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => fitToView(false), 150);
  });

  /* Zoom reset button */
  document.getElementById('zoomResetBtn').addEventListener('click', () => fitToView(true));

  /* Legend 드래그 */
  (function() {
    const leg = document.querySelector('.graph-legend');
    if (!leg) return;
    let dragging = false, ox = 0, oy = 0;

    leg.addEventListener('mousedown', e => {
      dragging = true;
      leg.style.cursor = 'grabbing';
      /* bottom/right → top/left 로 전환 (부모 기준 보정) */
      const rect = leg.getBoundingClientRect();
      const wrapRect = leg.offsetParent.getBoundingClientRect();
      leg.style.top    = (rect.top  - wrapRect.top)  + 'px';
      leg.style.left   = (rect.left - wrapRect.left) + 'px';
      leg.style.bottom = 'auto';
      leg.style.right  = 'auto';
      ox = e.clientX - rect.left;
      oy = e.clientY - rect.top;
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const wrapRect = leg.offsetParent.getBoundingClientRect();
      leg.style.left = (e.clientX - ox - wrapRect.left) + 'px';
      leg.style.top  = (e.clientY - oy - wrapRect.top)  + 'px';
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      leg.style.cursor = 'grab';
    });
  })();

  /* 10. Category filter */
  let activeCategories = new Set(['research','leader','company','tech','survival','newsletter']);

  document.getElementById('graphControls').addEventListener('click', e => {
    const btn = e.target.closest('.filter-pill');
    if (!btn) return;
    const cat = btn.dataset.cat;

    if (cat === 'all') {
      if (activeCategories.size === 6) {
        activeCategories.clear();
        document.querySelectorAll('.filter-pill:not([data-cat="all"])').forEach(b => b.classList.remove('active'));
      } else {
        activeCategories = new Set(['research','leader','company','tech','survival','newsletter']);
        document.querySelectorAll('.filter-pill:not([data-cat="all"])').forEach(b => b.classList.add('active'));
      }
      btn.classList.toggle('active', activeCategories.size > 0);
    } else {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        btn.classList.remove('active');
      } else {
        activeCategories.add(cat);
        btn.classList.add('active');
      }
      document.querySelector('[data-cat="all"]').classList.toggle('active', activeCategories.size === 6);
    }

    nodeSel.style('display', d => activeCategories.has(d.category) ? null : 'none');
    linkSel.style('display', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      const sn = nodeById.get(sid);
      const tn = nodeById.get(tid);
      return (sn && activeCategories.has(sn.category)) && (tn && activeCategories.has(tn.category)) ? null : 'none';
    });
  });

}

})();
</script>
</body>
</html>
