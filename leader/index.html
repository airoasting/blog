  <script>
  (function(){
    const CATEGORY = 'leader';
    const LABEL = '리더';
    const PAGE_SIZE = 20;
    const grid = document.getElementById('categoryGrid');
    const empty = document.getElementById('emptyState');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const featuredHero = document.getElementById('featuredHero');
    let posts = [];
    let visible = 0;

    const CATEGORY_LABELS = {
      research:'리서치', leader:'리더', company:'기업', tech:'기술', survival:'생존'
    };

    var SOURCE_SHORT = {
      'HBR': 'HBR',
      'BCG': 'BCG',
      'a16z': 'a16z',
      'Anthropic': 'Anthropic',
      'Google DeepMind': 'DeepMind',
      'NeurIPS': 'NeurIPS',
      'Financial Times': 'FT',
      'The Guardian': 'The Guardian',
      'trueup.io': 'TrueUp',
      'World Economic Forum': 'WEF',
      'GitHub': 'GitHub',
      'Societies': 'MDPI'
    };

    function getSourceTag(source) {
      if (!source) return '';
      for (var key in SOURCE_SHORT) {
        if (source.indexOf(key) !== -1) return SOURCE_SHORT[key];
      }
      return source.split('(')[0].split(':')[0].trim();
    }

    function getThumbnailPath(post){
      var parts = post.slug.split('-');
      var dirName = parts[0]+'_'+parts[1]+'_'+parts[2]+'_'+parts.slice(3).join('-');
      return './images/'+dirName+'/thumbnail.png';
    }

    function renderFeaturedHero(post){
      if(!featuredHero) return;
      var catLabel = CATEGORY_LABELS[post.category] || post.category;
      var url = './' + post.slug + '.html';
      var thumbPath = getThumbnailPath(post);
      featuredHero.innerHTML =
        '<a href="'+url+'" class="featured-hero-link">'+
          '<div class="featured-hero-image">'+
            '<img src="'+thumbPath+'" alt="'+post.title+'" onerror="this.parentElement.classList.add(\'no-image\')">'+
            '<div class="featured-hero-overlay">'+
              '<span class="featured-hero-badge">'+catLabel+'</span>'+
              '<span class="featured-hero-date">'+post.date+'</span>'+
            '</div>'+
          '</div>'+
          '<div class="featured-hero-content">'+
            '<h2 class="featured-hero-title">'+post.title+'</h2>'+
            '<p class="featured-hero-summary">'+(post.summary||'')+'</p>'+
            (post.source ? '<span class="featured-hero-source-tag">'+getSourceTag(post.source)+'</span>' : '')+
          '</div>'+
        '</a>';
      featuredHero.style.display = 'block';
    }

    function postToCard(post){
      var catLabel = CATEGORY_LABELS[post.category] || post.category;
      var url = './' + post.slug + '.html';
      var thumbPath = getThumbnailPath(post);
      var seriesBadge = '';
      if(post.series){
        var order = post.series_order ? ' #'+post.series_order : '';
        seriesBadge = '<span class="card-series-badge">'+post.series+order+'</span>';
      }
      var d = new Date(post.date + 'T00:00:00');
      var dateStr = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
      return '<a href="'+url+'" class="card" data-category="'+post.category+'">' +
        '<div class="card-thumb"><img src="'+thumbPath+'" alt="'+post.title+'" onerror="this.parentElement.classList.add(\'no-image\'); this.remove();"></div>' +
        '<div class="card-meta"><span class="card-badge">'+catLabel+'</span><span class="card-date">'+dateStr+'</span></div>' +
        seriesBadge +
        '<div class="card-title">'+post.title+'</div>' +
        (post.source ? '<span class="card-source-tag">'+getSourceTag(post.source)+'</span>' : '') +
        '</a>';
    }

    var hasFeatured = false;

    function render(){
      const batch = posts.slice(0, visible);
      grid.innerHTML = batch.map(postToCard).join('');
      grid.style.display = batch.length ? 'grid' : 'none';
      empty.style.display = (batch.length || hasFeatured) ? 'none' : 'block';
      loadMoreBtn.style.display = visible < posts.length ? 'block' : 'none';
    }

    var data = window.POSTS_DATA || { posts: [] };
    posts = (data.posts||[])
      .filter(function(p){ return p.category===CATEGORY; })
      .sort(function(a,b){ return new Date(b.date)-new Date(a.date); });

    var totalCount = posts.length;
    var postCountEl = document.getElementById('postCount');
    if(postCountEl) postCountEl.textContent = '총 ' + totalCount + '개';
    if(posts.length > 0) { renderFeaturedHero(posts[0]); hasFeatured = true; posts = posts.slice(1); }

    visible = Math.min(PAGE_SIZE, posts.length);
    render();

    loadMoreBtn.addEventListener('click',function(){
      visible = Math.min(visible+PAGE_SIZE, posts.length);
      render();
    });

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    if(hamburger) hamburger.addEventListener('click',function(){ hamburger.classList.toggle('active'); mobileNav.classList.toggle('open'); });
  })();
  </script>


  <!-- AI Markdown Overlay -->
  <div class="ai-md-overlay" id="aiMdOverlay">
    <div class="ai-md-header">
      <span class="ai-md-path" id="aiMdPath"></span>
      <button class="ai-md-close" id="aiMdClose">Human</button>
    </div>
    <div class="ai-md-content" id="aiMdContent"></div>
  </div>

  <script>
  (function(){
    var toggleBtns = document.querySelectorAll('.view-toggle button');
    var overlay = document.getElementById('aiMdOverlay');
    var closeBtn = document.getElementById('aiMdClose');
    var content = document.getElementById('aiMdContent');
    var pathEl = document.getElementById('aiMdPath');
    var currentView = 'human';
    if(!overlay || !toggleBtns.length) return;

    function colorizeLine(line){
      var esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if(esc==='---') return '<span class="fm-delimiter">---</span>';
      if(/^##\s/.test(esc)) return '<span class="md-heading">'+esc+'</span>';
      if(/^"/.test(esc)) return '<span class="md-quote">'+esc+'</span>';
      if(/^(\w[\w_]*):/.test(esc)){
        var idx=esc.indexOf(':');
        return '<span class="fm-key">'+esc.slice(0,idx)+'</span>:<span class="fm-value">'+esc.slice(idx+1)+'</span>';
      }
      return esc||'&nbsp;';
    }

    function renderLines(lines){
      return lines.map(function(line,i){
        return '<div class="md-line"><span class="line-num">'+(i+1)+'</span><span class="line-text">'+colorizeLine(line)+'</span></div>';
      }).join('');
    }

    function buildPageMarkdown(){
      var lines = [];
      var title = document.querySelector('.section-title');
      var desc = document.querySelector('.section-desc');
      var pageTitle = document.title;
      
      lines.push('---');
      lines.push('page: ' + pageTitle);
      if(title) lines.push('title: ' + title.textContent);
      if(desc) lines.push('description: ' + desc.textContent);
      lines.push('type: category');
      lines.push('---');
      lines.push('');

      // List posts from POSTS_DATA
      var data = window.POSTS_DATA || {posts:[]};
      var category = (document.querySelector('[data-cat].active')||{}).dataset;
      var catKey = category ? category.cat : '';
      var posts = (data.posts||[]).filter(function(p){ return !catKey || p.category===catKey; });
      posts.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });

      if(posts.length){
        lines.push('## 포스트 목록 (' + posts.length + '개)');
        lines.push('');
        posts.forEach(function(post){
          lines.push('---');
          lines.push('title: ' + post.title);
          lines.push('date: ' + post.date);
          lines.push('category: ' + post.category);
          lines.push('source: ' + (post.source||''));
          lines.push('tags: [' + (post.tags||[]).join(', ') + ']');
          lines.push('slug: ' + post.slug);
          if(post.roasting_quote) lines.push('roasting_quote: "' + post.roasting_quote + '"');
          lines.push('---');
          lines.push('');
        });
      } else {
        lines.push('## 포스트 없음');
        lines.push('');
      }
      return lines;
    }

    function showAi(){
      if(pathEl){
        var cat = (document.querySelector('[data-cat].active')||{}).dataset;
        pathEl.textContent = (cat && cat.cat ? cat.cat : 'page') + '/index.md';
      }
      content.innerHTML = renderLines(buildPageMarkdown());
      overlay.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function hideAi(){
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
    }

    toggleBtns.forEach(function(btn){
      btn.addEventListener('click',function(){
        var view = btn.dataset.view;
        if(view===currentView) return;
        toggleBtns.forEach(function(b){ b.classList.toggle('active', b.dataset.view===view); });
        currentView = view;
        if(view==='ai') showAi(); else hideAi();
      });
    });

    if(closeBtn){
      closeBtn.addEventListener('click',function(){
        toggleBtns.forEach(function(b){ b.classList.toggle('active', b.dataset.view==='human'); });
        currentView = 'human';
        hideAi();
      });
    }
  })();
  </script>
