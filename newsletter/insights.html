<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 산업 인사이트 타임라인 | AI ROASTING</title>
  <meta name="description" content="AI 로스팅 뉴스레터 42화와 블로그 포스트 40개에서 추출한 인사이트. 2025년 8월부터 2026년 4월까지 AI 산업의 흐름을 분기별로 정리합니다.">
  <link rel="canonical" href="https://airoasting.github.io/blog/newsletter/insights.html">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>(function(){var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>

  <style>
    /* ── 커스텀 커서 ── */
    * { cursor: none !important; }
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.2,0,0,1),
                  height 0.3s cubic-bezier(0.2,0,0,1),
                  border-color 0.3s;
      mix-blend-mode: difference;
    }
    #cursor.hovering { width: 16px; height: 16px; }
    #cursor-ring.hovering { width: 56px; height: 56px; border-color: rgba(255,255,255,0.9); }

    /* ── 전체 페이지 ── */
    body { overflow-x: hidden; }

    /* ── 히어로: 다크 풀블리드 ── */
    .ins-hero {
      position: relative;
      background: #0D0D0D;
      margin: 0 calc(-50vw + 50%);
      padding: 120px calc(50vw - 50%) 100px;
      overflow: hidden;
    }
    /* 배경 그리드 */
    .ins-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* 배경 글로우 */
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.35;
      transition: transform 0.8s cubic-bezier(0.2,0,0,1);
    }
    .hero-glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .hero-glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #C43500 0%, transparent 70%);
      bottom: -100px; right: 10%;
    }

    .ins-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 900px;
    }
    .ins-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }
    .ins-eyebrow::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: rgba(255,255,255,0.3);
    }
    .ins-hero h1 {
      font-size: clamp(44px, 7vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: #fff;
      margin-bottom: 32px;
    }
    .ins-hero h1 em {
      font-style: normal;
      -webkit-text-stroke: 1px rgba(255,255,255,0.4);
      color: transparent;
    }
    .ins-hero-sub {
      display: flex;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
    }
    .ins-hero-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 380px;
    }
    .ins-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .ins-stat {
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 16px;
    }
    .ins-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .ins-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── 분기 셀렉터 ── */
    .quarter-selector {
      display: flex;
      gap: 0;
      margin: 56px 0 0;
      border-bottom: 1px solid var(--border);
    }
    .q-tab {
      position: relative;
      padding: 20px 32px 20px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: none;
      border: none;
      background: none;
      font-family: var(--font-body);
      letter-spacing: 0.02em;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }
    .q-tab:hover { color: var(--text); }
    .q-tab.active { color: var(--text); }
    .q-tab-quarter {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: inherit;
      line-height: 1;
    }
    .q-tab.active .q-tab-quarter { color: #7C3AED; }
    [data-theme="dark"] .q-tab.active .q-tab-quarter { color: #C4B5FD; }
    .q-tab-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }
    .q-tab.active .q-tab-title { opacity: 1; }
    /* 하단 인디케이터 */
    .q-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 2px;
      background: #7C3AED;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .q-tab.active::after { width: calc(100% - 32px); }
    .q-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface-container-high);
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-left: 6px;
      vertical-align: middle;
    }
    .q-tab.active .q-tab-count {
      background: rgba(124,58,237,0.12);
      color: #7C3AED;
    }
    [data-theme="dark"] .q-tab.active .q-tab-count { color: #C4B5FD; background: rgba(196,181,253,0.12); }

    /* ── 테마 필터 ── */
    .theme-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 24px 0 32px;
    }
    .theme-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      cursor: none;
      transition: all 0.15s;
      font-family: var(--font-body);
      letter-spacing: 0.04em;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-btn.active { color: #fff; border-color: transparent; }
    .theme-btn[data-theme="all"].active      { background: #1C1B20; }
    .theme-btn[data-theme="infra"].active    { background: #1A4A7A; }
    .theme-btn[data-theme="bubble"].active   { background: #C43500; }
    .theme-btn[data-theme="platform"].active { background: #145C35; }
    .theme-btn[data-theme="reg"].active      { background: #7A1F1F; }
    .theme-btn[data-theme="labor"].active    { background: #7C3AED; }
    .theme-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .theme-btn[data-theme="all"]      .theme-dot { background: #6B6578; }
    .theme-btn[data-theme="infra"]    .theme-dot { background: #1A4A7A; }
    .theme-btn[data-theme="bubble"]   .theme-dot { background: #C43500; }
    .theme-btn[data-theme="platform"] .theme-dot { background: #145C35; }
    .theme-btn[data-theme="reg"]      .theme-dot { background: #7A1F1F; }
    .theme-btn[data-theme="labor"]    .theme-dot { background: #7C3AED; }
    .theme-btn.active .theme-dot { background: rgba(255,255,255,0.6); }

    /* ── 패널 헤더 ── */
    .panel-header {
      margin-bottom: 40px;
    }
    .panel-phase-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7C3AED;
      margin-bottom: 12px;
    }
    [data-theme="dark"] .panel-phase-tag { color: #C4B5FD; }
    .panel-phase-tag::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: currentColor;
    }
    .panel-headline {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 900;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .panel-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 600px;
    }

    /* ── 카드 그리드 ── */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .insight-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .insight-grid { grid-template-columns: 1fr; } }

    /* 첫 카드 와이드 */
    .insight-card:first-child { grid-column: span 2; }
    @media (max-width: 560px) { .insight-card:first-child { grid-column: span 1; } }

    .insight-card {
      position: relative;
      background: var(--surface-container-high);
      border-radius: 16px;
      padding: 24px 26px;
      border: 1px solid var(--border-variant);
      overflow: hidden;
      transform-style: preserve-3d;
      transform: perspective(800px) rotateX(0deg) rotateY(0deg);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: fadeUp 0.32s cubic-bezier(0.2,0,0,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: perspective(800px) translateY(20px); }
      to   { opacity: 1; transform: perspective(800px) translateY(0); }
    }
    .insight-card:nth-child(1) { animation-delay: 0.00s; }
    .insight-card:nth-child(2) { animation-delay: 0.05s; }
    .insight-card:nth-child(3) { animation-delay: 0.10s; }
    .insight-card:nth-child(4) { animation-delay: 0.15s; }
    .insight-card:nth-child(5) { animation-delay: 0.20s; }
    .insight-card:nth-child(6) { animation-delay: 0.25s; }
    .insight-card:nth-child(7) { animation-delay: 0.30s; }
    .insight-card:nth-child(8) { animation-delay: 0.35s; }

    /* 카드 좌측 컬러 액센트 선 */
    .insight-card::before {
      content: '';
      position: absolute;
      top: 20px; left: 0;
      width: 3px;
      height: calc(100% - 40px);
      border-radius: 0 2px 2px 0;
      background: var(--border);
      transition: background 0.2s, height 0.2s, top 0.2s;
    }
    .insight-card[data-theme="infra"]::before    { background: #1A4A7A; }
    .insight-card[data-theme="bubble"]::before   { background: #C43500; }
    .insight-card[data-theme="platform"]::before { background: #145C35; }
    .insight-card[data-theme="reg"]::before      { background: #7A1F1F; }
    .insight-card[data-theme="labor"]::before    { background: #7C3AED; }

    /* 카드 호버 시 전체 좌측선 → 탑 라인으로 변환 */
    .insight-card:hover::before {
      top: 0; left: 20px;
      width: calc(100% - 40px);
      height: 3px;
      border-radius: 0 0 2px 2px;
    }
    .insight-card:hover {
      border-color: transparent;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .insight-card:hover {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
    }

    /* 카드 내부 글로우 (마우스 위치 반응) */
    .card-glow {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .insight-card:hover .card-glow { opacity: 1; }

    .ic-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }
    .insight-card[data-theme="infra"]    .ic-tag { color: #1A4A7A; }
    .insight-card[data-theme="bubble"]   .ic-tag { color: #C43500; }
    .insight-card[data-theme="platform"] .ic-tag { color: #145C35; }
    .insight-card[data-theme="reg"]      .ic-tag { color: #7A1F1F; }
    .insight-card[data-theme="labor"]    .ic-tag { color: #7C3AED; }
    [data-theme="dark"] .insight-card[data-theme="infra"]    .ic-tag { color: #5B9BD5; }
    [data-theme="dark"] .insight-card[data-theme="bubble"]   .ic-tag { color: #F07040; }
    [data-theme="dark"] .insight-card[data-theme="platform"] .ic-tag { color: #4CAF78; }
    [data-theme="dark"] .insight-card[data-theme="reg"]      .ic-tag { color: #E07070; }
    [data-theme="dark"] .insight-card[data-theme="labor"]    .ic-tag { color: #C4B5FD; }

    .ic-body {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      font-weight: 500;
    }
    .ic-body strong { font-weight: 800; }
    .ic-source {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-secondary);
      padding-top: 12px;
      border-top: 1px solid var(--border-variant);
      letter-spacing: 0.02em;
    }

    /* ── 빈 상태 ── */
    .panel-empty {
      padding: 80px 0;
      text-align: center;
      color: var(--text-secondary);
    }
    .panel-empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .panel-empty p { font-size: 14px; }

    .filter-empty {
      padding: 48px 0;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    /* ── 패널 래퍼 ── */
    .panel-wrap {
      padding-top: 40px;
      padding-bottom: 100px;
    }

    /* ── 모바일 ── */
    @media (max-width: 640px) {
      * { cursor: auto !important; }
      #cursor, #cursor-ring { display: none; }
      .quarter-selector { overflow-x: auto; }
      .q-tab { padding: 16px 24px 16px 0; }
      .q-tab-quarter { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <header id="site-header"></header>
  <script>window.HEADER_CONFIG = { activeCat: 'newsletter' };</script>
  <script src="../assets/js/header.js"></script>
  <script src="../assets/js/theme.js"></script>

  <main>
    <!-- 히어로 (풀블리드) -->
    <div class="ins-hero" id="insHero">
      <div class="hero-glow hero-glow-1" id="heroGlow1"></div>
      <div class="hero-glow hero-glow-2" id="heroGlow2"></div>
      <div class="ins-hero-inner">
        <div class="ins-eyebrow">Newsletter x Blog Insights</div>
        <h1>42화의 기록, <em>3개 분기의 흐름</em></h1>
        <div class="ins-hero-sub">
          <p class="ins-hero-desc">뉴스레터 42화와 블로그 포스트 40개에서 추출했습니다. 분기를 선택하면 해당 시기의 핵심 흐름이 표시됩니다.</p>
          <div class="ins-stats">
            <div class="ins-stat">
              <div class="ins-stat-num">42</div>
              <div class="ins-stat-label">뉴스레터</div>
            </div>
            <div class="ins-stat">
              <div class="ins-stat-num">40</div>
              <div class="ins-stat-label">포스트</div>
            </div>
            <div class="ins-stat">
              <div class="ins-stat-num">37</div>
              <div class="ins-stat-label">인사이트</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- 분기 탭 -->
      <div class="quarter-selector" role="tablist">
        <button class="q-tab active" data-phase="1" role="tab">
          <span class="q-tab-quarter">25 Q3</span>
          <span class="q-tab-title">모델 경쟁의 시대<span class="q-tab-count">10</span></span>
        </button>
        <button class="q-tab" data-phase="2" role="tab">
          <span class="q-tab-quarter">25 Q4</span>
          <span class="q-tab-title">인프라 확보의 시대<span class="q-tab-count">13</span></span>
        </button>
        <button class="q-tab" data-phase="3" role="tab">
          <span class="q-tab-quarter">26 Q1</span>
          <span class="q-tab-title">수익성과 생존의 시대<span class="q-tab-count">14</span></span>
        </button>
      </div>

      <!-- 테마 필터 -->
      <div class="theme-filters" role="group" aria-label="테마 필터">
        <button class="theme-btn active" data-theme="all"><span class="theme-dot"></span>전체</button>
        <button class="theme-btn" data-theme="infra"><span class="theme-dot"></span>인프라·하드웨어</button>
        <button class="theme-btn" data-theme="bubble"><span class="theme-dot"></span>거품·수익성</button>
        <button class="theme-btn" data-theme="platform"><span class="theme-dot"></span>플랫폼 지배력</button>
        <button class="theme-btn" data-theme="reg"><span class="theme-dot"></span>규제·윤리</button>
        <button class="theme-btn" data-theme="labor"><span class="theme-dot"></span>노동·조직</button>

      <!-- 패널 -->
      <div class="panel-wrap" id="panelWrap">
        <div id="panelEmpty" style="display:none">
          <div class="panel-empty">
            <div class="panel-empty-icon">○</div>
            <p>분기를 선택하면 인사이트가 표시됩니다.</p>
          </div>
        </div>
        <div id="panelContent"></div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="../assets/js/footer.js"></script>

  <script>
  // ── 데이터 ───────────────────────────────────────────────────────────────
  const PHASES = [
    {
      id: 1, quarter: "25 Q3",
      period: "2025.08 ~ 2025.09",
      epRange: "뉴스레터 #1~14 · 포스트 2개",
      headline: "빅테크의 베팅: 모델 전쟁의 불씨가 인프라 군비경쟁으로 번졌습니다",
      summary: "누가 더 좋은 모델을 만드는가로 시작된 경쟁은, 누가 더 많은 인프라를 확보하는가로 빠르게 이동했습니다. 동시에 AI 거품과 노동 대체에 대한 첫 경보음이 울렸습니다.",

  });
  document.addEventListener("mouseout", e => {
    if (e.target.closest("a, button, .insight-card, .q-tab, .theme-btn")) {
      cursorDot.classList.remove("hovering");
      cursorRing.classList.remove("hovering");
    }
  });

  // ── 히어로 패럴랙스 ──────────────────────────────────────────────────────
  const glow1 = document.getElementById("heroGlow1");
  const glow2 = document.getElementById("heroGlow2");
  const hero  = document.getElementById("insHero");
  document.addEventListener("mousemove", e => {
    const heroRect = hero.getBoundingClientRect();
    if (e.clientY > heroRect.bottom) return;
    const xPct = (e.clientX / window.innerWidth - 0.5) * 2;
    const yPct = ((e.clientY - heroRect.top) / heroRect.height - 0.5) * 2;
    glow1.style.transform = `translate(${xPct * 30}px, ${yPct * 20}px)`;
    glow2.style.transform = `translate(${-xPct * 25}px, ${-yPct * 15}px)`;
  });

  // ── 카드 3D 틸트 ─────────────────────────────────────────────────────────
  function initCardTilt(card) {
    const glow = card.querySelector(".card-glow");
    card.addEventListener("mousemove", e => {
      const rect   = card.getBoundingClientRect();
      const x      = e.clientX - rect.left;
      const y      = e.clientY - rect.top;
      const cx     = rect.width  / 2;
      const cy     = rect.height / 2;
      const rotY   = ((x - cx) / cx) * 8;
      const rotX   = -((y - cy) / cy) * 6;
      card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
      if (glow) { glow.style.left = x + "px"; glow.style.top = y + "px"; }
    });
    card.addEventListener("mouseleave", () => {
      card.style.transform = "perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)";
    });
  }

  // ── 렌더 ─────────────────────────────────────────────────────────────────
  function render() {
    const phase  = PHASES[activePhase - 1];
    const cards  = phase.insights.filter(c => activeTheme === "all" || c.theme === activeTheme);
    const content = document.getElementById("panelContent");

    const cardsHTML = cards.length === 0
      ? `<div class="filter-empty">'${THEME_LABELS[activeTheme]}' 관련 인사이트가 이 분기에 없습니다.</div>`
      : cards.map(c => `
          <div class="insight-card" data-theme="${c.theme}">
            <div class="card-glow"></div>
            <div class="ic-tag">● ${c.tag}</div>
            <div class="ic-body">${c.body}</div>
            <div class="ic-source">출처: ${c.source}</div>
          </div>`).join("");

    content.innerHTML = `
      <div class="panel-header">
        <div class="panel-phase-tag">${phase.quarter} · ${phase.epRange}</div>
        <div class="panel-headline">${phase.headline}</div>
        <div class="panel-summary">${phase.summary}</div>
      </div>
      <div class="insight-grid">${cardsHTML}</div>
    `;

    content.querySelectorAll(".insight-card").forEach(initCardTilt);
  }

  // ── 이벤트: 분기 탭 ──────────────────────────────────────────────────────
  document.querySelectorAll(".q-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      activePhase = parseInt(tab.dataset.phase);
      document.querySelectorAll(".q-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      render();
    });
  });

  // ── 이벤트: 테마 필터 ────────────────────────────────────────────────────
  document.querySelectorAll(".theme-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTheme = btn.dataset.theme;
      document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });

  // ── 초기 렌더 ────────────────────────────────────────────────────────────
  render();
  </script>
</body>
</html>
