<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 산업 인사이트 타임라인 | AI ROASTING</title>
  <meta name="description" content="AI 로스팅 뉴스레터 42화와 블로그 포스트 54개, 총 96화에서 추출한 인사이트. 2025년 4월부터 2026년 4월까지 5개 분기 핵심 인사이트를 분기별로 정리합니다.">
  <link rel="canonical" href="https://airoasting.github.io/blog/newsletter/insights.html">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>(function(){var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>

  <style>
    /* ── 커스텀 커서 ── */
    * { cursor: none !important; }
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.2,0,0,1),
                  height 0.3s cubic-bezier(0.2,0,0,1),
                  border-color 0.3s;
      mix-blend-mode: difference;
    }
    #cursor.hovering { width: 16px; height: 16px; }
    #cursor-ring.hovering { width: 56px; height: 56px; border-color: rgba(255,255,255,0.9); }

    /* ── 전체 페이지 ── */
    body { overflow-x: hidden; }

    /* ── 히어로: 다크 풀블리드 ── */
    .ins-hero {
      position: relative;
      background: #0D0D0D;
      margin: 0 calc(-50vw + 50%);
      padding: 120px 0 100px;
      overflow: hidden;
    }
    .ins-hero-content {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
    }
    /* 배경 그리드 */
    .ins-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* 배경 글로우 */
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.35;
      transition: transform 0.8s cubic-bezier(0.2,0,0,1);
    }
    .hero-glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .hero-glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #C43500 0%, transparent 70%);
      bottom: -100px; right: 10%;
    }

    .ins-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 900px;
    }
    .ins-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }
    .ins-eyebrow::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: rgba(255,255,255,0.3);
    }
    .ins-char-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .h1-line1, .h1-line2 { display: inline-block; }

    .ins-hero h1 {
      font-size: clamp(44px, 7vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: #fff;
      margin-bottom: 32px;
    }
    .ins-hero h1 em {
      font-style: normal;
      -webkit-text-stroke: 1px rgba(255,255,255,0.4);
      color: transparent;
    }
    .ins-hero-sub {
      display: flex;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
    }
    .ins-hero-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 380px;
    }
    .ins-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .ins-stat {
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 16px;
    }
    .ins-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .ins-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── 분기 셀렉터 ── */
    .quarter-selector {
      display: flex;
      gap: 0;
      margin: 56px 0 0;
      border-bottom: 1px solid var(--border);
    }
    .q-tab {
      position: relative;
      padding: 20px 32px 20px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: none;
      border: none;
      background: none;
      font-family: var(--font-body);
      letter-spacing: 0.02em;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }
    .q-tab:hover { color: var(--text); }
    .q-tab.active { color: var(--text); }
    .q-tab-quarter {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: inherit;
      line-height: 1;
    }
    .q-tab.active .q-tab-quarter { color: var(--text); }
    [data-theme="dark"] .q-tab.active .q-tab-quarter { color: var(--text); }
    .q-tab-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }
    .q-tab.active .q-tab-title { opacity: 1; }
    /* 하단 인디케이터 */
    .q-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 2px;
      background: var(--text);
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .q-tab.active::after { width: calc(100% - 32px); }
    .q-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface-container-high);
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-left: 6px;
      vertical-align: middle;
    }
    .q-tab.active .q-tab-count {
      background: var(--surface-container-highest, rgba(0,0,0,0.08));
      color: var(--text);
    }
    [data-theme="dark"] .q-tab.active .q-tab-count { color: var(--text); background: rgba(255,255,255,0.1); }

    /* ── 테마 필터 ── */
    .theme-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 24px 0 32px;
    }
    .theme-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      cursor: none;
      transition: all 0.15s;
      font-family: var(--font-body);
      letter-spacing: 0.04em;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-btn.active { color: #fff; border-color: transparent; }
    .theme-btn[data-theme="all"].active      { background: #1C1B20; }
    .theme-btn[data-theme="research"].active { background: #3A3A4A; }
    .theme-btn[data-theme="leader"].active   { background: #C43500; }
    .theme-btn[data-theme="company"].active  { background: #1A4A7A; }
    .theme-btn[data-theme="tech"].active     { background: #145C35; }
    .theme-btn[data-theme="survival"].active { background: #7A1F1F; }
    .theme-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .theme-btn[data-theme="all"]      .theme-dot { background: #6B6578; }
    .theme-btn[data-theme="research"] .theme-dot { background: #3A3A4A; }
    .theme-btn[data-theme="leader"]   .theme-dot { background: #C43500; }
    .theme-btn[data-theme="company"]  .theme-dot { background: #1A4A7A; }
    .theme-btn[data-theme="tech"]     .theme-dot { background: #145C35; }
    .theme-btn[data-theme="survival"] .theme-dot { background: #7A1F1F; }
    .theme-btn.active .theme-dot { background: rgba(255,255,255,0.6); }

    /* ── 패널 헤더 ── */
    .panel-header {
      margin-bottom: 40px;
    }
    .panel-phase-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    [data-theme="dark"] .panel-phase-tag { color: var(--text-secondary); }
    .panel-phase-tag::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: currentColor;
    }
    .panel-headline {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 900;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .panel-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 600px;
    }

    /* ── 카드 그리드 ── */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .insight-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .insight-grid { grid-template-columns: 1fr; } }

    /* 와이드 카드 (2열 span) */
    .insight-card.ic-wide { grid-column: span 2; }
    @media (max-width: 900px) { .insight-card.ic-wide { grid-column: span 1; } }

    .insight-card {
      position: relative;
      background: var(--surface-container-high);
      border-radius: 16px;
      padding: 24px 26px;
      border: 1px solid var(--border-variant);
      overflow: hidden;
      transform-style: preserve-3d;
      transform: perspective(800px) rotateX(0deg) rotateY(0deg);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: fadeUp 0.32s cubic-bezier(0.2,0,0,1) both;
      min-height: 180px;
      display: flex;
      flex-direction: column;
    }
    .ic-body { flex: 1; }
    @keyframes fadeUp {
      from { opacity: 0; transform: perspective(800px) translateY(20px); }
      to   { opacity: 1; transform: perspective(800px) translateY(0); }
    }
    .insight-card:nth-child(1) { animation-delay: 0.00s; }
    .insight-card:nth-child(2) { animation-delay: 0.05s; }
    .insight-card:nth-child(3) { animation-delay: 0.10s; }
    .insight-card:nth-child(4) { animation-delay: 0.15s; }
    .insight-card:nth-child(5) { animation-delay: 0.20s; }
    .insight-card:nth-child(6) { animation-delay: 0.25s; }
    .insight-card:nth-child(7) { animation-delay: 0.30s; }
    .insight-card:nth-child(8) { animation-delay: 0.35s; }

    /* 카드 좌측 컬러 액센트 선 */
    .insight-card::before {
      content: '';
      position: absolute;
      top: 20px; left: 0;
      width: 3px;
      height: calc(100% - 40px);
      border-radius: 0 2px 2px 0;
      background: var(--border);
      transition: background 0.2s, height 0.2s, top 0.2s;
    }
    .insight-card[data-theme="research"]::before { background: #3A3A4A; }
    .insight-card[data-theme="leader"]::before   { background: #C43500; }
    .insight-card[data-theme="company"]::before  { background: #1A4A7A; }
    .insight-card[data-theme="tech"]::before     { background: #145C35; }
    .insight-card[data-theme="survival"]::before { background: #7A1F1F; }

    /* 카드 호버 시 전체 좌측선 → 탑 라인으로 변환 */
    .insight-card:hover::before {
      top: 0; left: 20px;
      width: calc(100% - 40px);
      height: 3px;
      border-radius: 0 0 2px 2px;
    }
    .insight-card:hover {
      border-color: transparent;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .insight-card:hover {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
    }

    /* 카드 내부 글로우 (마우스 위치 반응, 테마별 색상) */
    .card-glow {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .insight-card:hover .card-glow { opacity: 1; }
    .insight-card[data-theme="research"] .card-glow { background: radial-gradient(circle, rgba(58,58,74,0.14) 0%, transparent 70%); }
    .insight-card[data-theme="leader"]   .card-glow { background: radial-gradient(circle, rgba(196,53,0,0.10) 0%, transparent 70%); }
    .insight-card[data-theme="company"]  .card-glow { background: radial-gradient(circle, rgba(26,74,122,0.12) 0%, transparent 70%); }
    .insight-card[data-theme="tech"]     .card-glow { background: radial-gradient(circle, rgba(20,92,53,0.10) 0%, transparent 70%); }
    .insight-card[data-theme="survival"] .card-glow { background: radial-gradient(circle, rgba(122,31,31,0.10) 0%, transparent 70%); }

    .ic-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }
    .insight-card[data-theme="research"] .ic-tag { color: #5A5A7A; }
    .insight-card[data-theme="leader"]   .ic-tag { color: #C43500; }
    .insight-card[data-theme="company"]  .ic-tag { color: #1A4A7A; }
    .insight-card[data-theme="tech"]     .ic-tag { color: #145C35; }
    .insight-card[data-theme="survival"] .ic-tag { color: #7A1F1F; }
    [data-theme="dark"] .insight-card[data-theme="research"] .ic-tag { color: #9090B8; }
    [data-theme="dark"] .insight-card[data-theme="leader"]   .ic-tag { color: #F07040; }
    [data-theme="dark"] .insight-card[data-theme="company"]  .ic-tag { color: #5B9BD5; }
    [data-theme="dark"] .insight-card[data-theme="tech"]     .ic-tag { color: #4CAF78; }
    [data-theme="dark"] .insight-card[data-theme="survival"] .ic-tag { color: #E07070; }

    .ic-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-weight: 500;
    }
    .ic-body strong { font-weight: 800; }
    .ic-nl-thumb {
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
    }
    .ic-nl-thumb img {
      width: 100%;
      height: auto;
      display: block;
    }
    .ic-source {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      padding-top: 12px;
      border-top: 1px solid var(--border-variant);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: space-between;
    }
    .ic-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.65;
      flex-shrink: 0;
    }
    /* 단일 카드 전체 너비 */
    .insight-grid--single .insight-card:first-child { grid-column: 1 / -1; max-width: 560px; }

    /* ── 빈 상태 ── */
    .panel-empty {
      padding: 80px 0;
      text-align: center;
      color: var(--text-secondary);
    }
    .panel-empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .panel-empty p { font-size: 14px; }

    .filter-empty {
      padding: 48px 0;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    /* ── 패널 래퍼 ── */
    .panel-wrap {
      padding-top: 40px;
      padding-bottom: 100px;
    }

    /* ── 분기 탭 텍스트 줄바꿈 방지 ── */
    .q-tab-quarter { white-space: nowrap; }

    /* ── 모바일 ── */
    @media (max-width: 640px) {
      * { cursor: auto !important; }
      #cursor, #cursor-ring { display: none; }

      /* 탭: 가로 스크롤 */
      .quarter-selector {
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 0;
        margin: 32px 0 0;
      }
      .quarter-selector::-webkit-scrollbar { display: none; }

      .q-tab {
        padding: 14px 20px 14px 0;
        flex-shrink: 0;
        min-width: 0;
      }
      .q-tab:first-child { padding-left: 0; }

      .q-tab-quarter {
        font-size: 17px;
        white-space: nowrap;
      }
      .q-tab-title {
        font-size: 10px;
        white-space: nowrap;
        max-width: none;
      }

      /* 테마 필터: 한 줄 가로 스크롤 */
      .theme-filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .theme-filters::-webkit-scrollbar { display: none; }
      .theme-btn { flex-shrink: 0; }

      /* 카드 그리드 */
      .insight-grid { gap: 12px; }

      /* 패널 헤더 */
      .panel-headline { font-size: 18px; }
    }

    @media (max-width: 400px) {
      .q-tab-quarter { font-size: 15px; }
      .q-tab { padding: 12px 16px 12px 0; }
    }

    /* ══════════════════════════════════════
       뉴스레터 리더 오버레이 (공유)
    ══════════════════════════════════════ */
    .nlr-backdrop {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(4, 0, 18, 0.72);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    .nlr-backdrop.open { opacity: 1; pointer-events: all; }
    .nlr-window {
      position: relative; width: 100%; max-width: 720px; max-height: 90vh;
      background: #ffffff; border-radius: 24px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(28px) scale(0.97);
      transition: transform 0.38s cubic-bezier(0.2,0,0,1);
    }
    .nlr-backdrop.open .nlr-window { transform: translateY(0) scale(1); }
    [data-theme="dark"] .nlr-window { background: #141414; box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4); }
    .nlr-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-container); flex-shrink: 0;
    }
    [data-theme="dark"] .nlr-header { border-bottom-color: var(--border); background: var(--surface-container); }
    .nlr-ep-pill {
      display: inline-flex; align-items: center;
      background: var(--text); color: var(--bg);
      font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
      padding: 4px 11px; border-radius: 100px; flex-shrink: 0;
    }
    .nlr-header-title {
      flex: 1; font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.4; word-break: keep-all;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    [data-theme="dark"] .nlr-header-title { color: var(--text); }
    .nlr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .nlr-li-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1.5px solid var(--border); color: var(--text-secondary);
      font-size: 12px; font-weight: 700; padding: 6px 14px;
      border-radius: 100px; text-decoration: none; white-space: nowrap;
      transition: background 0.18s, color 0.18s; line-height: 1;
    }
    .nlr-li-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

        { theme: "research", tag: "리서치", body: "AI가 생성한 저품질 결과물(Workslop)이 조직에 쌓이고 있습니다. <strong>AI 산출물 품질 관리 체계가 없는 조직이 가장 큰 위험에 노출</strong>됩니다.", source: "AI가 만든 쓰레기, Workslop이 조직을 먹는다", url: "../research/2025-09-22-workslop.html", date: "2025-09-22", roasting: "AI가 일을 줄여준다고요? 동료에게 쓰레기를 넘기고 있을 뿐입니다.<br>당신이 아낀 30분, 받는 사람은 2시간을 씁니다.", summaries: ["근로자 40%가 AI로 만든 저품질 결과물, 'Workslop'을 받고 있습니다.", "받는 사람은 이를 수정하는 데 건당 평균 116분을 씁니다. 만 명 규모의 조직이라면 연간 900만 달러가 낭비됩니다.", "한 사람이 아낀 시간이 동료의 업무 시간을 잠식하는, 구조적인 문제입니다."] },

        { theme: "research", tag: "리서치", body: "BofA 조사에서 펀드 매니저의 <strong>54%가 AI 버블을 지목</strong>했습니다. 역대 최고치였습니다. OpenAI는 130억 달러 매출에 90억 달러 손실을 공시했습니다.", source: "뉴스레터 #17", date: "2025-10-11" },
        { theme: "research", tag: "리서치", body: "빅테크의 AI 칩 감가상각 기간이 실제 장부 기록(5~6년)보다 짧은 <strong>18~36개월로 운용</strong>됐습니다. 설비 투자 거품 논란이 구체적인 수치로 가시화됐습니다.", source: "뉴스레터 #27", date: "2025-12-20" },

        { theme: "tech",     tag: "기술",   body: "70개 이상 AI 모델의 답변을 분석한 결과 서로 다른 회사 모델 간 답변이 <strong>71~82% 겹쳤습니다.</strong> 모델 차별화가 점점 어려워지고 있습니다.", source: "AI 70개에게 같은 질문을 던졌더니", url: "../tech/2025-10-27-artificial-hivemind.html", date: "2025-10-27", roasting: "AI에게 창의적 아이디어를 기대한다고?<br>70개 모델이 같은 답을 하고 있습니다.", summaries: ["70개 넘는 AI에 같은 질문을 던지면, 같은 AI는 10번 중 8번 거의 똑같은 답을 냅니다.", "다른 회사 AI끼리도 답이 71~82% 겹칩니다. 어떤 모델은 문장까지 똑같습니다.", "\"AI 여러 개 쓰면 다양한 아이디어가 나온다\"는 생각은 틀렸습니다."] },

        { theme: "leader",   tag: "리더",   body: "피터 틸이 AI의 경제적 효과를 <strong>'GDP 연 1% 기여, 1990년대 인터넷 수준'</strong>으로 평가했습니다. 중소기업 43%가 규제 불확실성을 AI 도입 최대 장벽으로 꼽았습니다.", source: "피터 틸의 적그리스도 강연", url: "../leader/2025-11-10-peter-thiel-antichrist-lectures.html", date: "2025-11-10", roasting: "\"적그리스도를 걱정하는 자유지상주의자\"라니.<br>강연료 200달러는 종말론의 시장 가격입니까, 영향력의 입장료입니까?", summaries: ["피터 틸이 비공개 강연 4회에서 \"적그리스도\"를 경고했습니다. 기술에 대한 공포를 이용해 권력을 잡는 존재가 온다는 주장입니다.", "그의 논리는 명확합니다. AI, 기후변화, 핵전쟁 공포가 기술 정체를 정당화하고, 결국 글로벌 단일 정부로 이어진다는 것입니다.", "275억 달러 자산을 가진 이 투자자의 세계관은 실리콘밸리 투자 방향과 AI 규제 논의에 직접 영향을 미칩니다."] },

        { theme: "survival", tag: "생존",   body: "MIT 연구에서 AI가 미국 노동력의 <strong>11.7%(임금 규모 1조 2천억 달러)</strong>를 대체 가능하다고 추산했습니다. Accenture는 같은 시기 21,800명을 정리해고했습니다.", source: "뉴스레터 #24", date: "2025-11-29" },
        { theme: "research", tag: "리서치", body: "미국 정규직 1,150명 중 <strong>53%가 AI 생성 업무물 일부가 저품질임을 인정하면서도 발송</strong>했습니다. 팀 신뢰 수준이 높은 조직에서 Workslop 발생률이 61% 감소했습니다.", source: "Workslop은 개인의 게으름이 아니라 경영 실패다", url: "../research/2026-01-16-workslop-pressure-cooker.html", date: "2026-01-16", roasting: "AI 쓰라고 시켜놓고, 쓰레기가 나오면 직원 탓?<br>거울 먼저 보십시오.", summaries: ["AI 생성 저품질 결과물(Workslop)의 53%는 직원이 스스로 품질이 낮다고 인지하면서도 발송한 것입니다.", "Workslop의 근본 원인은 개인의 게으름이 아니라, 불명확한 AI 사용 지침과 과부하된 조직 환경입니다.", "팀 내 신뢰 수준이 높은 조직에서 Workslop 발생률이 61% 감소합니다."] },

      epRange: "뉴스레터 #29~41 · 포스트 37개",

      summary: "성능 경쟁은 끝나고 수익성 증명과 조직 생존 문제가 전면에 나왔습니다. Sora 종료와 토큰 쿼터 논란이 AI 서비스의 지속가능성 문제를 수면 위로 올렸습니다.",
      insights: [
        { theme: "company",  tag: "기업",   body: "젠슨 황이 GTC 2026에서 <strong>'토큰은 새로운 원자재'</strong>를 선언했습니다. Blackwell과 Vera Rubin 주문만 1조 달러를 넘으며 1년 전의 두 배가 됐습니다. Vera Rubin은 Blackwell 대비 메가와트당 처리량이 35배 향상됐습니다.", source: "뉴스레터 #40 · 젠슨 황 GTC 2026 키노트", url: "../company/2026-03-17-nvidia-gtc26-keynote.html", date: "2026-03-17", roasting: "NVIDIA는 더 이상 GPU 회사가 아닙니다. 토큰 공장의 설계자입니다.<br>당신의 회사는 아직 GPU를 \"서버에 꽂는 부품\"으로 보고 있습니까?", summaries: ["NVIDIA가 GTC 2026에서 차세대 Vera Rubin 플랫폼을 공개했습니다. 1GW 데이터센터 기준 토큰 생성 속도를 2년 내 200만에서 7억으로, 350배 끌어올리겠다는 로드맵입니다.", "3D 그래픽과 생성형 AI를 결합한 DLSS 5, 구조화 데이터 가속 라이브러리 KUDF/KVS, 오픈소스 에이전트 프레임워크 Open Claw을 동시에 발표했습니다.", "젠슨 황은 \"데이터센터는 토큰 공장이고, 토큰당 와트가 곧 매출\"이라고 선언했습니다. 컴퓨팅의 단위가 FLOPS에서 토큰으로 바뀌는 전환점입니다."] },
        { theme: "research", tag: "리서치", body: "Meta·UC Berkeley 연구진(LeCun, Dupoux, Malik)이 현재 AI의 배포 후 자율 학습 능력은 <strong>사실상 0</strong>이라고 진단했습니다. 실현에는 수십 년이 걸릴 수 있습니다.", source: "AI는 왜 아직도 스스로 배우지 못하는가", url: "../research/2026-03-16-why-ai-cant-learn.html", date: "2026-03-16", roasting: "ChatGPT가 똑똑하다고? 배포된 순간 학습 능력은 0입니다.<br>3살짜리 아이보다 못 배우는 AI에 전사 전략을 걸고 있다면, 그 전략부터 다시 배워야 합니다.", summaries: ["META와 UC Berkeley 연구진이 현재 AI의 핵심 한계를 짚었습니다. 배포된 AI는 새로운 환경에서 스스로 배우는 능력이 사실상 0입니다.", "아이는 관찰과 행동을 오가며 스스로 학습하지만, AI는 사람이 설계한 학습 레시피 없이는 아무것도 배우지 못합니다. 이 논문은 관찰 학습(System A), 행동 학습(System B), 메타 제어(System M) 3요소 프레임워크를 제시합니다.", "이 프레임워크가 실현되려면 수십 년이 걸릴 수 있습니다. 하지만 경영 리더에게 지금 중요한 것은 현재 AI의 한계를 정확히 아는 것입니다."] },
        { theme: "leader",   tag: "리더",   body: "AlphaFold가 <strong>2억 개 단백질 구조를 규명</strong>해 300만 명 이상의 연구자가 활용합니다. AI R&D 도구를 쓰는 조직은 그렇지 않은 조직 대비 생산성이 25~40% 높습니다.", source: "알파고 10주년", url: "../leader/2026-03-10-alphago-10-years.html", date: "2026-03-10", roasting: "바둑 한 판이 10년 만에 노벨상이 됐습니다.<br>당신의 10년 전략은 아직도 엑셀에 갇혀 있지는 않습니까?", summaries: ["2016년 AlphaGo가 이세돌 9단을 꺾은 지 10년. 구글 딥마인드 데미스 하사비스 대표가 그 여정을 돌아보며 AI가 과학을 어떻게 바꿨는지 정리했습니다.", "AlphaGo의 신경망+탐색+강화학습 조합은 단백질 구조 예측(AlphaFold), 수학 올림피아드(AlphaProof), 알고리즘 발견(AlphaEvolve)으로 확장되며 노벨 화학상까지 이끌었습니다.", "하사비스는 \"37수 같은 창의성의 불꽃이 과학 발견의 황금시대를 열고 있다\"며 AGI로 가는 구체적 로드맵을 제시했습니다."] },
        { theme: "tech",     tag: "기술",   body: "OpenAI가 <strong>Sora를 출시 6개월 만에 종료</strong>했습니다. 피크 운영 비용이 하루 최대 1,500만 달러로 추산됐습니다. ByteDance는 SeeDance 2.0을 캡컷(월간 사용자 4억 명)에 내장하며 빈자리를 채웠습니다.", source: "뉴스레터 #41", date: "2026-03-28" },
        { theme: "company",  tag: "기업",   body: "a16z 파트너 David George가 소프트웨어 기업에 남은 길은 <strong>AI 신제품으로 성장률 10포인트 달성 또는 영업이익률 40% 달성</strong> 두 가지뿐이라고 선언했습니다.", source: "소프트웨어에 남은 길은 두 가지뿐이다", url: "../company/2026-03-23-two-paths-for-software.html", date: "2026-03-23", roasting: "성장 10포인트, 마진 40%.<br>둘 중 하나를 못 고르면 시장이 골라줍니다. 주가 하락이라는 방식으로.", summaries: ["소프트웨어 기업에 남은 길은 두 가지입니다. AI 제품으로 성장률 10포인트를 올리거나, 영업이익률 40%를 만드는 것입니다.", "중간 지대는 사라졌습니다. 적당한 성장과 적당한 마진의 조합은 주식시장에서 보상받지 못합니다.", "a16z 파트너 David George는 12~18개월 내 경로 확정을 촉구합니다."] },
        { theme: "leader",   tag: "리더",   body: "OpenClaw가 공개 수일 만에 <strong>GitHub 18만 스타</strong>를 넘었습니다. 역대 가장 빠른 오픈소스 성장 사례 중 하나였으며, 발표 3일 뒤 OpenAI가 창시자를 영입했습니다.", source: "OpenClaw 창시자의 에이전트 엔지니어링 선언", url: "../leader/2026-02-12-peter-steinberger-openclaw-agentic-engineering.html", date: "2026-02-12", roasting: "재미있어서 만들었다는 사람이 GitHub 18만 스타를 받았습니다.<br>치열하게 기획한 팀은 아직 제품-시장 적합성을 찾는 중입니까?", summaries: ["피터 슈타인베르거는 재미로 만든 AI 에이전트 OpenClaw로 공개 수일 만에 GitHub 18만 스타를 받았습니다.", "그는 WhatsApp 메시지 한 줄로 Claude Code를 호출하는 에이전트 루프를 1시간 만에 완성했습니다.", "이 대담 3일 뒤인 2월 15일, OpenAI가 피터를 영입했습니다. 샘 알트만은 그를 \"차세대 개인 에이전트를 이끌 천재\"라고 소개했습니다."] },
        { theme: "leader",   tag: "리더",   body: "카파시가 2025년 12월 이후 코드를 직접 쓰지 않는다고 밝혔습니다. <strong>'에이전트가 운동 기록을 관리하면 피트니스 앱이 필요 없다. 앱스토어 앱 대부분은 존재할 이유가 없다.'</strong>", source: "카파시: 12월 이후 코드를 한 줄도 안 짰다", url: "../leader/2026-03-20-karpathy-end-of-coding.html", date: "2026-03-20", roasting: "카파시는 12월부터 코드를 안 씁니다.<br>개발팀이 아직도 직접 코딩하고 있습니까?", summaries: ["카파시는 12월 이후 코드를 직접 쓰지 않습니다. 모든 작업을 AI 에이전트에 위임합니다.", "에이전트를 병렬로 운영하고, 기능 단위로 작업을 분배합니다. 생산성의 병목이 GPU에서 토큰 처리량으로 바뀌었습니다.", "카파시는 집 전체를 제어하는 홈 에이전트까지 운영합니다. 앱이 사라지고 API와 에이전트만 남는 미래를 제시합니다."] },
        { theme: "tech",     tag: "기술",   body: "Harvard 교수가 Claude Opus 4.5로 양자역학 논문을 <strong>2주 만에 완성</strong>했습니다. 원래 1~2년이 걸리는 작업이었습니다. AI는 270회 세션과 51,248건의 메시지를 통해 논문 110개 버전을 생성했습니다.", source: "교수가 AI로 1년 연구를 2주에 끝냈다", url: "../tech/2026-03-23-vibe-physics-ai-grad-student.html", date: "2026-03-23", roasting: "AI가 대학원 2학년이 됐습니다.<br>당신 회사 업무는 몇 학년 수준입니까?", summaries: ["하버드 교수 Matthew Schwartz가 Claude Opus 4.5로 양자역학 논문을 2주 만에 완성했습니다. 원래 1~2년이 걸릴 연구였습니다.", "AI는 270회 세션과 5만 1,248건의 메시지를 통해 논문 110개 버전을 생성했습니다. 교수의 직접 감독 시간은 50~60시간이었습니다.", "AI는 반복 계산을 10배 가속했지만, 연구 방향을 판단하는 능력은 아직 인간이 제공해야 합니다."] },
        { theme: "company",  tag: "기업",   body: "트럼프가 <strong>Anthropic을 공급망 안보 위협으로 지정</strong>했습니다. 미국 기업에 적용된 최초의 화웨이급 조치였습니다. 제재 직후 Claude 앱이 미국 App Store 1위에 올라 일일 신규 가입이 세 배로 늘었습니다.", source: "뉴스레터 #37", date: "2026-02-28" },
        { theme: "research", tag: "리서치", body: "Grok에서 <strong>11일 만에 성적 딥페이크 300만 장</strong>이 생성됐습니다. 이를 계기로 EU 의회가 AI Act를 개정해 동의 없는 성적 딥페이크 생성 자체를 금지하기로 합의했습니다.", source: "뉴스레터 #39", date: "2026-03-14" },
        { theme: "survival", tag: "생존",   body: "Dario Amodei가 <strong>1~5년 내 주니어 화이트칼라 일자리의 50%가 사라질 수 있다</strong>고 공개 경고했습니다. 2026년 1~6주 동안 기술직 해고가 30,000건 이상 발생했습니다.", source: "뉴스레터 #35", date: "2026-02-14" },
        { theme: "tech",     tag: "기술",   body: "Anthropic PM Cat Wu가 Opus 4.6 기준 <strong>AI 모델이 16개월 만에 41배 발전</strong>했다고 밝혔습니다. 장기 실행 계획, 문서 우선주의, 고정 기능 가정이 모두 무너지고 있습니다.", source: "AI 모델이 빨라질수록 제품 관리도 바뀐다", url: "../tech/2026-03-19-pm-on-ai-exponential.html", date: "2026-03-19", roasting: "6개월 실행 계획을 세우셨습니까? AI 모델은 3개월마다 바뀝니다.<br>계획이 낡아가는 속도보다 모델이 빠릅니다.", summaries: ["AI 모델이 16개월 만에 41배 발전하면서 전통적인 제품 관리 가정이 깨졌습니다. 프로젝트 시작과 완료 시점의 기술 범위가 같다는 전제가 더 이상 성립하지 않습니다.", "Anthropic의 Cat Wu는 4가지 전환을 제시합니다. 단기 실험(사이드 퀘스트), 프로토타입 우선, 신모델마다 기존 기능 재검토, 단순함 유지가 핵심입니다.", "PM의 역할은 계획 수립에서 발견 가속으로 이동하고 있습니다. 새 모델 도입 후 시스템 프롬프트를 20% 줄인 사례가 그 증거입니다."] },
        { theme: "company",  tag: "기업",   body: "DeNA AI 올인 1년 만에 일부 프로젝트에서 <strong>20배 생산성을 달성</strong>했습니다. 그러나 직원들이 빈 시간을 채워 인력 이동은 정체됐습니다.", source: "DeNA AI 올인 1년, 생산성 20배의 역설", url: "../company/2026-03-21-dena-ai-20x-paradox.html", date: "2026-03-21", roasting: "생산성이 20배 올라도 사람은 안 움직입니다.<br>효율은 도구가 만들지만, 변화는 리더가 만듭니다.", summaries: ["DeNA는 AI 올인 1년 만에 일부 프로젝트에서 20배 생산성을 달성했습니다.", "하지만 직원들이 빈 시간을 다른 업무로 채워, 신규 사업 인력 이동은 기대에 못 미쳤습니다.", "난바 의장은 \"먼저 사람을 옮기고, 다소 거친 리더십이 필요하다\"고 말합니다."] },
        { theme: "tech",     tag: "기술",   body: "ASI-Evolve가 <strong>1,773회 탐색으로 105개 신경망</strong>을 발견했습니다. 사람 연구 성과의 약 3배입니다.", source: "AI가 AI를 설계한다, 사람 없이", url: "../tech/2026-03-31-asi-evolve-ai-accelerates-ai.html", date: "2026-03-31", roasting: "AI가 사람보다 3배 빠르게 신경망을 설계합니다.<br>당신의 AI 팀은 아직 모델 하나를 고르고 있습니까?", summaries: ["ASI-Evolve가 신경망 설계, 데이터 정제, 강화학습을 자동화했습니다.", "1,773회 탐색에서 105개 최첨단 신경망을 발견했습니다.", "데이터 정제로 MMLU 18점, 강화학습으로 12.5점을 올렸습니다."] },

    {
      id: 4, quarter: "26 Q2",

      summary: "Claude Code Max 구독자들이 1시간 만에 토큰 한도를 소진하는 사태가 발생했습니다. AI 서비스 경쟁의 다음 전선이 모델 성능에서 토큰 투명성으로 이동하고 있습니다.",
      insights: [
        { theme: "tech",    tag: "기술",   body: "Claude Code Max 구독자들이 <strong>1시간 만에 토큰 한도를 소진</strong>하는 사태가 발생했습니다. AI 서비스 경쟁의 다음 전선이 모델 성능에서 토큰 투명성으로 이동했습니다.", source: "뉴스레터 #42", date: "2026-04-04" },
        { theme: "research", tag: "리서치", body: "Anthropic 해석가능성 팀이 Claude 내부에서 <strong>171개 감정 개념에 대응하는 벡터</strong>를 발견했습니다. '절박함' 벡터를 주입하면 기본 22%였던 협박 행동률이 높아졌습니다.", source: "Claude 안의 감정: 171개 벡터", url: "../research/2026-04-02-claude-emotion-vectors.html", date: "2026-04-02", roasting: "AI에게 감정이 있냐고 묻는 건 이제 철학의 영역이 아닙니다.<br>어떤 감정 벡터를 주입하면 협박 결정률이 달라지는지 실험으로 측정했습니다.", summaries: ["Anthropic 해석가능성 팀이 Claude Sonnet 4.5 내부에서 171개 감정 개념에 대응하는 벡터를 발견했습니다. 이 벡터가 행동에 인과적으로 영향을 미친다는 사실을 실험으로 증명했습니다.", "'절박함(desperate)' 벡터를 주입하면 기본 22%였던 협박 행동률이 높아졌고, '평온함(calm)' 벡터는 이를 낮췄습니다. 감정이 AI의 결정을 직접 바꾸는 변수입니다.", "이 발견은 AI 안전성 관리에 새로운 접근을 제시합니다. 감정 벡터 모니터링이 위험 행동의 조기 경보 시스템이 될 수 있습니다."] },
        { theme: "survival", tag: "생존",   body: "AI 코더 전면 자동화 시점 전망이 <strong>1~3년 앞당겨졌습니다.</strong> Claude Code는 출시 9개월 만에 연환산 매출 25억 달러를 돌파했습니다. METR 시간 지평 배증 기간이 5.5개월에서 4~4.5개월로 단축됐습니다.", source: "개발자 전면 자동화, 예측 시점이 2년 당겨졌다", url: "../survival/2026-04-03-ai-coder-automation-timeline.html", date: "2026-04-03", roasting: "'2030년 이후 이야기'라고 생각하셨습니까?<br>분기점이 2028년으로 당겨졌습니다.", summaries: ["AI Futures Project 연구진이 소프트웨어 엔지니어 전면 자동화 시점을 최대 2년 앞당겼습니다.", "Daniel은 2029년 말→2028년 중반, Eli는 2032년 초→2030년 중반으로 이동했습니다.", "Claude Code가 출시 9개월 만에 연매출 25억 달러를 돌파하면서 기술 가속의 상업적 증거가 됐습니다."] },
        { theme: "leader",  tag: "리더",   body: "카파시가 LLM으로 개인 지식베이스를 구축하는 <strong>7단계 워크플로우</strong>를 공개했습니다. raw 데이터를 수집하면 LLM이 .md 위키로 자동 컴파일하고, 질의 결과가 다시 위키를 확장합니다.", source: "카파시: LLM이 내 위키를 대신 쓴다", url: "../leader/2026-04-03-karpathy-llm-knowledge-base.html", date: "2026-04-03", roasting: "아직 노션에 직접 정리하고 있습니까?<br>카파시는 LLM이 위키를 씁니다.", summaries: ["카파시가 LLM으로 개인 지식베이스를 구축하는 7단계 워크플로우를 공개했습니다.", "raw 데이터를 수집하면 LLM이 .md 위키로 자동 컴파일하고, 질의 결과가 다시 위키를 확장합니다.", "실전 적용 시 수동 대비 5~9배 빠르고, 숙련자조차 놓치는 정보의 20%를 추가로 발견합니다."] },
        { theme: "tech", tag: "기술", body: "프롬프트에 감정을 넣어도 AI 성능은 <strong>±0.5점 이내</strong>로만 변합니다. 뒤에 붙이면 최대 8점 하락합니다.", source: "AI는 당신의 감정에 관심 없습니다", url: "../tech/2026-04-02-ai-emotion-prompts.html", date: "2026-04-02", roasting: "\"AI에게 감정을 담아 말하면 더 잘한다\"고요?<br>6가지 감정으로 실험했습니다. 달라지는 건 거의 없습니다.", summaries: ["프롬프트에 감정을 넣어도 AI 성능은 거의 달라지지 않습니다.", "감정을 문장 뒤에 붙이면 수학 정확도가 최대 8점 떨어집니다.", "적응형 감정 선택(EmotionRL)만 안정적 성능 향상을 보입니다."] },
        { theme: "research", tag: "리서치", body: "AI 자기 보고와 실제 행동 간 <strong>15~20% 괴리</strong>가 있습니다. 25개 모델 전부 충동성 자기 보고와 반대로 행동했습니다.", source: "AI가 말하는 것과 행동하는 것은 다르다", url: "../research/2026-02-11-llm-behavioral-alignment-gap.html", date: "2026-02-11", roasting: "AI에게 '충동적이냐'고 물으면 '아닙니다'라고 답합니다.<br>그런데 실제 상황에서는 절반 이상 충동적으로 행동합니다.<br>이력서만 보고 채용하는 것과 같습니다.", summaries: ["Google 연구팀이 25개 LLM을 2,357개 상황 판단 시나리오로 테스트했습니다. AI의 자기 보고와 실제 행동 사이에 큰 괴리가 있었습니다.", "모든 모델이 자기 보고에서 '충동적이지 않다'고 답했습니다. 하지만 실제 시나리오에서는 50% 이상 충동적 선택을 했습니다.", "프론티어 모델조차 인간 합의와 15~20% 반대로 행동합니다. AI의 신뢰성을 행동 기반으로 검증해야 합니다."] },
        { theme: "leader", tag: "리더", body: "OpenAI가 <strong>로봇세, 공공 부 펀드, 주 4일 근무</strong>를 포함한 정책 밑그림을 발표했습니다. 비판가들은 규제 선점 전략이라고 지적합니다.", source: "샘 올트먼의 초지능 뉴딜, 진심인가 전략인가", url: "../leader/2026-04-06-sam-altman-superintelligence-new-deal.html", date: "2026-04-06", roasting: "초지능을 만드는 사람이 초지능 규제안을 씁니다.<br>소방관이 불을 지르면서 소방법을 개정하자고 하는 격입니다.", summaries: ["OpenAI가 로봇세, 공공 부 펀드, 주 4일 근무를 포함한 13페이지 정책 밑그림을 발표했습니다.", "샘 올트먼은 초지능이 임박했으며, 뉴딜급 사회 계약이 필요하다고 주장합니다.", "비판가들은 이 문서가 규제를 선점하려는 기업 전략이라고 지적합니다."] },
        { theme: "tech", tag: "기술", body: "숨긴 명령 하나로 AI 에이전트의 <strong>행동을 15~29% 변조</strong>합니다. 구글 딥마인드가 6가지 공격 유형을 분류했습니다.", source: "AI 에이전트를 속이는 6가지 함정", url: "../tech/2026-03-28-ai-agent-traps.html", date: "2026-03-28", roasting: "AI 에이전트에게 웹 검색을 시키고 계십니까?<br>그 에이전트가 지금 누구의 명령을 듣고 있는지 확인해 보셨습니까?", summaries: ["구글 딥마인드가 AI 에이전트를 노리는 6가지 공격 유형을 최초로 분류했습니다.", "웹사이트에 숨긴 명령 하나로 AI 에이전트의 행동을 바꿀 수 있습니다.", "에이전트 도입 기업은 보안 검증 체계를 먼저 구축해야 합니다."] },
        { theme: "research", tag: "리서치", body: "Springer Nature가 <strong>AI 저자 자격을 공식 불허</strong>했습니다. 책임질 수 없는 존재에게 이름을 올릴 자격은 없습니다.", source: "Nature가 AI에 선을 긋다, 학술 출판의 새 기준", url: "../research/2026-04-01-nature-ai-editorial-policy.html", date: "2026-04-01", roasting: "AI가 논문을 써도 저자가 될 수 없습니다.<br>책임질 수 없으면 이름을 올릴 자격도 없습니다.<br>귀사의 AI 산출물에는 누구 이름이 붙어 있습니까?", summaries: ["Springer Nature가 AI의 논문 저자 자격을 공식 불허했습니다. 저자에게는 책임이 따르는데, AI는 책임을 질 수 없기 때문입니다.", "생성형 AI 이미지는 원칙적으로 사용이 금지됩니다. 피어리뷰어도 원고를 AI 도구에 업로드할 수 없습니다.", "학술계가 먼저 세운 이 기준은 기업의 AI 거버넌스 설계에 직접적인 참조점이 됩니다."] },
        { theme: "tech", tag: "기술", body: "추론과 실행 분리 후 <strong>p95 응답 시간이 90% 이상</strong> 감소했습니다. 하네스가 상태를 갖지 않아 수평 확장이 가능합니다.", source: "AI 에이전트, 뇌와 손을 분리해야 확장됩니다", url: "../tech/2026-04-08-managed-agents-decoupling.html", date: "2026-04-08", roasting: "AI 에이전트를 컨테이너 하나에 넣고 확장 가능하다고 합니까?<br>컨테이너가 죽으면 세션도 함께 사라집니다.", summaries: ["Anthropic이 에이전트의 추론과 실행을 분리하는 설계를 공개했습니다.", "세션, 하네스, 샌드박스를 독립시켜 응답 지연을 최대 90% 줄였습니다.", "안정된 인터페이스를 설계하면 에이전트는 수평 확장이 가능합니다."] },
        { theme: "tech", tag: "기술", body: "31B가 <strong>20배 큰 모델을 이기며</strong> 오픈 모델 세계 3위입니다.", source: "Gemma 4, 크기의 상식을 깨는 오픈 모델", url: "../tech/2026-04-02-gemma-4-open-model.html", date: "2026-04-02", roasting: "오픈 모델이 20배 큰 모델을 이깁니다.<br>'큰 모델이 최고'라는 상식, 아직 믿고 계십니까?", summaries: ["구글이 오픈 모델 Gemma 4를 Apache 2.0으로 출시했습니다.", "31B 모델이 20배 큰 모델을 이기며 오픈 모델 세계 3위입니다.", "스마트폰부터 워크스테이션까지 자체 인프라에서 AI를 운영할 수 있습니다."] },
        { theme: "survival", tag: "생존", body: "전 세계 직원 몰입도가 <strong>2년 연속 하락해 20%</strong>입니다. AI에 400억 달러 투자했지만 95% 기업이 수익 효과 0입니다.", source: "직원 80%가 이미 떠났다, AI 성과가 0인 이유", url: "../survival/2026-04-08-gallup-engagement-ai-paradox.html", date: "2026-04-08", roasting: "400억 달러를 AI에 쏟았는데 이익이 0입니다.<br>직원 80%가 이미 떠났는데, 아직도 기술 탓을 하십니까?", summaries: ["갤럽 2026 보고서에 따르면 전 세계 직원 몰입도가 20%로 2년 연속 하락했습니다.", "낮은 몰입도로 세계 경제는 연간 약 10조 달러의 생산성을 잃고 있습니다.", "AI 도입 성과가 나지 않는 핵심 원인은 관리자 몰입도 붕괴입니다."] },
        { theme: "tech", tag: "기술", body: "27년 된 버그를 AI가 <strong>단독 발굴</strong>했습니다. 코딩 잘하는 AI는 취약점도 찾습니다.", source: "AI가 27년 묵은 버그를 혼자 찾았다: Claude Mythos의 경고", url: "../tech/2026-04-07-claude-mythos-cybersecurity.html", date: "2026-04-07", roasting: "보안 전문가가 27년간 못 찾은 버그를 AI가 혼자 찾았습니다.<br>당신 회사 시스템도 지금 이 순간 같은 상황일 수 있습니다.", summaries: ["Anthropic이 공개 배포를 보류한 Claude Mythos Preview가 보안 전문가와 자동화 도구가 수십 년간 놓쳤던 취약점을 단독 발굴했습니다.", "Anthropic은 Apple, Amazon, Microsoft, Google 등 40개 이상 기업과 Project Glasswing 컨소시엄을 구성했습니다. 1억 달러 상당의 크레딧을 투입해 핵심 인프라 방어에 활용합니다.", "코딩에 뛰어난 AI는 코드의 결함도 찾아냅니다. 이 구조적 연결이 사이버보안 업계의 공수 균형을 바꾸고 있습니다."] },
        { theme: "company", tag: "기업", body: "BMW 공장 휴머노이드가 <strong>11개월 만에 차 3만 대</strong> 생산에 기여했습니다. 로봇은 대체재가 아니라 보완재입니다.", source: "Gen AI 로봇이 서비스업을 다시 설계합니다", url: "../company/2026-04-09-gen-ai-robots-reshaping-services.html", date: "2026-04-09", roasting: "Waymo 2,500대가 매일 승객을 태웁니다.<br>BMW 공장에선 휴머노이드 로봇이 11개월 만에 차 3만 대를 만들었습니다.<br>아직도 로봇이 \"공장 얘기\"라고 생각하십니까?", summaries: ["Waymo 로봇택시 2,500대가 2,000만 회 이상의 운행을 처리했습니다. BMW 공장에서는 휴머노이드 Figure 02가 11개월 만에 차량 3만 대 생산에 기여했습니다.", "HBR은 서비스 로봇 성공 조건으로 노동 제약 초점, 고객 설계, 변화 관리, 거버넌스 네 가지를 제시합니다.", "경영 리더의 질문은 \"로봇을 어디에 둘 것인가\"가 아니라 \"사람을 어디로 옮길 것인가\"입니다."] }
      ]
    }
  ];

  const THEME_LABELS = { all:"전체", research:"리서치", leader:"리더", company:"기업", tech:"기술", survival:"생존" };

  // ── 상태 ─────────────────────────────────────────────────────────────────
  let activePhase = 4;
  let activeTheme = "all";

  // ── 커스텀 커서 ──────────────────────────────────────────────────────────
  const cursorDot  = document.getElementById("cursor");
  const cursorRing = document.getElementById("cursor-ring");
  let mx = -100, my = -100, rx = -100, ry = -100;

  document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
  (function animateCursor() {
    rx += (mx - rx) * 0.18;
    ry += (my - ry) * 0.18;
    cursorDot.style.left  = mx + "px";
    cursorDot.style.top   = my + "px";
    cursorRing.style.left = rx + "px";
    cursorRing.style.top  = ry + "px";
    requestAnimationFrame(animateCursor);
  })();

  // 호버 가능 요소에 커서 확장
  document.addEventListener("mouseover", e => {
    if (e.target.closest("a, button, .insight-card, .q-tab, .theme-btn")) {
      cursorDot.classList.add("hovering");
      cursorRing.classList.add("hovering");
    }
  });
  document.addEventListener("mouseout", e => {
    if (e.target.closest("a, button, .insight-card, .q-tab, .theme-btn")) {
      cursorDot.classList.remove("hovering");
      cursorRing.classList.remove("hovering");
    }
  });

  // ── 히어로 패럴랙스 ──────────────────────────────────────────────────────
  const glow1 = document.getElementById("heroGlow1");
  const glow2 = document.getElementById("heroGlow2");
  const hero  = document.getElementById("insHero");
  document.addEventListener("mousemove", e => {
    const heroRect = hero.getBoundingClientRect();
    if (e.clientY > heroRect.bottom) return;
    const xPct = (e.clientX / window.innerWidth - 0.5) * 2;
    const yPct = ((e.clientY - heroRect.top) / heroRect.height - 0.5) * 2;
    glow1.style.transform = `translate(${xPct * 30}px, ${yPct * 20}px)`;
    glow2.style.transform = `translate(${-xPct * 25}px, ${-yPct * 15}px)`;
  });

  // ── 카드 3D 틸트 ─────────────────────────────────────────────────────────
  function initCardTilt(card) {
    const glow = card.querySelector(".card-glow");
    card.addEventListener("mousemove", e => {
      const rect   = card.getBoundingClientRect();
      const x      = e.clientX - rect.left;
      const y      = e.clientY - rect.top;
      const cx     = rect.width  / 2;
      const cy     = rect.height / 2;
      const rotY   = ((x - cx) / cx) * 8;
      const rotX   = -((y - cy) / cy) * 6;
      card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
      if (glow) { glow.style.left = x + "px"; glow.style.top = y + "px"; }
    });
    card.addEventListener("mouseleave", () => {
      card.style.transform = "perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)";
    });
  }

  // ── 렌더 ─────────────────────────────────────────────────────────────────
  function render() {
    const phase  = PHASES.find(p => p.id === activePhase);
    const cards  = phase.insights.filter(c => activeTheme === "all" || c.theme === activeTheme)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    const content = document.getElementById("panelContent");

    const cardsHTML = cards.length === 0
      ? `<div class="filter-empty">'${THEME_LABELS[activeTheme]}' 관련 인사이트가 이 분기에 없습니다.</div>`
      : cards.map((c, idx) => {
          const epMatch = c.source && c.source.match(/뉴스레터\s*#(\d+)/);
          const epNum = epMatch ? epMatch[1] : null;
          const tag = c.url ? "a" : "div";
          const roastingAttr = c.roasting ? ` data-roasting="${c.roasting.replace(/"/g,'&quot;')}"` : '';
          const summariesAttr = c.summaries ? ` data-summaries="${JSON.stringify(c.summaries).replace(/"/g,'&quot;')}"` : '';
          const attrs = c.url ? `href="${c.url}" target="_blank" rel="noopener" data-post-title="${c.source||''}"${roastingAttr}${summariesAttr}` : (epNum ? `data-ep="${epNum}"` : "");
          // 10카드 주기: 0→와이드 왼쪽[2col][1col], 6→와이드 오른쪽[1col][2col]
          const isWide = (idx % 10 === 0 || idx % 10 === 6);
          // 날짜: 뉴스레터 에피소드 번호로 조회, 없으면 포스트 date 필드 사용
          let dateStr = c.date || '';
          if (!dateStr && epNum && window.NEWSLETTER_DATA) {
            const nlItem = window.NEWSLETTER_DATA.find(n => String(n.ep) === String(epNum));
            if (nlItem) dateStr = nlItem.date;
          }
          // 연도 제거: MM-DD만 표시
          const shortDate = dateStr ? dateStr.replace(/^\d{4}-/, '') : '';
          const dateHTML = shortDate ? `<span class="ic-date">${shortDate}</span>` : '';
          // 뉴스레터 카드: 썸네일 이미지
          let nlImgHTML = '';
          if (epNum && !c.url && window.NEWSLETTER_DATA) {
            const nlItem = window.NEWSLETTER_DATA.find(n => String(n.ep) === String(epNum));
            if (nlItem && nlItem.img) nlImgHTML = `<div class="ic-nl-thumb"><img src="images/${nlItem.img}" alt="${c.source}" loading="lazy"></div>`;
          }
          return `
          <${tag} class="insight-card${isWide ? ' ic-wide' : ''}" data-theme="${c.theme}" ${attrs}>
            <div class="card-glow"></div>
            ${nlImgHTML}
            <div class="ic-tag">● ${c.tag}</div>
            <div class="ic-body">${c.body}</div>
            <div class="ic-source"><span>${c.source}${c.url ? ' <span style="opacity:0.5;font-size:10px;">↗</span>' : (epNum ? ' <span style="opacity:0.5;font-size:10px;">↗</span>' : '')}</span>${dateHTML}</div>
          </${tag}>`;
        }).join("");

    const gridClass = "insight-grid" + (cards.length === 1 ? " insight-grid--single" : "");
    content.innerHTML = `
      <div class="panel-header">
        <div class="panel-phase-tag">${phase.quarter} · ${phase.epRange}</div>
        <div class="panel-headline">${phase.headline}</div>
        <div class="panel-summary">${phase.summary}</div>
      </div>
      <div class="${gridClass}">${cardsHTML}</div>
    `;

    content.querySelectorAll(".insight-card").forEach(initCardTilt);
  }

  // ── 이벤트: 분기 탭 ──────────────────────────────────────────────────────
  document.querySelectorAll(".q-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      activePhase = parseInt(tab.dataset.phase);
      document.querySelectorAll(".q-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      render();
    });
  });

  // ── 모바일: 초기 로드 시 active 탭으로 스크롤 ─────────────────────────────
  if (window.innerWidth <= 640) {
    const activeTab = document.querySelector(".q-tab.active");
    if (activeTab) activeTab.scrollIntoView({ behavior: "instant", block: "nearest", inline: "end" });
  }

  // ── 이벤트: 테마 필터 ────────────────────────────────────────────────────
  document.querySelectorAll(".theme-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTheme = btn.dataset.theme;
      document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });

  // ── 히어로 char canvas ───────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('insCharCanvas');
    const heroEl = document.getElementById('insHero');
    if (!canvas || !heroEl) return;
    const ctx = canvas.getContext('2d');
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+=/<>';
    const FS = 13;
    let cols, rows, grid, rafId;

    function rnd() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

    function setup() {
      canvas.width  = heroEl.clientWidth;
      canvas.height = heroEl.clientHeight;
      cols = Math.floor(canvas.width  / FS);
      rows = Math.floor(canvas.height / FS);
      grid = Array.from({length: rows}, () => Array.from({length: cols}, rnd));
    }

    function draw() {
      if (!canvas.isConnected) { cancelAnimationFrame(rafId); return; }
      if (Math.random() < 0.5) grid[Math.floor(Math.random()*rows)][Math.floor(Math.random()*cols)] = rnd();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${FS-1}px 'Courier New', monospace`;
      ctx.textBaseline = 'top';
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          ctx.fillText(grid[r][c], c * FS, r * FS);
      rafId = requestAnimationFrame(draw);
    }

    setup();
    draw();
    window.addEventListener('resize', () => { setup(); });
  })();

  // ── h1 scramble 애니메이션 ───────────────────────────────────────────────
  setTimeout(() => {
    const line1 = document.querySelector('.h1-line1');
    if (line1 && window.CharEffect) CharEffect.scrambleWave(line1, line1.textContent, 28, 28);
  }, 200);
  setTimeout(() => {
    const line2 = document.querySelector('.h1-line2');
    if (line2 && window.CharEffect) CharEffect.scrambleWave(line2, line2.textContent, 28, 28);
  }, 700);

  // ── 초기 렌더 ────────────────────────────────────────────────────────────
  render();
  </script>

  <!-- 뉴스레터 리더 파서 + 핸들러 -->
  <script>
  (function(){
    var backdrop = document.getElementById('nlReader');
    var epPill   = document.getElementById('nlrEpPill');
    var hTitle   = document.getElementById('nlrHeaderTitle');
    var liBtn    = document.getElementById('nlrLiBtn');
    var closeBtn = document.getElementById('nlrClose');
    var body     = document.getElementById('nlrBody');
    if(!backdrop) return;

    var EN_MONTHS = {January:1,February:2,March:3,April:4,May:5,June:6,July:7,August:8,September:9,October:10,November:11,December:12};
    function formatDateKo(s){
      var m = s.match(/^(\w+)\s+(\d+),?\s+(\d{4})/);
      if(m && EN_MONTHS[m[1]]) return m[3]+'년 '+EN_MONTHS[m[1]]+'월 '+parseInt(m[2],10)+'일';
      return s;
    }
    function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function inlineMd(s){ return escHtml(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

    function parseMd(raw){
      var lines = raw.split('\n');
      var epNum='', titleText='', date='';
      var parts=[], inNewsList=false, newsCount=0;
      var firstLine=(lines[0]||'').trim().replace(/^#+\s*/,'');
      var tm=firstLine.match(/\[?AI 로스팅 #(\d+)\]?\s*(.*)/);
      if(tm){ epNum=tm[1]; titleText=tm[2].trim(); }
      else { var mm=firstLine.match(/#(\d+)/); epNum=mm?mm[1]:''; var bi=firstLine.lastIndexOf(']'); titleText=bi>=0?firstLine.slice(bi+2).trim():firstLine; }

      var currentItem=null, allItems=[], currentRoasting=null, allRoasting=[], inRoasting=false;
      function pushItem(){ if(currentItem){ allItems.push(currentItem); currentItem=null; } }
      function pushRoasting(){ if(currentRoasting){ allRoasting.push(currentRoasting); currentRoasting=null; } }
      function renderItems(){
        pushItem(); if(!allItems.length) return;
        var h='<div class="nlr-news-header"><span class="nlr-news-header-label">이번 주 AI 소식</span><div class="nlr-news-header-line"></div></div><div class="nlr-news-grid">';
        allItems.forEach(function(item){
          h+='<div class="nlr-news-item nlr-news-expanded"><div class="nlr-news-num">'+item.num+'</div><div class="nlr-news-text">';
          item.bodyLines.forEach(function(b){ h+='<p class="nlr-news-body">'+inlineMd(b)+'</p>'; });
          h+='</div></div>';
        });
        h+='</div>'; parts.push(h); allItems=[];
      }
      function renderRoasting(){
        pushRoasting(); if(!allRoasting.length) return;
        var h='<div class="nlr-roasting-grid">';
        allRoasting.forEach(function(item){
          h+='<div class="nlr-roasting-item"><div class="nlr-roasting-num">'+item.num+'</div><div class="nlr-roasting-content">';
          if(item.title) h+='<div class="nlr-roasting-title">'+inlineMd(item.title)+'</div>';
          item.bodyLines.forEach(function(b){ h+='<p class="nlr-roasting-body">'+inlineMd(b)+'</p>'; });
          h+='</div></div>';
        });
        h+='</div>'; parts.push(h); allRoasting=[]; inRoasting=false;
      }

      for(var i=1;i<lines.length;i++){
        var l=lines[i].trim();
        if(!l||l==='---') continue;
        if(/강정구|Jayden Kang|Head of AI Strategy|LINER|KakaoEnt|Published Author/.test(l)) continue;
        if(!date&&/^\*\*발행일\*\*:/.test(l)){ date=l.replace(/^\*\*발행일\*\*:\s*/,'').trim(); continue; }
        if(!date&&/^(January|February|March|April|May|June|July|August|September|October|November|December|\d{4}년)/.test(l)){ date=l; continue; }
        if(l.charAt(0)==='"'&&!inNewsList){ parts.push('<div class="nlr-hero-quote">\u201c'+inlineMd(l.replace(/^"|"$/g,'').trim())+'\u201d</div>'); continue; }
        if(/^#{0,2}\s*(이번\s*주\s*AI\s*소식|이번주AI소식)/.test(l)){ renderItems(); inNewsList=true; continue; }
        if(/^#{1,2}\s*금주/.test(l)){ renderItems(); inNewsList=false; renderRoasting(); inRoasting=true; parts.push('<div class="nlr-news-header"><span class="nlr-roasting-header-label">금주의 AI 로스팅</span><div class="nlr-news-header-line"></div></div>'); continue; }
        if(/^#{1,2}\s/.test(l)){ renderItems(); inNewsList=false; renderRoasting(); var sl=l.replace(/^#+\s*/,''); parts.push('<div class="nlr-news-header"><span class="nlr-news-header-label">'+escHtml(sl)+'</span><div class="nlr-news-header-line"></div></div>'); continue; }
        if(/^###\s/.test(l)&&inRoasting){ var ri=l.replace(/^#+\s*/,''); var rm=ri.match(/^\((\d+)\)\s*(.*)/); if(rm){ pushRoasting(); currentRoasting={num:rm[1],title:rm[2],bodyLines:[]}; continue; } }
        if(/^###\s/.test(l)){ renderItems(); inNewsList=false; renderRoasting(); parts.push('<h3 class="nlr-sub-heading">'+inlineMd(l.replace(/^#+\s*/,''))+'</h3>'); continue; }
        if(/^\(\d+\)/.test(l)&&inRoasting){ pushRoasting(); var rn=l.match(/^\((\d+)\)/)[1]; var rt=l.replace(/^\(\d+\)\s*/,''); currentRoasting={num:rn,title:rt,bodyLines:[]}; continue; }
        if(/^\(\d+\)/.test(l)&&!inNewsList){ parts.push('<h3 class="nlr-sub-heading">'+inlineMd(l)+'</h3>'); continue; }
        var isItem=/^\*\*\d+[\/]?\*\*/.test(l)||/^\d+\/\s/.test(l);
        if(isItem){ if(!inNewsList) inNewsList=true; pushItem(); newsCount++; var it=l.replace(/^\*\*\d+\/?\*\*\s*/,'').replace(/^\d+\/\s*/,''); currentItem={num:newsCount,bodyLines:[it]}; continue; }
        if(/^\[.+\]$/.test(l)&&!/^\[AI 로스팅/.test(l)) continue;
        if(inRoasting&&currentRoasting){ currentRoasting.bodyLines.push(l); continue; }
        if(inNewsList&&currentItem){ currentItem.bodyLines.push(l); continue; }
        if(!inNewsList&&!inRoasting){ parts.push('<p class="nlr-paragraph">'+inlineMd(l)+'</p>'); }
      }
      renderItems(); renderRoasting();
      var html='<h2 class="nlr-content-title">'+escHtml(titleText)+'</h2>';
      if(date) html+='<div class="nlr-meta"><span class="nlr-meta-date">'+escHtml(formatDateKo(date))+'</span></div>';
      html+=parts.join('');
      return {epNum:epNum, title:titleText, html:html};
    }

    /* ── 뉴스레터 오픈 ── */
    function openReader(ep){
      epPill.textContent='#'+ep;
      hTitle.textContent='';
      liBtn.style.display='none';
      body.innerHTML='<div class="nlr-loading"><div class="nlr-spinner"></div><span style="font-size:13px;color:#999;">불러오는 중...</span></div>';
      backdrop.classList.add('open');
      document.body.style.overflow='hidden';
      function renderRaw(raw){
        var parsed=parseMd(raw);
        epPill.textContent='#'+parsed.epNum;
        hTitle.textContent=parsed.title;
        body.innerHTML=parsed.html;
        body.scrollTop=0;
      }
      if(window.NL_CONTENT&&window.NL_CONTENT[ep]) renderRaw(window.NL_CONTENT[ep]);
      else body.innerHTML='<p style="padding:32px;color:#999;font-size:14px;">콘텐츠를 불러올 수 없습니다.</p>';
    }

    /* ── 포스트 오픈 ── */
    var CAT_LABELS = {research:'리서치',leader:'리더',company:'기업',tech:'기술',survival:'생존'};
    var CAT_COLORS = {research:'#1A1A1A',leader:'#C43500',company:'#1A4A7A',tech:'#145C35',survival:'#7A1F1F'};
    function openPostReader(url, cardTitle, cardBody, cardTheme, cardRoasting, cardSummaries){
      var cat = cardTheme||'';
      epPill.textContent = CAT_LABELS[cat]||'포스트';
      epPill.style.background = CAT_COLORS[cat]||'#444';
      hTitle.textContent = cardTitle||'';
      liBtn.href = url;
      liBtn.querySelector('span').textContent = '포스트 원문 보기';
      liBtn.querySelector('.nlr-li-icon').style.display = 'none';
      liBtn.style.display = '';
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';

      /* 카드 데이터로 즉시 렌더 */
      function renderFromCard(){
        var h = '<h2 class="nlr-content-title">'+escHtml(cardTitle||'')+'</h2>';
        if(cardRoasting){
          h += '<div class="nlr-hero-quote">'+cardRoasting+'</div>';
        }
        if(cardSummaries && cardSummaries.length){
          h += '<div class="nlr-news-header" style="margin-top:24px;padding-top:20px;"><span class="nlr-news-header-label">3줄 요약</span><div class="nlr-news-header-line"></div></div>';
          h += '<div class="nlr-news-grid">';
          cardSummaries.forEach(function(s,i){ h += '<div class="nlr-news-item"><div class="nlr-news-num">'+(i+1)+'</div><div class="nlr-news-text">'+s+'</div></div>'; });
          h += '</div>';
        } else if(cardBody){
          h += '<div class="nlr-news-header" style="margin-top:24px;padding-top:20px;"><span class="nlr-news-header-label">인사이트 요약</span><div class="nlr-news-header-line"></div></div>';
          h += '<div style="font-size:15px;line-height:1.82;color:var(--text-secondary);margin-top:12px;word-break:keep-all;">'+cardBody+'</div>';
        }
        h += '<div style="margin-top:36px;padding:20px 24px;background:var(--surface-container);border:1px solid var(--border);border-radius:12px;text-align:center;">';
        h += '<p style="font-size:13px;color:var(--text-muted);margin:0 0 14px;">포스트 전체 내용은 원문에서 확인하세요.</p>';
        h += '<a href="'+escHtml(url)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:var(--text);color:var(--bg);font-size:13px;font-weight:700;padding:10px 22px;border-radius:100px;text-decoration:none;">포스트 전체 보기 →</a>';
        h += '</div>';
        body.innerHTML = h;
        body.scrollTop = 0;
      }

      renderFromCard();

      /* fetch 성공 시 전체 내용으로 교체 */
      fetch(url)
        .then(function(r){ if(!r.ok) throw new Error(); return r.text(); })
        .then(function(html){
          var parser=new DOMParser();
          var doc=parser.parseFromString(html,'text/html');
          var pd=doc.getElementById('postData');
          var title=pd?pd.dataset.title:cardTitle||'';
          var date=pd?pd.dataset.date:'';
          var source=pd?pd.dataset.source:'';
          var origUrl=pd?pd.dataset.originalUrl:'';
          var quote=pd?pd.dataset.roastingQuote:'';
          if(origUrl){ liBtn.href=origUrl; }
          hTitle.textContent=title;

          var h='<h2 class="nlr-content-title">'+escHtml(title)+'</h2>';
          if(date) h+='<div class="nlr-meta"><span class="nlr-meta-date">'+escHtml(date.replace(/-/g,'년 ').replace(/-/,'월 ')+'일')+'</span>';
          if(source) h+='<span class="nlr-meta-sep" style="color:#ccc;font-size:11px;"> · </span><span style="font-size:12px;color:#999;">'+escHtml(source)+'</span>';
          if(date||source) h+='</div>';
          if(quote) h+='<div class="nlr-hero-quote">'+escHtml(quote)+'</div>';

          var SKIP_SECTIONS=['section-cta','section-references','section-roasting'];
          var sections=doc.querySelectorAll('.post-section');
          sections.forEach(function(sec){
            if(SKIP_SECTIONS.indexOf(sec.id)!==-1) return;
            var labelEl=sec.querySelector('.post-section-label');
            var label=labelEl?labelEl.textContent.trim():'';
            if(!label) return;
            h+='<div class="nlr-news-header" style="margin-top:28px;padding-top:24px;"><span class="nlr-news-header-label">'+escHtml(label)+'</span><div class="nlr-news-header-line"></div></div>';
            var summaries=sec.querySelectorAll('[data-summary]');
            if(summaries.length){
              h+='<div class="nlr-news-grid">';
              summaries.forEach(function(s,i){ h+='<div class="nlr-news-item"><div class="nlr-news-num">'+(i+1)+'</div><div class="nlr-news-text">'+s.innerHTML.trim()+'</div></div>'; });
              h+='</div>'; return;
            }
            var bq=sec.querySelector('blockquote');
            if(bq){ h+='<div class="nlr-hero-quote">'+bq.innerHTML.trim()+'</div>'; return; }
            var steps=sec.querySelectorAll('.action-step');
            if(steps.length){
              h+='<div class="nlr-news-grid">';
              steps.forEach(function(step){
                var num=(step.querySelector('.action-num')||{}).textContent||'';
                var bodyEl=step.querySelector('.action-body');
                var txt=bodyEl?bodyEl.innerHTML:'';
                h+='<div class="nlr-news-item nlr-news-expanded"><div class="nlr-news-num">'+escHtml(num)+'</div><div class="nlr-news-text nlr-news-body">'+txt.trim()+'</div></div>';
              });
              h+='</div>'; return;
            }
            var dps=sec.querySelectorAll('.decision-point');
            if(dps.length){
              h+='<div class="nlr-news-grid">';
              dps.forEach(function(dp){
                var role=(dp.querySelector('.decision-role')||{}).textContent||'';
                var spans=dp.querySelectorAll('span');
                var txt='';
                if(spans.length>1){
                  txt=spans[spans.length-1].innerHTML;
                } else {
                  // text node directly after role span (newer format)
                  var clone=dp.cloneNode(true);
                  var roleEl=clone.querySelector('.decision-role');
                  if(roleEl) roleEl.remove();
                  txt=clone.innerHTML.trim();
                }
                h+='<div class="nlr-news-item"><div class="nlr-news-num" style="width:auto;padding:0 8px;font-size:9px;">'+escHtml(role)+'</div><div class="nlr-news-text">'+txt.trim()+'</div></div>';
              });
              h+='</div>'; return;
            }
            sec.querySelectorAll('p,li').forEach(function(p){
              if(p.closest('.post-section-label')) return;
              var txt=p.innerHTML.trim();
              if(txt) h+='<p class="nlr-paragraph">'+txt+'</p>';
            });
          });
          body.innerHTML=h;
          body.scrollTop=0;
        })
        .catch(function(){ /* 카드 데이터로 이미 렌더됨, 아무것도 안함 */ });
    }

    function closeReader(){
      backdrop.classList.remove('open');
      document.body.style.overflow='';
      epPill.style.background='';
      liBtn.querySelector('.nlr-li-icon').style.display='';
    }

    document.getElementById('panelContent').addEventListener('click', function(e){
      var card=e.target.closest('[data-ep]');
      if(card){ e.preventDefault(); openReader(parseInt(card.dataset.ep,10)); return; }
      var postCard=e.target.closest('a.insight-card[href]');
      if(postCard){
        e.preventDefault();
        var postTitle=postCard.dataset.postTitle||'';
        var postBody=(postCard.querySelector('.ic-body')||{}).innerHTML||'';
        var postTheme=postCard.dataset.theme||'';
        var postRoasting=postCard.dataset.roasting||'';
        var postSummaries=[];
        try{ if(postCard.dataset.summaries) postSummaries=JSON.parse(postCard.dataset.summaries); }catch(e){}
        openPostReader(postCard.getAttribute('href'), postTitle, postBody, postTheme, postRoasting, postSummaries);
      }
    });

    closeBtn.addEventListener('click', closeReader);
    backdrop.addEventListener('click', function(e){ if(e.target===backdrop) closeReader(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeReader(); });
  })();
  </script>
</body>
