        <div class="roasting-block" style="margin-bottom:2em;">
          <blockquote id="roastingQuote">정부가 주주가 됐습니다. AI 칩 전쟁은 이제 기업 대 기업이 아니라 국가 대 국가입니다.</blockquote>
        </div>
                <section class="post-section" id="section-article" style="padding-top:1.5em;">
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">1</span>
              <p style="margin:0;flex:1;line-height:1.75;">미국 정부는 8월 22일, 인텔 지분 10%를 공식 인수하며 인텔의 3대 주주로 등극했다. 트럼프 대통령은 인텔 립부 탄 대표와의 회동 직후 “인텔은 이제 미국 납세자의 자산”이라고 선언했고, 같은 날 상무장관도 이를 공식 발표했다. 이 거래는 즉시 체결됐다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">2</span>
              <p style="margin:0;flex:1;line-height:1.75;">불과 보름 전만 해도 분위기는 정반대였다. 트럼프 대통령은 립부 탄 대표가 중국과 연계돼 있다는 의혹을 제기하며 사퇴를 요구했지만, 나흘 뒤 직접 그를 만나 “인텔의 비전은 미국의 미래”라고 말하며 지지로 입장을 바꿨다. 이는 인텔을 단순한 민간 기업이 아닌, 국가 안보와 직결된 전략 자산으로 바라보는 시각을 반영한다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">3</span>
              <p style="margin:0;flex:1;line-height:1.75;">미국 정부는 이번 거래에서 보통주 4억 3,330만 주를 주당 20.47달러에 매입했다. 기존 보조금 57억 달러와 보안 인센티브 32억 달러를 지분으로 전환해 총 89억 달러를 투입했으며, 거래와 동시에 약 19억 달러의 장부상 이익도 확보했다. 단, 이 지분은 의결권이 없는 보통주로, 정부는 이사회 참여나 경영 개입 권한은 갖지 않는다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">4</span>
              <p style="margin:0;flex:1;line-height:1.75;">이 같은 사실상의 국유화 조치에 대해, 자유시장 원칙을 훼손한다는 비판도 거세게 일고 있다. 랜드 폴 상원의원은 “이익은 정치인이, 위험은 납세자가 진다”고 반발했고, 래리 커들로 전 백악관 경제자문위원장 역시 “정부가 기업의 주인이 되는 순간 경쟁은 무의미해진다”고 경고했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">5</span>
              <p style="margin:0;flex:1;line-height:1.75;">《워싱턴포스트》는 ‘정부의 인텔 지분 인수는 실수다(The Intel deal is a mistake)’라는 제목의 사설에서 이번 결정을 정면으로 비판했다. 미국은 중국처럼 정부가 민간 기업에 직접 개입하는 방식이 아니라, 자유시장 원칙을 지켜야 한다고 강조했다. 사설은 특히 연구개발 투자, 공급망 다변화, 동맹과의 협력처럼 시장 친화적인 해법이 더 효과적이라고 주장했다. 쇠퇴한 기업의 지분을 납세자의 세금으로 인수하는 방식은 실효성이 낮다고 지적한다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">6</span>
              <p style="margin:0;flex:1;line-height:1.75;">이러한 비판은 인수 결정의 정치적 배경을 겨냥한 것이기도 하다. 《워싱턴포스트》는 이번 조치가 장기적인 혁신이나 경쟁력 회복보다는 단기적인 정치 효과를 노린 선택이라고 평가했다. 인텔이 다시 도약하려면 시장의 역동성과 내부 구조 개편이 필요한데, 정부의 개입은 오히려 그런 움직임을 위축시킬 수 있다는 우려다. 국가 전략 자산이라는 명분이 설득력을 가지려면, 그 실행 수단도 자유시장 원칙 안에서 정당성을 가져야 한다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">7</span>
              <p style="margin:0;flex:1;line-height:1.75;">인텔의 위기 상황은 명확하다. 스마트폰 시대를 놓쳤고, AI 칩 시장은 엔비디아에, 파운드리 경쟁은 TSMC에 완전히 밀리고 있다. 2021년 이후 매출은 3분의 1 가까이 줄었고, 2024년에는 200억 달러에 가까운 순손실을 기록했다. 고객도 기술도 생산능력도 무너진 상황에서, 단순한 보조금만으로 회복을 기대하기는 어렵다는 인식이 팽배하다. 미국 정부의 직접 참여는 그만큼 절박한 선택이었다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">8</span>
              <p style="margin:0;flex:1;line-height:1.75;">《이코노미스트》는 인텔의 국유화와 별개로 기업 분할을 주장한다. 설계와 제조를 동시에 해온 통합 모델은 경쟁력을 상실했고, 설계 부문을 매각하고 파운드리 사업에 집중하는 것이 생존을 위한 유일한 전략이라는 것이다. AMD는 제조를 포기하고 설계에 집중해 반전에 성공했고, 아마존·구글·마이크로소프트는 ARM 기반 자체 칩 설계를 통해 인텔 의존도를 줄였다. 인텔의 18A 공정은 기술적으로 잠재력이 남아 있는 만큼, 집중과 선택의 전환이 요구된다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">9</span>
              <p style="margin:0;flex:1;line-height:1.75;">파운드리 중심 구조로 전환하려면 외부 고객의 신뢰 확보가 필수다. 그러나 인텔은 여전히 자사 제품에 특화된 공정 운영으로 외부 고객 확보에 실패하고 있다. 세미애널리시스는 인텔이 경쟁력을 갖추려면 2027년까지 500억 달러 이상을 추가 투자해야 한다고 평가했고, 이를 위한 설계 부문 매각은 현실적인 재원 조달 수단이 될 수 있다. 《이코노미스트》는 “판을 짜는 자가 되지 못하면 경기장 밖으로 밀려난다”고 경고했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">10</span>
              <p style="margin:0;flex:1;line-height:1.75;">인텔 사례는 반도체 산업의 중심이 기술에서 지배구조로 이동하고 있음을 보여준다. 이제 미국 정부는 후방 지원자가 아니라, 생태계를 설계하는 전략 참여자다. 당장 삼성 입장에서도 이를 위협으로만 인식할 것이 아니라, 산업 주권을 재정립할 기회로 삼아야 한다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">11</span>
              <p style="margin:0;flex:1;line-height:1.75;">기술을 어떻게 소유하고 누가 그것을 통제하는지가 더 중요해지는 시대가 오고 있다.</p>
            </div>

              <p style="margin:0;flex:1;line-height:1.75;">===</p>
