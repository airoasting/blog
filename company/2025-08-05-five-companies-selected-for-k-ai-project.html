        <div class="roasting-block" style="margin-bottom:2em;">
          <blockquote id="roastingQuote">누구와 함께 만들고 어떻게 나눌 것인가. 이것이 AI 국가 전략의 핵심입니다.</blockquote>

                <section class="post-section" id="section-article" style="padding-top:1.5em;">
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">1</span>
              <p style="margin:0;flex:1;line-height:1.75;">2025년 8월 4일, 과학기술정보통신부는 ‘국가 AI 파운데이션 모델 개발 사업’에 최정예 다섯 개 팀을 확정했다.선정된 팀은 LG AI연구원, 네이버클라우드, 업스테이지, SK텔레콤, NC AI다. 이들은 앞으로 6개월 단위 성과 평가를 거쳐, 최종 2개 기업에 정부의 장기 지원이 집중된다.이번 선정 기준은 “독자 기술력”, “소버린 AI 지향”, “생태계 확산 기여도”였다. 이런 점에서 LG AI연구원, 네이버클라우드, 업스테이지의 선정은 예상된 결과였다. - LG EXAONE은 전문가 특화 모델로 기술 성숙도를 입증했고, - 네이버클라우드는 데이터, 인프라, 모델을 모두 갖춘 풀스택 기업이다. - 업스테이지는 글로벌 인텔리전스 순위에 이름을 올린 국내 AI 스타트업의 대표 주자다.===시장의 관심은 오히려</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">2</span>
              <p style="margin:0;flex:1;line-height:1.75;">(1) SK텔레콤과</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">3</span>
              <p style="margin:0;flex:1;line-height:1.75;">(2) NC AI의 선정, 그리고</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">4</span>
              <p style="margin:0;flex:1;line-height:1.75;">(3) KT와</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">5</span>
              <p style="margin:0;flex:1;line-height:1.75;">(4) 카카오의 탈락에 집중됐다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">6</span>
              <p style="margin:0;flex:1;line-height:1.75;">(1) SK텔레콤은 2018년부터 자체 LLM을 ‘프롬 스크래치’ 방식으로 개발해왔다. 국산 반도체와 독립 GPU 자원 확보, 자체 데이터센터 운영 등 독립형 기술 생태계 기반도 갖추고 있었다. 서울대, 크래프톤, KAIST와 함께 구성한 풀스택 컨소시엄은 연구부터 서비스까지 수직 계열화된 구조를 구현했다. 기술력과 전략 모두에서 평가단의 기대를 충족한 셈이다.특히 SK텔레콤은 개발 결과물의 절반 이상을 오픈소스로 공개하겠다고 밝혔다. 스타트업과 중소기업이 실제로 활용할 수 있는 API와 툴킷 제공, 공공기관 대상 실증 프로젝트도 포함됐다. 데이터, 모델, 서비스까지 이어지는 국산 기술 체계는 ‘소버린 AI’라는 정책 취지에 가장 잘 맞는 사례로 평가받았다. 독립성과 환원성을 동시에 증명한 드문 사례였다.반면</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">7</span>
              <p style="margin:0;flex:1;line-height:1.75;">(3) KT는 MS, 팔런티어, 오픈AI와의 전략적 협업이 오히려 감점 요인이 되었다. 자체 모델 ‘믿음 2.0’을 오픈소스화했지만, 프롬 스크래치 개발보다는 연동 전략이 중심이었다. 기존 파트너십 소개에 많은 분량을 할애한 사업계획서는 독립 기술 확보에 대한 설득력이 부족했다고 한다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">8</span>
              <p style="margin:0;flex:1;line-height:1.75;">(2) NC AI는 게임과 콘텐츠에 특화된 AI 기술 자산으로 주목받았다. 감정형 음성합성, 시나리오 기반 언어처리, 3D 비전 등은 이미 상용화 단계로 진입해 있다. 분사 1년도 안되어 54개 산학연이 참여한 대형 컨소시엄을 구성해, 산업 중심 확산 전략을 빠르게 실현했다. 평가단은 이 구조를 ‘실전적 생태계 설계’로 판단한 것으로 알려졌다.- 반대로 54개나 되는 조직의 협업이 성공할 수 있을지는 지켜봐야 할 대목이다.특히 NC AI는 기술뿐 아니라 확산 전략에서도 높은 점수를 받았다. 수요기업, 스타트업과 연계한 실증 프로젝트, 공개 데이터셋과 공동 연구개발 로드맵이 문서화되어 있었다. ‘게임회사에서 출발한 산업형 AI 기업’으로서 기술·시장·생태계를 동시에 겨냥한 전략이 효과를 발휘했다. 산업용 AI의 구체성을 가장 설득력 있게 제시한 팀이었다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#1A4A7A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">9</span>
              <p style="margin:0;flex:1;line-height:1.75;">(4) 카카오는 오픈AI 기반 파인튜닝 전략을 전면에 내세웠지만, 독자 데이터셋 확보나 오픈소스 기여 같은 핵심 항목은 부족했다고 한다. 상용화 역량은 충분했으나, 오픈AI 의존이 강한 전략은 ‘국가 AI 자립 생태계’라는 평가 기준과 어긋났을 것이다. 국내 민간 기업과의 파트너십 계획도 제시되지 않았고, 글로벌 기술에 대한 높은 의존도가 오히려 감점 요인으로 작용했다.===정부와 평가단은 자체 기술력, 공공 기여, 생태계 확산을 세 가지 축으로 놓고 균형 있게 평가했다고 밝혔다. GPU 인프라, 국산 데이터셋, 오픈소스 공개 여부가 실제 점수에 결정적 영향을 미쳤다. 이번 평가에서는 ‘누구와 함께 만들고, 어떻게 나눌 것인가’를 더 중요한 기준으로 삼았다. 이번 사업은 단일 모델의 성능보다 ‘대한민국 AI 생태계’의 자립 가능성을 따져본 첫 번째 시험대였다.진짜 경쟁은 지금부터 시작이다.</p>
            </div>
