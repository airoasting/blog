        <div class="roasting-block" style="margin-bottom:2em;">
          <blockquote id="roastingQuote">생성형 AI에 집중하는 사이, 중국은 로봇에게 걷는 법을 가르치고 있습니다.</blockquote>
        </div>
                <section class="post-section" id="section-article" style="padding-top:1.5em;">
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">1</span>
              <p style="margin:0;flex:1;line-height:1.75;">2025년 8월 15일, 베이징 국가스피드스케이팅 경기장은 사람보다 먼저 달릴 준비를 마친 존재들로 가득 찼다. 스타팅 라인에는 2족 보행 휴머노이드 로봇들이 줄지어 섰고, 출발 총성과 함께 메탈 프레임이 동시에 튀어나갔다. 관중석에서는 “위수 찌아요!”라는 중국어 응원이 터졌고, 경기는 조용하지만 확실한 긴장감 속에서 진행됐다. 이날은 세계 최초의 ‘휴머노이드 로봇 올림픽’이 개막한 날이었다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">2</span>
              <p style="margin:0;flex:1;line-height:1.75;">이날 1,500m 경기에서 금메달을 거머쥔 로봇은 유니트리 자회사 링이테크놀로지가 개발한 G1 모델이었다. 시속 13km를 유지하며 6분 34초 만에 결승선을 통과한 G1은 한 번도 균형을 잃지 않았다. 인간이라면 숨을 고를 시간에도 로봇은 침묵한 채 트랙을 돌았고, 몇몇 로봇이 넘어지거나 멈추는 사이에서도 묵묵히 레이스를 이어갔다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">3</span>
              <p style="margin:0;flex:1;line-height:1.75;"><제1회 세계 휴머노이드 로봇 게임>에는 16개국 280개 팀, 500여 대의 로봇이 참가했다. 총 26개 종목이 열렸으며, 이 중 14개는 100m, 400m, 1,500m 달리기와 장애물 경주, 계주, 축구, 복싱, 체조 등 스포츠 경기였다. 6개 종목은 힙합 댄스, 군무, 태권도와 중국 무술 시연 등 시각적 전시에 초점을 맞췄고, 나머지 6개는 호텔 청소, 병원 약품 정리, 공장 자재 운반 같은 실제 직무를 시뮬레이션하는 종목이었다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">4</span>
              <p style="margin:0;flex:1;line-height:1.75;">가장 큰 주목을 받은 축구 종목은 완전 자율 시스템으로 진행됐다. 공 하나에 모든 로봇이 달려드는 모습은 초등학생들의 경기처럼 엉성했지만, 동시에 낯설 만큼 따뜻했다. 로봇들은 서로 엉켜 넘어졌고, 일어나지 못한 로봇은 심판이 직접 들어 경기장 밖으로 옮겼다. 실수는 비웃음이 아니라 격려의 대상이었다. 기술은 무대 위에서 실패를 허락했고, 관중은 그 실패를 박수로 응원했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">5</span>
              <p style="margin:0;flex:1;line-height:1.75;">복싱 경기에서는 인간과 기계가 또 다른 방식으로 마주했다. 중국 복싱 국가대표 출신 리양은 로봇에게 펀치 자세를 반복해 가르쳤고, 그 모습은 코치와 선수라기보다는 프로그래머와 인터페이스처럼 보였다. 그는 “로봇은 감정이 없어서 빠르게 배운다”고 말했지만, 바로 그 감정의 부재가 인간과 로봇 사이를 끝내 가로막고 있었다. 몸을 따라 하게 하는 건 쉬웠지만, 싸움의 의미는 아직 학습되지 않았다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">6</span>
              <p style="margin:0;flex:1;line-height:1.75;">이 대회에 앞서 2025년 4월 19일, 베이징 이좡에서는 또 다른 ‘최초의 장면’이 펼쳐졌다. 세계 최초의 휴머노이드 로봇 하프 마라톤에는 12,000명의 인간 주자와 함께 21대의 로봇이 별도 트랙에서 출전했다. 총 21.1km를 달리는 이 경주에서 완주에 성공한 로봇은 단 6대였고, 1위 기록은 2시간 40분 42초였다. 배터리는 중간 교체가 가능했지만, 로봇 자체를 교체하면 10분 패널티가 적용됐다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">7</span>
              <p style="margin:0;flex:1;line-height:1.75;">이 하프 마라톤은 로봇의 자율 이동성과 균형 유지, 배터리 효율 같은 현실적 기술을 직접 시험하는 실험장이었다. 로봇은 넘어졌고, 멈췄으며, 재가동을 위해 엔지니어의 손을 빌려야 했다. 하지만 단 넉 달 후 열린 로봇 게임에서는 이전보다 훨씬 향상된 안정성과 속도를 보여줬다. 실전은 기술을 빠르게 성숙시켰고, 경기는 연구실보다 더 정직한 데이터를 제공했다. 로봇은 실패를 통해 앞으로 나아갔다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">8</span>
              <p style="margin:0;flex:1;line-height:1.75;">개막식은 하나의 장면극처럼 연출됐다. 로봇 밴드가 연주를 시작했고, 군무를 선보이는 로봇들이 그 뒤를 이었다. 인간과 로봇이 함께 워킹하는 패션쇼 무대가 이어졌고, 개막 선언 뒤에는 로봇이 대표로 공정 경쟁을 다짐하는 선서를 낭독했다. 행사 도중 일부 로봇이 쓰러졌지만, 분위기는 흐트러지지 않았다. 관중은 웃으며 박수쳤고, 사회자는 “넘어지면 박수로 다시 일으켜달라”고 당부했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">9</span>
              <p style="margin:0;flex:1;line-height:1.75;">이 모든 것은 단지 기술 과시가 아니었다. 중국 정부는 2027년까지 세계 최고 수준의 인간형 로봇 생태계를 구축하겠다는 계획 아래, 약 1,370억 달러 규모의 지원 펀드를 조성 중이다. Unitree, X-Humanoid, UBTECH 등 민간 로봇 기업들도 전략의 중심에 서 있다. 베이징에서의 이 대회는 실전 훈련장이자 산업 전략의 프롤로그였다. 기술과 정치, 그리고 시장이 동시에 움직이는 무대였다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">10</span>
              <p style="margin:0;flex:1;line-height:1.75;">한국은 산업용 로봇 분야에서 이미 세계적 수준의 경쟁력을 보유하고 있다. 공장 자동화, 정밀 조립, 물류 시스템에서는 꾸준한 성과를 보여왔다. 그러나 휴머노이드 로봇이라는 새로운 전장에서는 아직 존재감이 미미하다. 자율 균형, 감정 반응, 인간 협업 같은 다중 기술의 융합이 필요한 이 영역은 단순한 성능 경쟁이 아니다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">11</span>
              <p style="margin:0;flex:1;line-height:1.75;">모두가 생성형 AI와 LLM에 집중하는 사이, 중국은 로봇에게 걷는 법을 가르치고 있다. 쓰러지는 법, 일어나는 법, 그리고 함께 서는 법을 반복 훈련시키고 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">12</span>
              <p style="margin:0;flex:1;line-height:1.75;">‘생각하는 기계’ 다음은 ‘걷는 기계’다. 중국이 이미 저 멀리 걷고 있는 지금, 우리는 어디로 걸을지를 스스로에게 물어야 할 때다.</p>
            </div>
          </section>
