        <div class="post-body">

        <div class="roasting-block" style="margin-bottom:2em;">
          <blockquote id="roastingQuote">성능이 좋아도 돌아가지 않으면 의미가 없습니다. AI 경쟁의 핵심은 생태계입니다.</blockquote>
        </div>
                <section class="post-section" id="section-article" style="padding-top:1.5em;">
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">1</span>
              <p style="margin:0;flex:1;line-height:1.75;">미중 기술 패권 전쟁은 이제 엔비디아와 하웨이 간 싸움으로 변모하고 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">2</span>
              <p style="margin:0;flex:1;line-height:1.75;">중국은 2015년 ‘중국제조 2025’ 계획에서, 자국에서 만든 반도체 비중을 70%까지 끌어올리겠다고 발표했다. 하지만 2025년 8월 현재 실제 자립률은 35%를 넘지 못하고 있다. 미국이 반도체 수출을 제한하자, 중국 정부는 지난 5월 “앞으로 5년 안에 칩 기술을 독립시키겠다”고 다시 선언했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">3</span>
              <p style="margin:0;flex:1;line-height:1.75;">2025년 1월, 중국 AI 스타트업 DeepSeek는 R1 모델을 발표하며 주목을 받았다. 저렴한 비용에 빠른 속도로 우수한 성능을 기록하며 중국 AI 기술의 위상을 높였다. 하지만 그 다음 모델인 R2는 당초 5월 출시 목표보다 3개월 이상 늦어지고 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">4</span>
              <p style="margin:0;flex:1;line-height:1.75;">중국 정부는 DeepSeek에 하웨이의 Ascend 칩을 쓰라고 권장했다. 하웨이도 직접 엔지니어를 보내 도와줬지만, 소프트웨어가 제대로 맞지 않아 훈련이 끝내 실패로 돌아갔다. 결국, DeepSeek는 학습 단계에서는 미국 칩을 쓰고, 추론 단계에서는 하웨이 칩을 쓰는 방식으로 타협했다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">5</span>
              <p style="margin:0;flex:1;line-height:1.75;">하웨이는 칩뿐 아니라 AI 프레임워크인 MindSpore도 함께 개발해, 중국산 기술로만 구성된 생태계를 만들고 있다. 하지만 PyTorch나 CUDA 같은 세계 표준 개발 도구와 잘 호환되지 않아, 실제로는 사용에 어려움이 많다. Ascend 칩은 연결 속도나 안정성 면에서 아직 부족하다는 평가도 나온다. 기반은 있지만, 완성도는 아직 갈 길이 멀다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">6</span>
              <p style="margin:0;flex:1;line-height:1.75;">반대로 엔비디아는 칩뿐 아니라 그 위에 작동하는 소프트웨어와 도구까지 함께 제공한다. CUDA, TensorRT, DGX 시스템 같은 기술들은 세계 개발자들이 함께 사용하는 ‘표준 생태계’로 자리잡았다. 한 회사가 만든 기술이 아니라, 수많은 개발자와 기업이 연결된 구조라는 점이 강점이다. DeepSeek가 결국 훈련용 칩을 바꾼 이유도 바로 여기에 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">7</span>
              <p style="margin:0;flex:1;line-height:1.75;">그러나 중국의 AI 기업들이 엔비디아 칩을 활용하기는 점점 더 어려워지고 있다. 2025년 8월, 미국 정부는 엔비디아 칩의 중국 수출을 허용하면서 몇 가지 조건을 부과했다. 중국 내 매출의 15%를 미국 정부에 납부해야 하며, (비공식적으로) 칩에 위치 추적 기능을 탑재해야 한다는 요구도 포함되었다. 이는 단순한 수출 통제를 넘어, 칩이 실제로 어디에서 어떻게 사용되는지를 감시하려는 조치이다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">8</span>
              <p style="margin:0;flex:1;line-height:1.75;">중국 정부는 곧바로 대응에 나섰다. 엔비디아 칩을 사용하는 기업들에게 사용 목적과 장소를 보고하게 했고, 군사나 정보통신처럼 민감한 분야에서는 사용을 제한했다. 동시에 하웨이 칩 사용을 늘리기 위해 자금 지원과 규제 완화를 빠르게 추진했다. DeepSeek도 현재 추론 단계에서는 하웨이 칩을 사용하는 방식으로 방향을 잡고 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">9</span>
              <p style="margin:0;flex:1;line-height:1.75;">R2 모델의 출시가 늦어진 데에는 또 다른 이유도 있다. 새로운 모델에 맞는 데이터를 정리하고 라벨링하는 데 시간이 예상보다 오래 걸렸기 때문이다. 창업자인 량원펑은 R2의 성능이 아직 충분하지 않다고 판단했고, 좀 더 시간을 들여 더 발전된 모델을 만들고자 했다. 이 결정은 단순한 기술 부족이 아니라, 경쟁력을 유지하기 위한 전략적 판단일 수 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">10</span>
              <p style="margin:0;flex:1;line-height:1.75;">결국 DeepSeek의 R2 출시는 기술 자체보다, 어떤 생태계를 선택할지에 대한 고민 속에서 지연되고 있다. 하웨이 칩을 쓰지 못한 이유는 단순한 실패가 아니라, 엔비디아가 만든 연결 구조가 너무 강력했기 때문이다. AI 산업은 성능을 넘어서, 어떤 생태계 안에서 돌아가는지가 더 중요해지고 있다. 국가의 정책 경쟁은 이제 기업들의 전략 경쟁으로 옮겨가고 있다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">11</span>
              <p style="margin:0;flex:1;line-height:1.75;">AI의 미래는 이제 모델 하나의 성능만으로 결정되지 않는다. 어떤 칩, 어떤 구조 위에서 모델이 작동하느냐가 핵심이다. 한국의 ‘국가 AI 파운데이션 모델’ 사업이 현재는 범용성 모델에 국한되어 있으나, 점차 생태계에 대한 관심으로 옮겨갈 것이다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">12</span>
              <p style="margin:0;flex:1;line-height:1.75;">DeepSeek 사례에서 보듯, 진정한 독립은 칩 기술뿐 아니라 생태계 전반에 걸친 기술 자립이 함께 이루어질 때 비로소 의미를 갖는다.</p>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:2.8em;">
              <span style="width:26px;height:26px;border-radius:50%;background:#145C35;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;">13</span>
